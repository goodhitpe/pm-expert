<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" width="700" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#888"/>
    </marker>
  </defs>
  <rect width="700" height="480" fill="url(#bg)" rx="12"/>
  <text x="350" y="28" text-anchor="middle" fill="#f39c12" font-size="17" font-family="Arial,sans-serif" font-weight="bold">Day 13 — OSI 7계층 모델</text>

  <!-- Left: OSI Layers -->
  <text x="170" y="55" text-anchor="middle" fill="#888" font-size="11" font-family="Arial,sans-serif">송신 측 (데이터 전송)</text>

  <!-- Layer colors: 7=purple, 6=blue, 5=cyan, 4=green, 3=yellow, 2=orange, 1=red -->
  <!-- 7: Application -->
  <rect x="40" y="64" width="260" height="46" rx="7" fill="rgba(155,89,182,0.8)"/>
  <text x="90" y="83" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">7</text>
  <text x="170" y="83" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">응용 계층 (Application)</text>
  <text x="170" y="100" text-anchor="middle" fill="#ddd" font-size="9" font-family="Arial,sans-serif">HTTP, FTP, SMTP, DNS, SSH</text>

  <!-- 6: Presentation -->
  <rect x="40" y="116" width="260" height="46" rx="7" fill="rgba(108,99,255,0.8)"/>
  <text x="90" y="135" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">6</text>
  <text x="170" y="135" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">표현 계층 (Presentation)</text>
  <text x="170" y="152" text-anchor="middle" fill="#ddd" font-size="9" font-family="Arial,sans-serif">암호화(SSL/TLS), 인코딩, 압축</text>

  <!-- 5: Session -->
  <rect x="40" y="168" width="260" height="46" rx="7" fill="rgba(0,150,255,0.8)"/>
  <text x="90" y="187" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">5</text>
  <text x="170" y="187" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">세션 계층 (Session)</text>
  <text x="170" y="204" text-anchor="middle" fill="#ddd" font-size="9" font-family="Arial,sans-serif">NetBIOS, 세션 수립·유지·종료</text>

  <!-- 4: Transport -->
  <rect x="40" y="220" width="260" height="46" rx="7" fill="rgba(0,212,170,0.8)"/>
  <text x="90" y="239" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">4</text>
  <text x="170" y="239" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">전송 계층 (Transport)</text>
  <text x="170" y="256" text-anchor="middle" fill="#222" font-size="9" font-family="Arial,sans-serif" font-weight="bold">TCP (신뢰), UDP (속도), 포트번호</text>

  <!-- 3: Network -->
  <rect x="40" y="272" width="260" height="46" rx="7" fill="rgba(243,156,18,0.8)"/>
  <text x="90" y="291" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">3</text>
  <text x="170" y="291" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">네트워크 계층 (Network)</text>
  <text x="170" y="308" text-anchor="middle" fill="#222" font-size="9" font-family="Arial,sans-serif" font-weight="bold">IP 주소, 라우팅, Router</text>

  <!-- 2: Data Link -->
  <rect x="40" y="324" width="260" height="46" rx="7" fill="rgba(231,126,44,0.8)"/>
  <text x="90" y="343" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">2</text>
  <text x="170" y="343" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">데이터링크 계층 (Data Link)</text>
  <text x="170" y="360" text-anchor="middle" fill="#ddd" font-size="9" font-family="Arial,sans-serif">MAC 주소, 프레임, 스위치</text>

  <!-- 1: Physical -->
  <rect x="40" y="376" width="260" height="46" rx="7" fill="rgba(231,76,60,0.8)"/>
  <text x="90" y="395" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">1</text>
  <text x="170" y="395" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">물리 계층 (Physical)</text>
  <text x="170" y="412" text-anchor="middle" fill="#ddd" font-size="9" font-family="Arial,sans-serif">케이블, 허브, 비트 전송</text>

  <!-- Middle: Data units -->
  <text x="350" y="55" text-anchor="middle" fill="#555" font-size="9" font-family="Arial,sans-serif">PDU</text>
  <text x="350" y="93" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial,sans-serif">Data</text>
  <text x="350" y="145" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial,sans-serif">Data</text>
  <text x="350" y="197" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial,sans-serif">Data</text>
  <text x="350" y="249" text-anchor="middle" fill="#00d4aa" font-size="10" font-family="Arial,sans-serif" font-weight="bold">Segment</text>
  <text x="350" y="301" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Arial,sans-serif" font-weight="bold">Packet</text>
  <text x="350" y="353" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial,sans-serif">Frame</text>
  <text x="350" y="405" text-anchor="middle" fill="#e74c3c" font-size="10" font-family="Arial,sans-serif">Bits</text>

  <!-- Right: Mirror -->
  <text x="530" y="55" text-anchor="middle" fill="#888" font-size="11" font-family="Arial,sans-serif">수신 측</text>
  <rect x="400" y="64" width="260" height="46" rx="7" fill="rgba(155,89,182,0.4)" stroke="rgba(155,89,182,0.6)" stroke-width="1"/>
  <text x="530" y="91" text-anchor="middle" fill="#ddd" font-size="11" font-family="Arial,sans-serif">응용 계층</text>
  <rect x="400" y="116" width="260" height="46" rx="7" fill="rgba(108,99,255,0.4)" stroke="rgba(108,99,255,0.6)" stroke-width="1"/>
  <text x="530" y="143" text-anchor="middle" fill="#ddd" font-size="11" font-family="Arial,sans-serif">표현 계층</text>
  <rect x="400" y="168" width="260" height="46" rx="7" fill="rgba(0,150,255,0.4)" stroke="rgba(0,150,255,0.6)" stroke-width="1"/>
  <text x="530" y="195" text-anchor="middle" fill="#ddd" font-size="11" font-family="Arial,sans-serif">세션 계층</text>
  <rect x="400" y="220" width="260" height="46" rx="7" fill="rgba(0,212,170,0.4)" stroke="rgba(0,212,170,0.6)" stroke-width="1"/>
  <text x="530" y="247" text-anchor="middle" fill="#ddd" font-size="11" font-family="Arial,sans-serif">전송 계층</text>
  <rect x="400" y="272" width="260" height="46" rx="7" fill="rgba(243,156,18,0.4)" stroke="rgba(243,156,18,0.6)" stroke-width="1"/>
  <text x="530" y="299" text-anchor="middle" fill="#ddd" font-size="11" font-family="Arial,sans-serif">네트워크 계층</text>
  <rect x="400" y="324" width="260" height="46" rx="7" fill="rgba(231,126,44,0.4)" stroke="rgba(231,126,44,0.6)" stroke-width="1"/>
  <text x="530" y="351" text-anchor="middle" fill="#ddd" font-size="11" font-family="Arial,sans-serif">데이터링크 계층</text>
  <rect x="400" y="376" width="260" height="46" rx="7" fill="rgba(231,76,60,0.4)" stroke="rgba(231,76,60,0.6)" stroke-width="1"/>
  <text x="530" y="403" text-anchor="middle" fill="#ddd" font-size="11" font-family="Arial,sans-serif">물리 계층</text>

  <!-- Arrows between -->
  <line x1="306" y1="400" x2="398" y2="400" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="352" y="430" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">물리 케이블 / 전파</text>

  <text x="350" y="460" text-anchor="middle" fill="#555" font-size="9" font-family="Arial,sans-serif">기억법: All People Seem To Need Data Processing | 7→1 캡슐화(Encapsulation) / 1→7 역캡슐화</text>
</svg>
