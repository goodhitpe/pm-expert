  <rect x="530" y="140" width="140" height="40" rx="7" fill="#00d4aa"/>
  <text x="600" y="156" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">4. 테스트·배포</text>
  <text x="600" y="172" text-anchor="middle" fill="#ddd" font-size="9" font-family="Arial,sans-serif">Level 1</text>

