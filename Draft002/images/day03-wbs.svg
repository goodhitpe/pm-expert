  <text x="145" y="254" text-anchor="middle" fill="#e0e0e0" font-size="8" font-family="Arial,sans-serif">현업 인터뷰</text>

  <!-- Level 2 from 3. 개발 -->
  <line x1="450" y1="180" x2="450" y2="210" stroke="#888" stroke-width="1.5"/>
  <line x1="360" y1="210" x2="540" y2="210" stroke="#888" stroke-width="1.5"/>
  <line x1="360" y1="210" x2="360" y2="226" stroke="#888" stroke-width="1.5"/>
  <line x1="450" y1="210" x2="450" y2="226" stroke="#888" stroke-width="1.5"/>
  <line x1="540" y1="210" x2="540" y2="226" stroke="#888" stroke-width="1.5"/>
  <rect x="325" y="226" width="70" height="36" rx="5" fill="rgba(0,212,170,0.3)" stroke="#00d4aa" stroke-width="1"/>
  <text x="360" y="242" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif" font-weight="bold">3.1</text>
  <text x="360" y="254" text-anchor="middle" fill="#e0e0e0" font-size="8" font-family="Arial,sans-serif">프론트엔드</text>
  <rect x="415" y="226" width="70" height="36" rx="5" fill="rgba(0,212,170,0.3)" stroke="#00d4aa" stroke-width="1"/>
  <text x="450" y="242" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif" font-weight="bold">3.2</text>
  <text x="450" y="254" text-anchor="middle" fill="#e0e0e0" font-size="8" font-family="Arial,sans-serif">백엔드 API</text>
  <rect x="505" y="226" width="70" height="36" rx="5" fill="rgba(0,212,170,0.3)" stroke="#00d4aa" stroke-width="1"/>
  <text x="540" y="242" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif" font-weight="bold">3.3</text>
  <text x="540" y="254" text-anchor="middle" fill="#e0e0e0" font-size="8" font-family="Arial,sans-serif">DB 구축</text>

  <!-- Level 3 from 3.2 -->
  <line x1="450" y1="262" x2="450" y2="290" stroke="#888" stroke-width="1.5"/>
  <line x1="390" y1="290" x2="510" y2="290" stroke="#888" stroke-width="1.5"/>
  <line x1="390" y1="290" x2="390" y2="306" stroke="#888" stroke-width="1.5"/>
  <line x1="510" y1="290" x2="510" y2="306" stroke="#888" stroke-width="1.5"/>
  <rect x="355" y="306" width="70" height="36" rx="5" fill="rgba(243,156,18,0.25)" stroke="#f39c12" stroke-width="1"/>
  <text x="390" y="322" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif" font-weight="bold">3.2.1</text>
  <text x="390" y="334" text-anchor="middle" fill="#e0e0e0" font-size="8" font-family="Arial,sans-serif">회원 API</text>
  <rect x="475" y="306" width="70" height="36" rx="5" fill="rgba(243,156,18,0.25)" stroke="#f39c12" stroke-width="1"/>
  <text x="510" y="322" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif" font-weight="bold">3.2.2</text>
  <text x="510" y="334" text-anchor="middle" fill="#e0e0e0" font-size="8" font-family="Arial,sans-serif">결제 API</text>

  <!-- Work Package tag -->
  <rect x="355" y="355" width="230" height="32" rx="6" fill="rgba(231,76,60,0.2)" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="470" y="367" text-anchor="middle" fill="#e74c3c" font-size="10" font-family="Arial,sans-serif" font-weight="bold">Work Package (최소 단위)</text>
  <text x="470" y="380" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">담당자·기간·비용 배정 가능한 최소 작업</text>

  <!-- Legend -->
  <rect x="20" y="390" width="280" height="40" rx="6" fill="rgba(255,255,255,0.05)" stroke="#444" stroke-width="1"/>
  <rect x="33" y="401" width="12" height="12" rx="2" fill="#6c63ff"/>
  <text x="52" y="412" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">Level 0 프로젝트</text>
  <rect x="140" y="401" width="12" height="12" rx="2" fill="#00d4aa"/>
  <text x="158" y="412" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">Level 1–2</text>
  <rect x="220" y="401" width="12" height="12" rx="2" fill="rgba(243,156,18,0.5)"/>
  <text x="238" y="412" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">Work Package</text>

  <text x="350" y="430" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">규칙: 100% Rule — 상위 항목 = 하위 항목 전체 합</text>
</svg>
