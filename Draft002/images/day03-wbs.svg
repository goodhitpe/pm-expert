<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" width="700" height="440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="url(#bg)" rx="12"/>
  <text x="350" y="32" text-anchor="middle" fill="#f39c12" font-size="17" font-family="Arial,sans-serif" font-weight="bold">Day 03 — WBS (Work Breakdown Structure)</text>

  <!-- Level 0: Project -->
  <rect x="250" y="55" width="200" height="46" rx="8" fill="#6c63ff"/>
  <text x="350" y="74" text-anchor="middle" fill="white" font-size="13" font-family="Arial,sans-serif" font-weight="bold">📦 모바일 뱅킹 앱</text>
  <text x="350" y="92" text-anchor="middle" fill="#ddd" font-size="10" font-family="Arial,sans-serif">Level 0 — 프로젝트</text>

  <!-- Level 1 connectors -->
  <line x1="350" y1="101" x2="350" y2="120" stroke="#888" stroke-width="1.5"/>
  <line x1="100" y1="120" x2="600" y2="120" stroke="#888" stroke-width="1.5"/>
  <line x1="100" y1="120" x2="100" y2="140" stroke="#888" stroke-width="1.5"/>
  <line x1="250" y1="120" x2="250" y2="140" stroke="#888" stroke-width="1.5"/>
  <line x1="450" y1="120" x2="450" y2="140" stroke="#888" stroke-width="1.5"/>
  <line x1="600" y1="120" x2="600" y2="140" stroke="#888" stroke-width="1.5"/>

  <!-- Level 1: 4 items -->
  <rect x="30" y="140" width="140" height="40" rx="7" fill="#00d4aa"/>
  <text x="100" y="156" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">1. 기획·분석</text>
  <text x="100" y="172" text-anchor="middle" fill="#ddd" font-size="9" font-family="Arial,sans-serif">Level 1</text>

  <rect x="178" y="140" width="145" height="40" rx="7" fill="#00d4aa"/>
  <text x="250" y="156" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">2. 설계</text>
  <text x="250" y="172" text-anchor="middle" fill="#ddd" font-size="9" font-family="Arial,sans-serif">Level 1</text>

  <rect x="377" y="140" width="145" height="40" rx="7" fill="#00d4aa"/>
  <text x="450" y="156" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">3. 개발</text>
