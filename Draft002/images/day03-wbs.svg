  <text x="55" y="254" text-anchor="middle" fill="#e0e0e0" font-size="8" font-family="Arial,sans-serif">요구사항 수집</text>
  <rect x="110" y="226" width="70" height="36" rx="5" fill="rgba(0,212,170,0.3)" stroke="#00d4aa" stroke-width="1"/>
