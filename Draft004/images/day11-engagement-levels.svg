<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>

  <text x="360" y="28" text-anchor="middle" fill="#e0e0ff" font-size="16" font-weight="bold">이해관계자 분석 — 영향력/이해도 그리드</text>
  <text x="360" y="46" text-anchor="middle" fill="#9090c0" font-size="10.5">Power/Interest Grid — 이해관계자 전략 매핑</text>

  <!-- Axes -->
  <!-- Y axis: Power (영향력) -->
  <line x1="90" y1="60"  x2="90"  y2="310" stroke="#6060a0" stroke-width="1.5"/>
  <polygon points="90,55 85,70 95,70" fill="#6060a0"/>
  <text x="40" y="185" text-anchor="middle" fill="#8080c0" font-size="10" font-weight="bold" transform="rotate(-90,40,185)">영향력 (Power)</text>
  <text x="68" y="68" text-anchor="end" fill="#9090c0" font-size="9">높음</text>
  <text x="68" y="308" text-anchor="end" fill="#9090c0" font-size="9">낮음</text>

  <!-- X axis: Interest (이해도) -->
  <line x1="90"  y1="310" x2="700" y2="310" stroke="#6060a0" stroke-width="1.5"/>
  <polygon points="705,310 690,305 690,315" fill="#6060a0"/>
  <text x="395" y="340" text-anchor="middle" fill="#8080c0" font-size="10" font-weight="bold">이해도 / 관심도 (Interest)</text>
  <text x="106" y="328" text-anchor="middle" fill="#9090c0" font-size="9">낮음</text>
  <text x="688" y="328" text-anchor="middle" fill="#9090c0" font-size="9">높음</text>

  <!-- Divider lines -->
  <line x1="90" y1="185" x2="700" y2="185" stroke="#3a3a6a" stroke-width="1" stroke-dasharray="6,4" opacity="0.7"/>
  <line x1="395" y1="60" x2="395" y2="310" stroke="#3a3a6a" stroke-width="1" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- Quadrant 1: High Power, Low Interest — Keep Satisfied -->
  <rect x="95"  y="65"  width="295" height="115" rx="8" fill="#2a1a1a" opacity="0.75" stroke="#8a3a3a" stroke-width="1"/>
  <text x="242" y="87"  text-anchor="middle" fill="#ff9070" font-size="11" font-weight="bold">👑 충족 유지 (Keep Satisfied)</text>
  <text x="242" y="101" text-anchor="middle" fill="#804040" font-size="9">★ 영향력 高 · 관심 低</text>
  <text x="105" y="120" fill="#c07060" font-size="9">• 고위 임원, 규제 기관</text>
  <text x="105" y="134" fill="#c07060" font-size="9">• 주요 스폰서 (상황 업데이트만)</text>
  <text x="105" y="148" fill="#c07060" font-size="9">• 핵심 보고서·요약 정기 제공</text>
  <text x="105" y="162" fill="#c07060" font-size="9">• 주의: 무시 시 갑작스런 저항 가능</text>
  <rect x="105" y="168" width="275" height="4" rx="2" fill="#cc5555" opacity="0.5"/>

  <!-- Quadrant 2: High Power, High Interest — Manage Closely -->
  <rect x="400" y="65"  width="295" height="115" rx="8" fill="#1a2a1a" opacity="0.75" stroke="#3aac6a" stroke-width="1.5"/>
  <text x="547" y="87"  text-anchor="middle" fill="#7dff9a" font-size="11" font-weight="bold">⭐ 긴밀 관리 (Manage Closely)</text>
  <text x="547" y="101" text-anchor="middle" fill="#3a8a5a" font-size="9">★★ 영향력 高 · 관심 高</text>
  <text x="410" y="120" fill="#7dff9a" font-size="9">• 핵심 의사결정자, 이사회</text>
  <text x="410" y="134" fill="#7dff9a" font-size="9">• 직접 고객·최종 사용자 (파워 有)</text>
  <text x="410" y="148" fill="#7dff9a" font-size="9">• 최우선 커뮤니케이션 대상</text>
  <text x="410" y="162" fill="#7dff9a" font-size="9">• 의사결정 루프에 반드시 포함</text>
  <rect x="410" y="168" width="275" height="4" rx="2" fill="#3aac6a" opacity="0.7"/>

  <!-- Quadrant 3: Low Power, Low Interest — Monitor -->
  <rect x="95"  y="190" width="295" height="115" rx="8" fill="#1a1a2a" opacity="0.75" stroke="#4a4a7a" stroke-width="1"/>
  <text x="242" y="212" text-anchor="middle" fill="#7080c0" font-size="11" font-weight="bold">📡 모니터링 (Monitor)</text>
  <text x="242" y="226" text-anchor="middle" fill="#4a5a8a" font-size="9">★ 영향력 低 · 관심 低</text>
  <text x="105" y="245" fill="#6070a0" font-size="9">• 간접 이해관계자</text>
  <text x="105" y="259" fill="#6070a0" font-size="9">• 일반 공중, 지역 주민</text>
  <text x="105" y="273" fill="#6070a0" font-size="9">• 최소한의 정기 업데이트</text>
  <text x="105" y="287" fill="#6070a0" font-size="9">• 갑작스런 관심 증폭 감시 필요</text>
  <rect x="105" y="292" width="275" height="4" rx="2" fill="#4a4a7a" opacity="0.5"/>

  <!-- Quadrant 4: Low Power, High Interest — Keep Informed -->
  <rect x="400" y="190" width="295" height="115" rx="8" fill="#1a2a3a" opacity="0.75" stroke="#3a6aac" stroke-width="1"/>
  <text x="547" y="212" text-anchor="middle" fill="#7ab8ff" font-size="11" font-weight="bold">📢 정보 제공 (Keep Informed)</text>
  <text x="547" y="226" text-anchor="middle" fill="#3a5a8a" font-size="9">★ 영향력 低 · 관심 高</text>
  <text x="410" y="245" fill="#7090c0" font-size="9">• 실무 팀원, 현업 사용자</text>
  <text x="410" y="259" fill="#7090c0" font-size="9">• 언론, 소셜미디어 인플루언서</text>
  <text x="410" y="273" fill="#7090c0" font-size="9">• 정기 내용 공유·질문 응답</text>
  <text x="410" y="287" fill="#7090c0" font-size="9">• 영향력 증가 시 재분류 검토</text>
  <rect x="410" y="292" width="275" height="4" rx="2" fill="#3a6aac" opacity="0.5"/>

  <!-- PM Tip -->
  <rect x="10" y="348" width="700" height="42" rx="10" fill="#1a1a2a" opacity="0.85" stroke="#2a2a4a" stroke-width="1"/>
  <text x="360" y="364" text-anchor="middle" fill="#c0d0f0" font-size="11" font-weight="bold">PM 핵심 원칙 — 이해관계자 분석 실무</text>
  <text x="100" y="382" text-anchor="middle" fill="#7070a0" font-size="8.5">식별 → 분류 → 전략 수립</text>
  <text x="300" y="382" text-anchor="middle" fill="#7070a0" font-size="8.5">프로젝트 생애주기 중 변경 가능</text>
  <text x="500" y="382" text-anchor="middle" fill="#7070a0" font-size="8.5">Manage Closely 그룹 우선 집중</text>
  <text x="650" y="382" text-anchor="middle" fill="#7070a0" font-size="8.5">부정적 이해관계자도 식별 필수</text>
</svg>
