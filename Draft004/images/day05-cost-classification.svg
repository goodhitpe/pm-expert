<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 390" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="390" fill="url(#bg)" rx="12"/>

  <text x="360" y="29" text-anchor="middle" fill="#e0e0ff" font-size="16" font-weight="bold">원가 유형 분류 체계</text>
  <text x="360" y="47" text-anchor="middle" fill="#9090c0" font-size="10.5">직접/간접 · 고정/변동 · 매몰/기회비용 — PM 예산 관리 핵심</text>

  <!-- Direct vs Indirect -->
  <rect x="15" y="60" width="335" height="148" rx="10" fill="#1a2a5c" opacity="0.82" stroke="#3a5aac" stroke-width="1.5"/>
  <text x="182" y="78" text-anchor="middle" fill="#7ab8ff" font-size="12" font-weight="bold">직접비 vs 간접비</text>
  <line x1="25" y1="84" x2="340" y2="84" stroke="#3a5aac" stroke-width="0.7" opacity="0.6"/>

  <rect x="25"  y="90" width="150" height="108" rx="7" fill="#12182e" opacity="0.8"/>
  <text x="100" y="106" text-anchor="middle" fill="#4090ff" font-size="10.5" font-weight="bold">직접비 (Direct)</text>
  <text x="100" y="120" text-anchor="middle" fill="#6a9a80" font-size="8.5">특정 작업에 직접 귀속</text>
  <text x="100" y="136" text-anchor="middle" fill="#7090b0" font-size="8">• 전담 인력 인건비</text>
  <text x="100" y="149" text-anchor="middle" fill="#7090b0" font-size="8">• 특정 장비·소프트웨어</text>
  <text x="100" y="162" text-anchor="middle" fill="#7090b0" font-size="8">• 출장비·교육 훈련비</text>
  <text x="100" y="176" text-anchor="middle" fill="#7090b0" font-size="8">• 외주 용역비</text>
  <text x="100" y="192" text-anchor="middle" fill="#506090" font-size="7.5">추적·측정 직접 가능</text>

  <rect x="182" y="90" width="148" height="108" rx="7" fill="#12182e" opacity="0.8"/>
  <text x="256" y="106" text-anchor="middle" fill="#80b8ff" font-size="10.5" font-weight="bold">간접비 (Indirect)</text>
  <text x="256" y="120" text-anchor="middle" fill="#6a9a80" font-size="8.5">여러 프로젝트 공동 귀속</text>
  <text x="256" y="136" text-anchor="middle" fill="#7090b0" font-size="8">• 사무실 임대료·관리비</text>
  <text x="256" y="149" text-anchor="middle" fill="#7090b0" font-size="8">• 공용 인프라 비용</text>
  <text x="256" y="162" text-anchor="middle" fill="#7090b0" font-size="8">• 간접 인력(HR, 법무)</text>
  <text x="256" y="176" text-anchor="middle" fill="#7090b0" font-size="8">• 보험·감가상각</text>
  <text x="256" y="192" text-anchor="middle" fill="#506090" font-size="7.5">배분율 적용으로 계산</text>

  <!-- Fixed vs Variable -->
  <rect x="370" y="60" width="335" height="148" rx="10" fill="#1a3a2a" opacity="0.82" stroke="#3aac6a" stroke-width="1.5"/>
  <text x="537" y="78" text-anchor="middle" fill="#7dff9a" font-size="12" font-weight="bold">고정비 vs 변동비</text>
  <line x1="380" y1="84" x2="695" y2="84" stroke="#3aac6a" stroke-width="0.7" opacity="0.6"/>

  <rect x="380" y="90" width="150" height="108" rx="7" fill="#12201a" opacity="0.8"/>
  <text x="455" y="106" text-anchor="middle" fill="#40cc60" font-size="10.5" font-weight="bold">고정비 (Fixed)</text>
  <text x="455" y="120" text-anchor="middle" fill="#6a9a70" font-size="8.5">생산량과 무관하게 발생</text>
  <text x="455" y="136" text-anchor="middle" fill="#70a080" font-size="8">• 서버 월정 임대료</text>
  <text x="455" y="149" text-anchor="middle" fill="#70a080" font-size="8">• 감가상각비</text>
  <text x="455" y="162" text-anchor="middle" fill="#70a080" font-size="8">• 기본 라이선스 비용</text>
  <text x="455" y="176" text-anchor="middle" fill="#70a080" font-size="8">• 정규직 기본급</text>
  <text x="455" y="192" text-anchor="middle" fill="#409060" font-size="7.5">예측 가능, 통제 어려움</text>

  <rect x="540" y="90" width="150" height="108" rx="7" fill="#12201a" opacity="0.8"/>
  <text x="615" y="106" text-anchor="middle" fill="#80ff90" font-size="10.5" font-weight="bold">변동비 (Variable)</text>
  <text x="615" y="120" text-anchor="middle" fill="#6a9a70" font-size="8.5">생산량 따라 비례 변동</text>
  <text x="615" y="136" text-anchor="middle" fill="#70a080" font-size="8">• 시간제 인건비</text>
  <text x="615" y="149" text-anchor="middle" fill="#70a080" font-size="8">• 클라우드 사용량 비용</text>
  <text x="615" y="162" text-anchor="middle" fill="#70a080" font-size="8">• 자재·소모품비</text>
  <text x="615" y="176" text-anchor="middle" fill="#70a080" font-size="8">• 초과 근무수당</text>
  <text x="615" y="192" text-anchor="middle" fill="#409060" font-size="7.5">범위 변경 시 즉각 영향</text>

  <!-- Sunk & Opportunity -->
  <rect x="15" y="220" width="335" height="86" rx="10" fill="#3a1a1a" opacity="0.82" stroke="#8a2a2a" stroke-width="1.5"/>
  <text x="182" y="237" text-anchor="middle" fill="#ff7070" font-size="12" font-weight="bold">매몰 비용 (Sunk Cost)</text>
  <text x="30" y="254" fill="#c06060" font-size="9">이미 지출되어 회수 불가능한 비용</text>
  <text x="30" y="270" fill="#a05050" font-size="8.5">예: 이미 구매한 라이선스, 실패한 프로토타입 개발비</text>
  <rect x="30" y="278" width="305" height="20" rx="5" fill="#2a1010" opacity="0.8"/>
  <text x="182" y="291" text-anchor="middle" fill="#ff9090" font-size="9" font-weight="bold">⚠️ PM 원칙: 매몰비용은 미래 의사결정에서 무시해야 함</text>
  <text x="30"  y="300" fill="#904040" font-size="8">→ "이미 4억을 썼으니 계속 진행" — 잘못된 논리 (Concorde Fallacy)</text>

  <!-- Opportunity Cost -->
  <rect x="370" y="220" width="335" height="86" rx="10" fill="#2a1a5c" opacity="0.82" stroke="#5a5aac" stroke-width="1.5"/>
  <text x="537" y="237" text-anchor="middle" fill="#a0a0ff" font-size="12" font-weight="bold">기회 비용 (Opportunity Cost)</text>
  <text x="385" y="254" fill="#8080c0" font-size="9">선택 시 포기한 대안의 가치</text>
  <text x="385" y="270" fill="#6060a0" font-size="8.5">예: 프로젝트 A 선택으로 포기된 프로젝트 B의 기대 이익</text>
  <rect x="385" y="278" width="305" height="20" rx="5" fill="#1a1030" opacity="0.8"/>
  <text x="537" y="291" text-anchor="middle" fill="#c0c0ff" font-size="9" font-weight="bold">💡 PM 원칙: 포트폴리오 선택 시 기회비용 반드시 고려</text>
  <text x="385" y="300" fill="#5050a0" font-size="8">→ NPV, ROI, IRR로 프로젝트 우선순위 비교 결정</text>

  <!-- Key principle -->
  <rect x="15" y="318" width="690" height="56" rx="10" fill="#1a1a2a" opacity="0.8" stroke="#2a2a5a" stroke-width="1"/>
  <text x="360" y="336" text-anchor="middle" fill="#c0c0e0" font-size="11" font-weight="bold">PM 원가 분류의 실무 중요성</text>
  <text x="75"  y="356" text-anchor="middle" fill="#7070a0" font-size="9">예산 편성 정확도↑</text>
  <text x="75"  y="368" text-anchor="middle" fill="#606090" font-size="8">직접비·간접비 구분</text>
  <text x="225" y="356" text-anchor="middle" fill="#7070a0" font-size="9">손익분기 분석</text>
  <text x="225" y="368" text-anchor="middle" fill="#606090" font-size="8">고정비·변동비 파악</text>
  <text x="360" y="356" text-anchor="middle" fill="#7070a0" font-size="9">합리적 의사결정</text>
  <text x="360" y="368" text-anchor="middle" fill="#606090" font-size="8">기회비용 비교</text>
  <text x="500" y="356" text-anchor="middle" fill="#7070a0" font-size="9">프로젝트 중단 판단</text>
  <text x="500" y="368" text-anchor="middle" fill="#606090" font-size="8">매몰비용 무시 원칙</text>
  <text x="645" y="356" text-anchor="middle" fill="#7070a0" font-size="9">계약 협상 전략</text>
  <text x="645" y="368" text-anchor="middle" fill="#606090" font-size="8">원가 구조 이해</text>
</svg>
