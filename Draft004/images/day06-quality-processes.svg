<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 390" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="390" fill="url(#bg)" rx="12"/>

  <text x="360" y="29" text-anchor="middle" fill="#e0e0ff" font-size="16" font-weight="bold">PMBOK 품질 관리 프로세스 흐름</text>
  <text x="360" y="47" text-anchor="middle" fill="#9090c0" font-size="10.5">Plan Quality → Manage Quality → Control Quality → 지속적 개선</text>

  <!-- Process 1: Plan Q Management -->
  <rect x="15"  y="62" width="205" height="130" rx="10" fill="#1a2a5c" opacity="0.85" stroke="#3a5aac" stroke-width="1.5"/>
  <text x="117" y="81"  text-anchor="middle" fill="#7ab8ff" font-size="11" font-weight="bold">① 품질 관리 계획수립</text>
  <text x="117" y="94"  text-anchor="middle" fill="#4a78ac" font-size="9">Plan Quality Management</text>
  <line x1="25" y1="100" x2="210" y2="100" stroke="#3a5aac" stroke-width="0.7" opacity="0.5"/>
  <text x="25" y="116" fill="#90b8e0" font-size="8.5">📥 입력:</text>
  <text x="25" y="129" fill="#7090b0" font-size="8">• 프로젝트 헌장·범위기준선</text>
  <text x="25" y="141" fill="#7090b0" font-size="8">• 이해관계자 등록부</text>
  <text x="25" y="153" fill="#7090b0" font-size="8">• 리스크 등록부</text>
  <text x="25" y="168" fill="#b0d0f0" font-size="8.5">📤 산출물:</text>
  <text x="25" y="181" fill="#70a0d0" font-size="8" font-weight="bold">✅ 품질 관리 계획서(QMP)</text>
  <text x="25" y="192" fill="#70a0d0" font-size="8">품질 지표 (Quality Metrics)</text>

  <!-- arrow 1→2 -->
  <polygon points="221,127 235,122 235,132" fill="#6080c0"/>
  <line x1="220" y1="127" x2="235" y2="127" stroke="#6080c0" stroke-width="1.8"/>

  <!-- Process 2: Manage Q -->
  <rect x="237" y="62" width="245" height="130" rx="10" fill="#1a3a2a" opacity="0.85" stroke="#3aac6a" stroke-width="1.5"/>
  <text x="359" y="81"  text-anchor="middle" fill="#7dff9a" font-size="11" font-weight="bold">② 품질 관리 수행</text>
  <text x="359" y="94"  text-anchor="middle" fill="#3a8a5a" font-size="9">Manage Quality (PMBOK 6판: Perform QA)</text>
  <line x1="247" y1="100" x2="472" y2="100" stroke="#3aac6a" stroke-width="0.7" opacity="0.5"/>
  <text x="249" y="116" fill="#60c080" font-size="8.5">📥 입력: QMP, 품질 지표, 교훈 등록부</text>
  <text x="249" y="132" fill="#7090b0" font-size="8.5">🔧 도구 &amp; 기법:</text>
  <text x="258" y="145" fill="#6aaa80" font-size="8">• 품질 감사(Quality Audit)</text>
  <text x="258" y="157" fill="#6aaa80" font-size="8">• 프로세스 분석 (근본원인 분석)</text>
  <text x="258" y="169" fill="#6aaa80" font-size="8">• 설계 for X (DFX)</text>
  <text x="249" y="184" fill="#80d090" font-size="8.5" font-weight="bold">📤 산출물: 품질 보고서, 변경 요청, 교훈</text>

  <!-- arrow 2→3 -->
  <polygon points="484,127 498,122 498,132" fill="#6080c0"/>
  <line x1="483" y1="127" x2="498" y2="127" stroke="#6080c0" stroke-width="1.8"/>

  <!-- Process 3: Control Q -->
  <rect x="500" y="62" width="205" height="130" rx="10" fill="#2a1a5c" opacity="0.85" stroke="#7a3aac" stroke-width="1.5"/>
  <text x="602" y="81"  text-anchor="middle" fill="#c084f5" font-size="11" font-weight="bold">③ 품질 통제</text>
  <text x="602" y="94"  text-anchor="middle" fill="#6a3a9a" font-size="9">Control Quality</text>
  <line x1="510" y1="100" x2="695" y2="100" stroke="#7a3aac" stroke-width="0.7" opacity="0.5"/>
  <text x="512" y="116" fill="#a080d0" font-size="8.5">📥 입력: 납품물, 품질 지표, QMP</text>
  <text x="512" y="132" fill="#7090b0" font-size="8.5">🔧 도구 &amp; 기법:</text>
  <text x="521" y="145" fill="#b090e0" font-size="8">• 관리도(Control Chart)</text>
  <text x="521" y="157" fill="#b090e0" font-size="8">• 파레토 차트 분석</text>
  <text x="521" y="169" fill="#b090e0" font-size="8">• 체크시트, 산점도</text>
  <text x="512" y="184" fill="#c080f0" font-size="8.5" font-weight="bold">📤 산출물: 검증된 납품물</text>

  <!-- Feedback arrow bottom -->
  <path d="M 602 192 Q 602 230 360 230 Q 118 230 118 192" fill="none" stroke="#4060a0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="118,190 115,200 124,197" fill="#4060a0"/>
  <text x="360" y="244" text-anchor="middle" fill="#5060a0" font-size="9">← 결함 발견 시 품질 관리 계획 재수립 (Change Request 프로세스)</text>

  <!-- COQ Section -->
  <rect x="15" y="260" width="688" height="114" rx="10" fill="#2a1a1a" opacity="0.82" stroke="#6a2a2a" stroke-width="1.2"/>
  <text x="360" y="278" text-anchor="middle" fill="#f0c0a0" font-size="12" font-weight="bold">품질 비용 (COQ: Cost of Quality)</text>

  <!-- Prevention -->
  <rect x="26" y="286" width="155" height="76" rx="7" fill="#12201a" opacity="0.8" stroke="#2a5a3a" stroke-width="1"/>
  <text x="103" y="301" text-anchor="middle" fill="#7dff9a" font-size="9.5" font-weight="bold">예방 비용</text>
  <text x="103" y="314" text-anchor="middle" fill="#4a8060" font-size="8">Prevention Costs</text>
  <text x="103" y="329" text-anchor="middle" fill="#70a070" font-size="8">훈련·교육</text>
  <text x="103" y="341" text-anchor="middle" fill="#70a070" font-size="8">프로세스 문서화</text>
  <text x="103" y="353" text-anchor="middle" fill="#70a070" font-size="8">품질 계획</text>
  <text x="103" y="357" text-anchor="middle" fill="#3a702a" font-size="7.5">→ 투자 대비 효과 최고</text>

  <!-- Appraisal -->
  <rect x="191" y="286" width="155" height="76" rx="7" fill="#12182e" opacity="0.8" stroke="#2a3a7a" stroke-width="1"/>
  <text x="268" y="301" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">평가 비용</text>
  <text x="268" y="314" text-anchor="middle" fill="#3a5a8a" font-size="8">Appraisal Costs</text>
  <text x="268" y="329" text-anchor="middle" fill="#6090b0" font-size="8">검사·테스트</text>
  <text x="268" y="341" text-anchor="middle" fill="#6090b0" font-size="8">감사·인증</text>
  <text x="268" y="353" text-anchor="middle" fill="#6090b0" font-size="8">공급업체 평가</text>
  <text x="268" y="357" text-anchor="middle" fill="#3a608a" font-size="7.5">→ 중간 수준 비용</text>

  <!-- Internal failure -->
  <rect x="356" y="286" width="170" height="76" rx="7" fill="#2a1a12" opacity="0.8" stroke="#7a3a2a" stroke-width="1"/>
  <text x="441" y="301" text-anchor="middle" fill="#ffa040" font-size="9.5" font-weight="bold">내부 실패 비용</text>
  <text x="441" y="314" text-anchor="middle" fill="#7a4a1a" font-size="8">Internal Failure (납품 전)</text>
  <text x="441" y="329" text-anchor="middle" fill="#c07040" font-size="8">재작업·폐기</text>
  <text x="441" y="341" text-anchor="middle" fill="#c07040" font-size="8">디버깅·수정</text>
  <text x="441" y="353" text-anchor="middle" fill="#c07040" font-size="8">일정 지연</text>
  <text x="441" y="357" text-anchor="middle" fill="#a06030" font-size="7.5">→ 높음·예방으로 감소</text>

  <!-- External failure -->
  <rect x="536" y="286" width="158" height="76" rx="7" fill="#2a1212" opacity="0.8" stroke="#8a2a2a" stroke-width="1"/>
  <text x="615" y="301" text-anchor="middle" fill="#ff7070" font-size="9.5" font-weight="bold">외부 실패 비용</text>
  <text x="615" y="314" text-anchor="middle" fill="#7a2a2a" font-size="8">External Failure (납품 후)</text>
  <text x="615" y="329" text-anchor="middle" fill="#e06060" font-size="8">클레임·환불</text>
  <text x="615" y="341" text-anchor="middle" fill="#e06060" font-size="8">보증·리콜</text>
  <text x="615" y="353" text-anchor="middle" fill="#e06060" font-size="8">평판 손상</text>
  <text x="615" y="357" text-anchor="middle" fill="#c04040" font-size="7.5">→ 가장 비쌈·최악</text>
</svg>
