<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="480" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">PM 관점 보안 적용 — Security by Design in SDLC</text>
  <text x="360" y="50" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">소프트웨어 개발 생명주기(SDLC) 각 단계에 보안 활동을 통합하여 비용 효율적 보안 구현</text>

  <!-- SDLC Timeline arrow -->
  <line x1="40" y1="80" x2="680" y2="80" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="700" y="84" font-family="Arial" font-size="9" fill="#64748b">시간</text>

  <!-- Phase 1: Requirements -->
  <rect x="28" y="90" width="100" height="168" rx="6" fill="#1a3a1a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="28" y="90" width="100" height="28" rx="6" fill="#14532d"/>
  <text x="78" y="109" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">① 요구사항</text>
  <text x="78" y="132" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">보안 요구사항</text>
  <text x="78" y="146" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">명세</text>
  <text x="40" y="164" font-family="Arial" font-size="9" fill="#86efac">• 기밀성/무결성/</text>
  <text x="40" y="177" font-family="Arial" font-size="9" fill="#86efac">  가용성 요구 정의</text>
  <text x="40" y="191" font-family="Arial" font-size="9" fill="#86efac">• 규정 준수 식별</text>
  <text x="40" y="205" font-family="Arial" font-size="9" fill="#86efac">  (GDPR, PIPA)</text>
  <text x="40" y="219" font-family="Arial" font-size="9" fill="#86efac">• DPIA/PIA 착수</text>
  <text x="40" y="233" font-family="Arial" font-size="9" fill="#86efac">• 보안 정책 검토</text>
  <text x="78" y="252" font-family="Arial" font-size="9" fill="#22c55e" text-anchor="middle">⚡ 비용 최소</text>

  <!-- Phase 2: Design -->
  <rect x="136" y="90" width="106" height="168" rx="6" fill="#1e2a3a" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="136" y="90" width="106" height="28" rx="6" fill="#1e3a5f"/>
  <text x="189" y="109" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">② 설계</text>
  <text x="189" y="132" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">보안 아키텍처</text>
  <text x="189" y="146" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">설계</text>
  <text x="148" y="164" font-family="Arial" font-size="9" fill="#93c5fd">• Threat Modeling</text>
  <text x="148" y="177" font-family="Arial" font-size="9" fill="#93c5fd">  (STRIDE)</text>
  <text x="148" y="191" font-family="Arial" font-size="9" fill="#93c5fd">• 최소 권한 원칙</text>
  <text x="148" y="205" font-family="Arial" font-size="9" fill="#93c5fd">• 암호화 전략</text>
  <text x="148" y="219" font-family="Arial" font-size="9" fill="#93c5fd">• 인증/인가 설계</text>
  <text x="148" y="233" font-family="Arial" font-size="9" fill="#93c5fd">• 보안 패턴 적용</text>
  <text x="189" y="252" font-family="Arial" font-size="9" fill="#3b82f6" text-anchor="middle">초기 위협 제거</text>

  <!-- Phase 3: Development -->
  <rect x="250" y="90" width="110" height="168" rx="6" fill="#2e1065" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="250" y="90" width="110" height="28" rx="6" fill="#3b0764"/>
  <text x="305" y="109" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">③ 개발</text>
  <text x="305" y="132" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">시큐어 코딩</text>
  <text x="305" y="146" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">구현</text>
  <text x="262" y="164" font-family="Arial" font-size="9" fill="#c4b5fd">• OWASP Top 10</text>
  <text x="262" y="177" font-family="Arial" font-size="9" fill="#c4b5fd">  대응 코딩</text>
  <text x="262" y="191" font-family="Arial" font-size="9" fill="#c4b5fd">• Input Validation</text>
  <text x="262" y="205" font-family="Arial" font-size="9" fill="#c4b5fd">• 하드코딩 금지</text>
  <text x="262" y="219" font-family="Arial" font-size="9" fill="#c4b5fd">• SAST 도구 활용</text>
  <text x="262" y="233" font-family="Arial" font-size="9" fill="#c4b5fd">• 코드 리뷰 의무</text>
  <text x="305" y="252" font-family="Arial" font-size="9" fill="#a855f7" text-anchor="middle">결함 조기 발견</text>

  <!-- Phase 4: Testing -->
  <rect x="368" y="90" width="110" height="168" rx="6" fill="#3a1a06" stroke="#f97316" stroke-width="1.5"/>
  <rect x="368" y="90" width="110" height="28" rx="6" fill="#4a2206"/>
  <text x="423" y="109" font-family="Arial" font-size="11" font-weight="bold" fill="#fb923c" text-anchor="middle">④ 테스트</text>
  <text x="423" y="132" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">보안 취약점</text>
  <text x="423" y="146" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">검증</text>
  <text x="380" y="164" font-family="Arial" font-size="9" fill="#fb923c">• DAST 동적 분석</text>
  <text x="380" y="177" font-family="Arial" font-size="9" fill="#fb923c">• 침투 테스트</text>
  <text x="380" y="191" font-family="Arial" font-size="9" fill="#fb923c">  (Penetration)</text>
  <text x="380" y="205" font-family="Arial" font-size="9" fill="#fb923c">• 결함 수정 확인</text>
  <text x="380" y="219" font-family="Arial" font-size="9" fill="#fb923c">• 보안 테스트 자동화</text>
  <text x="380" y="233" font-family="Arial" font-size="9" fill="#fb923c">• 컴플라이언스 검사</text>
  <text x="423" y="252" font-family="Arial" font-size="9" fill="#f97316" text-anchor="middle">출시 전 검증</text>

  <!-- Phase 5: Deploy -->
  <rect x="486" y="90" width="104" height="168" rx="6" fill="#3a1a1a" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="486" y="90" width="104" height="28" rx="6" fill="#450a0a"/>
  <text x="538" y="109" font-family="Arial" font-size="11" font-weight="bold" fill="#f87171" text-anchor="middle">⑤ 배포</text>
  <text x="538" y="132" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">안전한 배포</text>
  <text x="538" y="146" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">프로세스</text>
  <text x="498" y="164" font-family="Arial" font-size="9" fill="#f87171">• 암호화 배포</text>
  <text x="498" y="177" font-family="Arial" font-size="9" fill="#f87171">  파이프라인</text>
  <text x="498" y="191" font-family="Arial" font-size="9" fill="#f87171">• 환경 분리</text>
  <text x="498" y="205" font-family="Arial" font-size="9" fill="#f87171">  (Dev/Stage/Prod)</text>
  <text x="498" y="219" font-family="Arial" font-size="9" fill="#f87171">• 롤백 계획</text>
  <text x="498" y="233" font-family="Arial" font-size="9" fill="#f87171">• 배포 후 검증</text>
  <text x="538" y="252" font-family="Arial" font-size="9" fill="#ef4444" text-anchor="middle">배포 보안성</text>

  <!-- Phase 6: Operations -->
  <rect x="598" y="90" width="114" height="168" rx="6" fill="#2a1a3a" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="598" y="90" width="114" height="28" rx="6" fill="#3b1e5f"/>
  <text x="655" y="109" font-family="Arial" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">⑥ 운영</text>
  <text x="655" y="132" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">지속적 보안</text>
  <text x="655" y="146" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">모니터링</text>
  <text x="610" y="164" font-family="Arial" font-size="9" fill="#a78bfa">• SIEM 로그 모니터</text>
  <text x="610" y="177" font-family="Arial" font-size="9" fill="#a78bfa">• 패치 관리</text>
  <text x="610" y="191" font-family="Arial" font-size="9" fill="#a78bfa">• 침해사고 대응</text>
  <text x="610" y="205" font-family="Arial" font-size="9" fill="#a78bfa">  (IR Plan)</text>
  <text x="610" y="219" font-family="Arial" font-size="9" fill="#a78bfa">• 취약점 공시 대응</text>
  <text x="610" y="233" font-family="Arial" font-size="9" fill="#a78bfa">• 보안 감사 주기</text>
  <text x="655" y="252" font-family="Arial" font-size="9" fill="#8b5cf6" text-anchor="middle">지속적 관리</text>

  <!-- Cost of Fix chart (bar) -->
  <rect x="28" y="276" width="664" height="60" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="296" font-family="Arial" font-size="11" font-weight="bold" fill="#fbbf24">보안 결함 발견 단계별 수정 비용 (IBM Systems Science Institute)</text>
  <rect x="50" y="305" width="16" height="22" fill="#22c55e" rx="2"/>
  <text x="72" y="320" font-family="Arial" font-size="9" fill="#4ade80">요구사항: 1x</text>
  <rect x="140" y="300" width="20" height="27" fill="#3b82f6" rx="2"/>
  <text x="166" y="320" font-family="Arial" font-size="9" fill="#93c5fd">설계: 3x</text>
  <rect x="230" y="295" width="26" height="32" fill="#a855f7" rx="2"/>
  <text x="262" y="320" font-family="Arial" font-size="9" fill="#c4b5fd">개발: 6x</text>
  <rect x="330" y="286" width="30" height="41" fill="#f97316" rx="2"/>
  <text x="366" y="320" font-family="Arial" font-size="9" fill="#fb923c">테스트: 15x</text>
  <rect x="440" y="272" width="36" height="55" fill="#ef4444" rx="2"/>
  <text x="482" y="320" font-family="Arial" font-size="9" fill="#f87171">배포후: 30x</text>
  <rect x="560" y="258" width="44" height="69" fill="#8b5cf6" rx="2"/>
  <text x="610" y="320" font-family="Arial" font-size="9" fill="#a78bfa">운영중: 100x</text>

  <!-- SBOM and PM Key Points -->
  <rect x="28" y="352" width="664" height="120" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="360" y="372" font-family="Arial" font-size="12" font-weight="bold" fill="#e2e8f0" text-anchor="middle">■ PM 보안 핵심 개념</text>

  <rect x="40" y="380" width="186" height="78" rx="4" fill="#1a2a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="133" y="396" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">SBOM (소프트웨어 BOM)</text>
  <text x="133" y="412" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">소프트웨어 구성 성분 목록</text>
  <text x="133" y="426" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">오픈소스 라이선스 관리</text>
  <text x="133" y="440" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">공급망 취약점 파악</text>
  <text x="133" y="452" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">→ Log4j 사태 교훈</text>

  <rect x="238" y="380" width="186" height="78" rx="4" fill="#1e2a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="331" y="396" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">DevSecOps</text>
  <text x="331" y="412" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">개발+보안+운영 통합</text>
  <text x="331" y="426" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">CI/CD 파이프라인에</text>
  <text x="331" y="440" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">보안 검사 자동화</text>
  <text x="331" y="452" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Shift Left Security</text>

  <rect x="436" y="380" width="248" height="78" rx="4" fill="#2a1a06" stroke="#f97316" stroke-width="1"/>
  <text x="560" y="396" font-family="Arial" font-size="11" font-weight="bold" fill="#fb923c" text-anchor="middle">PM의 보안 책임</text>
  <text x="560" y="412" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">• 보안 요구사항 WBS에 반영</text>
  <text x="560" y="426" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">• 보안 전문가 프로젝트 참여</text>
  <text x="560" y="440" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">• 보안 테스트 일정·예산 확보</text>
  <text x="560" y="452" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">• 보안 이슈 = 리스크 등록부 기록</text>
</svg>
