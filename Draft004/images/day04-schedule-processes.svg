<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="plan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a8c"/>
      <stop offset="100%" stop-color="#0e1f5a"/>
    </linearGradient>
    <linearGradient id="ctrl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8c1a1a"/>
      <stop offset="100%" stop-color="#5a0e0e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>

  <text x="360" y="26" text-anchor="middle" fill="#e0e0ff" font-size="14" font-weight="bold">PMBOK 6대 일정 관리 프로세스</text>
  <text x="360" y="43" text-anchor="middle" fill="#9090c0" font-size="9.5">Planning Phase (계획) × 5 + Monitoring &amp; Controlling × 1</text>

  <!-- Arrow flow background -->
  <rect x="12" y="56" width="696" height="4" rx="2" fill="#2a2a5a" opacity="0.6"/>

  <!-- Proc 1: Plan Schedule Management -->
  <rect x="12"  y="65" width="108" height="88" rx="8" fill="url(#plan)" stroke="#4a6adc" stroke-width="1.2"/>
  <text x="66"  y="84" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">① 일정 관리</text>
  <text x="66"  y="96" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">계획 수립</text>
  <text x="66"  y="112" text-anchor="middle" fill="#5080c0" font-size="8">Plan Schedule</text>
  <text x="66"  y="124" text-anchor="middle" fill="#5080c0" font-size="8">Management</text>
  <text x="66"  y="138" text-anchor="middle" fill="#4060a0" font-size="7.5">→ 일정관리 계획서</text>
  <text x="66"  y="149" text-anchor="middle" fill="#4060a0" font-size="7.5">PG: Planning</text>

  <!-- Arrow 1→2 -->
  <polyline points="120,109 134,109" fill="none" stroke="#5060a0" stroke-width="2"/>
  <polygon points="134,105 142,109 134,113" fill="#5060a0"/>

  <!-- Proc 2: Define Activities -->
  <rect x="142" y="65" width="108" height="88" rx="8" fill="url(#plan)" stroke="#4a6adc" stroke-width="1.2"/>
  <text x="196"  y="84" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">② 활동 정의</text>
  <text x="196"  y="96" text-anchor="middle" fill="#5080c0" font-size="8">Define Activities</text>
  <text x="196"  y="112" text-anchor="middle" fill="#80a8d0" font-size="7.5">• WBS → 활동 목록</text>
  <text x="196"  y="124" text-anchor="middle" fill="#80a8d0" font-size="7.5">• 마일스톤 정의</text>
  <text x="196"  y="138" text-anchor="middle" fill="#4060a0" font-size="7.5">→ 활동 목록/속성</text>
  <text x="196"  y="149" text-anchor="middle" fill="#4060a0" font-size="7.5">PG: Planning</text>

  <!-- Arrow 2→3 -->
  <polyline points="250,109 264,109" fill="none" stroke="#5060a0" stroke-width="2"/>
  <polygon points="264,105 272,109 264,113" fill="#5060a0"/>

  <!-- Proc 3: Sequence Activities -->
  <rect x="272" y="65" width="108" height="88" rx="8" fill="url(#plan)" stroke="#4a6adc" stroke-width="1.2"/>
  <text x="326"  y="84" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">③ 활동 순서</text>
  <text x="326"  y="96" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">배열</text>
  <text x="326"  y="112" text-anchor="middle" fill="#5080c0" font-size="8">Sequence Activities</text>
  <text x="326"  y="124" text-anchor="middle" fill="#80a8d0" font-size="7.5">• PDM (FS/SS/FF/SF)</text>
  <text x="326"  y="136" text-anchor="middle" fill="#80a8d0" font-size="7.5">• Lead &amp; Lag</text>
  <text x="326"  y="149" text-anchor="middle" fill="#4060a0" font-size="7.5">→ 네트워크 다이어그램</text>

  <!-- Arrow 3→4 -->
  <polyline points="380,109 394,109" fill="none" stroke="#5060a0" stroke-width="2"/>
  <polygon points="394,105 402,109 394,113" fill="#5060a0"/>

  <!-- Proc 4: Estimate Activity Durations -->
  <rect x="402" y="65" width="108" height="88" rx="8" fill="url(#plan)" stroke="#4a6adc" stroke-width="1.2"/>
  <text x="456"  y="84" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">④ 활동 기간</text>
  <text x="456"  y="96" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">산정</text>
  <text x="456"  y="112" text-anchor="middle" fill="#5080c0" font-size="8">Estimate Durations</text>
  <text x="456"  y="122" text-anchor="middle" fill="#80a8d0" font-size="7.5">• 3점 산정 (PERT)</text>
  <text x="456"  y="133" text-anchor="middle" fill="#80a8d0" font-size="7.5">• 유사 / 모수 산정</text>
  <text x="456"  y="144" text-anchor="middle" fill="#80a8d0" font-size="7.5">• 전문가 판단</text>
  <text x="456"  y="153" text-anchor="middle" fill="#4060a0" font-size="7">→ 기간 산정치</text>

  <!-- Arrow 4→5 -->
  <polyline points="510,109 524,109" fill="none" stroke="#5060a0" stroke-width="2"/>
  <polygon points="524,105 532,109 524,113" fill="#5060a0"/>

  <!-- Proc 5: Develop Schedule -->
  <rect x="532" y="65" width="108" height="88" rx="8" fill="url(#plan)" stroke="#4a6adc" stroke-width="1.2"/>
  <text x="586"  y="84" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">⑤ 일정 개발</text>
  <text x="586"  y="96" text-anchor="middle" fill="#5080c0" font-size="8">Develop Schedule</text>
  <text x="586"  y="110" text-anchor="middle" fill="#80a8d0" font-size="7.5">• CPM / CCM</text>
  <text x="586"  y="121" text-anchor="middle" fill="#80a8d0" font-size="7.5">• 일정 단축 기법</text>
  <text x="586"  y="132" text-anchor="middle" fill="#80a8d0" font-size="7.5">• 자원 최적화</text>
  <text x="586"  y="143" text-anchor="middle" fill="#80a8d0" font-size="7.5">• 간트차트 作成</text>
  <text x="586"  y="153" text-anchor="middle" fill="#4060a0" font-size="7">→ 프로젝트 일정</text>

  <!-- Proc 6: Control Schedule (M&C) -->
  <rect x="252" y="175" width="218" height="80" rx="8" fill="url(#ctrl)" stroke="#dc4a4a" stroke-width="1.5"/>
  <text x="361" y="194" text-anchor="middle" fill="#ffb0b0" font-size="11" font-weight="bold">⑥ 일정 통제</text>
  <text x="361" y="207" text-anchor="middle" fill="#c07070" font-size="8.5">Control Schedule  (M&amp;C PG)</text>
  <text x="299" y="224" text-anchor="middle" fill="#e08080" font-size="8">• SV = EV - PV</text>
  <text x="299" y="236" text-anchor="middle" fill="#e08080" font-size="8">• SPI = EV / PV</text>
  <text x="299" y="248" text-anchor="middle" fill="#e08080" font-size="8">• 일정 재기준 승인</text>
  <text x="430" y="224" text-anchor="middle" fill="#e08080" font-size="8">• 일정 예측</text>
  <text x="430" y="236" text-anchor="middle" fill="#e08080" font-size="8">• 변경 요청</text>
  <text x="430" y="248" text-anchor="middle" fill="#e08080" font-size="8">• 교훈 등록부</text>

  <!-- Control arrow from proc 5 down -->
  <polyline points="586,153 586,168 361,168 361,175" fill="none" stroke="#dc4a4a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Feedback arrow from control back -->
  <polyline points="252,215 240,215 240,109 142,109" fill="none" stroke="#dc4a4a" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="146,105 138,109 146,113" fill="#dc4a4a"/>
  <text x="225" y="165" text-anchor="middle" fill="#c05050" font-size="8" transform="rotate(-90,225,165)">변경 반영</text>

  <!-- WBS hierarchy -->
  <rect x="12" y="275" width="696" height="112" rx="10" fill="#12122a" opacity="0.8" stroke="#2a2a5a" stroke-width="1"/>
  <text x="360" y="293" text-anchor="middle" fill="#d0d0ff" font-size="11" font-weight="bold">활동 정의 계층 구조 — WBS → 활동 목록</text>
  <!-- Level 1 -->
  <rect x="298" y="303" width="124" height="28" rx="5" fill="#1a2060" stroke="#3a4a9a" stroke-width="1"/>
  <text x="360" y="322" text-anchor="middle" fill="#7ab8ff" font-size="10">프로젝트 (Level 0)</text>
  <!-- Level 2 -->
  <rect x="82"  y="348" width="120" height="26" rx="5" fill="#152060" stroke="#2a3a8a" stroke-width="1"/>
  <rect x="300" y="348" width="120" height="26" rx="5" fill="#152060" stroke="#2a3a8a" stroke-width="1"/>
  <rect x="518" y="348" width="120" height="26" rx="5" fill="#152060" stroke="#2a3a8a" stroke-width="1"/>
  <text x="142" y="365" text-anchor="middle" fill="#6090d0" font-size="9">WBS 1 인도물</text>
  <text x="360" y="365" text-anchor="middle" fill="#6090d0" font-size="9">WBS 2 인도물</text>
  <text x="578" y="365" text-anchor="middle" fill="#6090d0" font-size="9">WBS 3 인도물</text>
  <line x1="360" y1="331" x2="142" y2="348" stroke="#2a4a8a" stroke-width="1.2"/>
  <line x1="360" y1="331" x2="360" y2="348" stroke="#2a4a8a" stroke-width="1.2"/>
  <line x1="360" y1="331" x2="578" y2="348" stroke="#2a4a8a" stroke-width="1.2"/>
  <!-- Work Package label -->
  <text x="142" y="383" text-anchor="middle" fill="#4060a0" font-size="7.5">작업 패키지 → 활동 목록</text>
  <text x="360" y="383" text-anchor="middle" fill="#4060a0" font-size="7.5">작업 패키지 → 활동 목록</text>
  <text x="578" y="383" text-anchor="middle" fill="#4060a0" font-size="7.5">작업 패키지 → 활동 목록</text>
</svg>
