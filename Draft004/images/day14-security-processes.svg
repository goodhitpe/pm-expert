<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7a9ad8"/>
    </marker>
  </defs>
  <rect width="720" height="430" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="33" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">Day 14 — 보안 관리 프로세스 흐름</text>
  <text x="360" y="52" text-anchor="middle" fill="#9090c0" font-size="11">PMBOK · ISO 27001 · DevSecOps 통합 관점</text>

  <!-- Top flow: Plan → Assess → Implement → Monitor → Respond -->
  <!-- Step 1 -->
  <rect x="25"  y="68" width="125" height="90" rx="10" fill="#1a2a5c" opacity="0.85" stroke="#3a5aac" stroke-width="1.5"/>
  <text x="88"  y="90"  text-anchor="middle" fill="#58c4f6" font-size="13" font-weight="bold">① 계획</text>
  <text x="88"  y="108" text-anchor="middle" fill="#90b8d8" font-size="10">보안 정책 수립</text>
  <text x="88"  y="123" text-anchor="middle" fill="#a0c0e0" font-size="10">보안 요구사항</text>
  <text x="88"  y="138" text-anchor="middle" fill="#a0c0e0" font-size="10">위협 모델링</text>
  <text x="88"  y="152" text-anchor="middle" fill="#ffcc55" font-size="9">STRIDE 분석</text>

  <line x1="152" y1="113" x2="173" y2="113" stroke="#7a9ad8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="175" y="68" width="125" height="90" rx="10" fill="#1a3a2a" opacity="0.85" stroke="#3aac6a" stroke-width="1.5"/>
  <text x="238" y="90"  text-anchor="middle" fill="#7dff9a" font-size="13" font-weight="bold">② 평가</text>
  <text x="238" y="108" text-anchor="middle" fill="#90d090" font-size="10">취약점 스캔</text>
  <text x="238" y="123" text-anchor="middle" fill="#a0e0c0" font-size="10">침투 테스트</text>
  <text x="238" y="138" text-anchor="middle" fill="#a0e0c0" font-size="10">코드 리뷰(SAST)</text>
  <text x="238" y="152" text-anchor="middle" fill="#ffcc55" font-size="9">DAST / IAST</text>

  <line x1="302" y1="113" x2="323" y2="113" stroke="#7a9ad8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="325" y="68" width="125" height="90" rx="10" fill="#3a2a1a" opacity="0.85" stroke="#ac7a3a" stroke-width="1.5"/>
  <text x="388" y="90"  text-anchor="middle" fill="#ffa040" font-size="13" font-weight="bold">③ 구현</text>
  <text x="388" y="108" text-anchor="middle" fill="#e8b080" font-size="10">보안 통제 적용</text>
  <text x="388" y="123" text-anchor="middle" fill="#e0c0a0" font-size="10">암호화·접근제어</text>
  <text x="388" y="138" text-anchor="middle" fill="#e0c0a0" font-size="10">WAF · MFA 설정</text>
  <text x="388" y="152" text-anchor="middle" fill="#ffcc55" font-size="9">Zero Trust 적용</text>

  <line x1="452" y1="113" x2="473" y2="113" stroke="#7a9ad8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="475" y="68" width="125" height="90" rx="10" fill="#3a1a3a" opacity="0.85" stroke="#ac3aac" stroke-width="1.5"/>
  <text x="538" y="90"  text-anchor="middle" fill="#e070f0" font-size="13" font-weight="bold">④ 모니터링</text>
  <text x="538" y="108" text-anchor="middle" fill="#d090e0" font-size="10">SIEM 실시간 탐지</text>
  <text x="538" y="123" text-anchor="middle" fill="#c0a0d8" font-size="10">로그 분석</text>
  <text x="538" y="138" text-anchor="middle" fill="#c0a0d8" font-size="10">이상 행위 탐지</text>
  <text x="538" y="152" text-anchor="middle" fill="#ffcc55" font-size="9">SOC 운영</text>

  <line x1="602" y1="113" x2="623" y2="113" stroke="#7a9ad8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="625" y="68" width="70" height="90" rx="10" fill="#3a1a1a" opacity="0.85" stroke="#ac3a3a" stroke-width="1.5"/>
  <text x="660" y="90"  text-anchor="middle" fill="#ff8888" font-size="11" font-weight="bold">⑤</text>
  <text x="660" y="106" text-anchor="middle" fill="#e08080" font-size="10">대응</text>
  <text x="660" y="120" text-anchor="middle" fill="#e0c0c0" font-size="9">IRP</text>
  <text x="660" y="134" text-anchor="middle" fill="#e0c0c0" font-size="9">격리</text>
  <text x="660" y="148" text-anchor="middle" fill="#e0c0c0" font-size="9">복구</text>

  <!-- Continuous improvement loop -->
  <path d="M 660 158 Q 660 185 360 195 Q 60 205 60 158" stroke="#7a9ad8" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="360" y="208" text-anchor="middle" fill="#7a9ad8" font-size="9">지속적 개선 루프 (PDCA)</text>

  <!-- DevSecOps section -->
  <rect x="25" y="220" width="670" height="90" rx="10" fill="#0f2a3a" opacity="0.9" stroke="#1a4a6a" stroke-width="1.5"/>
  <text x="360" y="241" text-anchor="middle" fill="#58c4f6" font-size="13" font-weight="bold">DevSecOps — Shift Left Security</text>

  <rect x="45"  y="252" width="120" height="42" rx="6" fill="#1a3a5c" opacity="0.85"/>
  <text x="105" y="268" text-anchor="middle" fill="#7addff" font-size="10.5" font-weight="bold">Plan</text>
  <text x="105" y="283" text-anchor="middle" fill="#90c8e0" font-size="9">위협 모델링</text>
  <text x="105" y="295" text-anchor="middle" fill="#90c8e0" font-size="9">보안 요구사항</text>

  <rect x="178" y="252" width="120" height="42" rx="6" fill="#1a3a2a" opacity="0.85"/>
  <text x="238" y="268" text-anchor="middle" fill="#7dff9a" font-size="10.5" font-weight="bold">Code</text>
  <text x="238" y="283" text-anchor="middle" fill="#90d090" font-size="9">SAST / Lint</text>
  <text x="238" y="295" text-anchor="middle" fill="#90d090" font-size="9">코드 리뷰 체크리스트</text>

  <rect x="311" y="252" width="120" height="42" rx="6" fill="#3a3a1a" opacity="0.85"/>
  <text x="371" y="268" text-anchor="middle" fill="#f0f060" font-size="10.5" font-weight="bold">Build/Test</text>
  <text x="371" y="283" text-anchor="middle" fill="#e0e090" font-size="9">DAST · SCA</text>
  <text x="371" y="295" text-anchor="middle" fill="#e0e090" font-size="9">컨테이너 취약점 스캔</text>

  <rect x="444" y="252" width="120" height="42" rx="6" fill="#2a1a3a" opacity="0.85"/>
  <text x="504" y="268" text-anchor="middle" fill="#c084f5" font-size="10.5" font-weight="bold">Deploy</text>
  <text x="504" y="283" text-anchor="middle" fill="#b090d0" font-size="9">IaC 보안 검증</text>
  <text x="504" y="295" text-anchor="middle" fill="#b090d0" font-size="9">Config 드리프트 탐지</text>

  <rect x="577" y="252" width="100" height="42" rx="6" fill="#3a1a1a" opacity="0.85"/>
  <text x="627" y="268" text-anchor="middle" fill="#ff9898" font-size="10.5" font-weight="bold">Operate</text>
  <text x="627" y="283" text-anchor="middle" fill="#e0b0b0" font-size="9">SIEM · SOC</text>
  <text x="627" y="295" text-anchor="middle" fill="#e0b0b0" font-size="9">IRP 자동화</text>

  <!-- Compliance section -->
  <rect x="25" y="322" width="670" height="78" rx="10" fill="#0f1a3a" opacity="0.9" stroke="#2a3a6a" stroke-width="1"/>
  <text x="360" y="342" text-anchor="middle" fill="#a0b8e0" font-size="12" font-weight="bold">주요 보안 프레임워크 &amp; 컴플라이언스</text>

  <rect x="48"  y="350" width="115" height="34" rx="5" fill="#1a2a4a" opacity="0.85"/>
  <text x="106" y="364" text-anchor="middle" fill="#58c4f6" font-size="10" font-weight="bold">ISO 27001</text>
  <text x="106" y="378" text-anchor="middle" fill="#8ab8d8" font-size="9">ISMS 국제 표준</text>

  <rect x="175" y="350" width="115" height="34" rx="5" fill="#1a3a2a" opacity="0.85"/>
  <text x="232" y="364" text-anchor="middle" fill="#7dff9a" font-size="10" font-weight="bold">NIST CSF</text>
  <text x="232" y="378" text-anchor="middle" fill="#90d090" font-size="9">식별·보호·탐지·대응·복구</text>

  <rect x="302" y="350" width="115" height="34" rx="5" fill="#3a2a1a" opacity="0.85"/>
  <text x="360" y="364" text-anchor="middle" fill="#ffa040" font-size="10" font-weight="bold">PCI-DSS</text>
  <text x="360" y="378" text-anchor="middle" fill="#e8b080" font-size="9">카드 결제 보안 기준</text>

  <rect x="429" y="350" width="115" height="34" rx="5" fill="#2a1a3a" opacity="0.85"/>
  <text x="487" y="364" text-anchor="middle" fill="#c084f5" font-size="10" font-weight="bold">GDPR / PIPA</text>
  <text x="487" y="378" text-anchor="middle" fill="#b090d0" font-size="9">개인정보보호법</text>

  <rect x="556" y="350" width="115" height="34" rx="5" fill="#2a2a1a" opacity="0.85"/>
  <text x="614" y="364" text-anchor="middle" fill="#f0f060" font-size="10" font-weight="bold">SOC 2</text>
  <text x="614" y="378" text-anchor="middle" fill="#e8e890" font-size="9">서비스 조직 보안 감사</text>

  <!-- Footer -->
  <text x="360" y="415" text-anchor="middle" fill="#6a6a9a" font-size="10">PM 관점: 보안은 프로젝트 완료 후 추가하는 것이 아니라 초기 설계부터 통합되어야 합니다 (Security by Design)</text>
</svg>
