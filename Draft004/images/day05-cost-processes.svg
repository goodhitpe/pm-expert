<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 390" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="390" fill="url(#bg)" rx="12"/>

  <text x="360" y="30" text-anchor="middle" fill="#e0e0ff" font-size="16" font-weight="bold">PMBOK 원가 관리 4 프로세스</text>
  <text x="360" y="47" text-anchor="middle" fill="#9090c0" font-size="10.5">계획 수립 → 원가 산정 → 예산 수립 → 원가 통제</text>

  <!-- Process 1: Plan Cost Management -->
  <rect x="10"  y="62" width="162" height="145" rx="10" fill="#1a2a5c" opacity="0.85" stroke="#3a5aac" stroke-width="1.5"/>
  <text x="91"  y="80"  text-anchor="middle" fill="#7ab8ff" font-size="10.5" font-weight="bold">① 원가 관리 계획</text>
  <text x="91"  y="93"  text-anchor="middle" fill="#4a78ac" font-size="8">Plan Cost Management</text>
  <line x1="20" y1="99" x2="162" y2="99" stroke="#3a5aac" stroke-width="0.7" opacity="0.5"/>
  <text x="18" y="114" fill="#80a8e0" font-size="8">📥 프로젝트 헌장</text>
  <text x="18" y="127" fill="#80a8e0" font-size="8">📥 스케줄 관리 계획서</text>
  <text x="18" y="140" fill="#80a8e0" font-size="8">📥 기업환경 요소</text>
  <line x1="20" y1="148" x2="162" y2="148" stroke="#3a5aac" stroke-width="0.5" opacity="0.4"/>
  <text x="91" y="162" text-anchor="middle" fill="#60a0d0" font-size="8" font-weight="bold">산출물</text>
  <text x="18" y="176" fill="#7ab8ff" font-size="8.5">✅ 원가 관리 계획서</text>
  <text x="18" y="188" fill="#6090c0" font-size="7.5">측정 단위·정확도 수준</text>
  <text x="18" y="200" fill="#6090c0" font-size="7.5">통제 임계값 정의</text>

  <!-- arrow 1→2 -->
  <polygon points="173,134 186,129 186,139" fill="#6080c0"/>
  <line x1="172" y1="134" x2="186" y2="134" stroke="#6080c0" stroke-width="1.8"/>

  <!-- Process 2: Estimate Costs -->
  <rect x="188" y="62" width="163" height="145" rx="10" fill="#1a3a2a" opacity="0.85" stroke="#3aac6a" stroke-width="1.5"/>
  <text x="269" y="80"  text-anchor="middle" fill="#7dff9a" font-size="10.5" font-weight="bold">② 원가 산정</text>
  <text x="269" y="93"  text-anchor="middle" fill="#3a8a5a" font-size="8">Estimate Costs</text>
  <line x1="198" y1="99" x2="341" y2="99" stroke="#3aac6a" stroke-width="0.7" opacity="0.5"/>
  <text x="198" y="114" fill="#60c080" font-size="8">🔧 상향식 산정</text>
  <text x="198" y="127" fill="#60c080" font-size="8">🔧 유사 산정 (유추)</text>
  <text x="198" y="140" fill="#60c080" font-size="8">🔧 모수적 산정</text>
  <text x="198" y="153" fill="#60c080" font-size="8">🔧 3점 추정 (PERT)</text>
  <line x1="198" y1="160" x2="341" y2="160" stroke="#3aac6a" stroke-width="0.5" opacity="0.4"/>
  <text x="269" y="174" text-anchor="middle" fill="#40a060" font-size="8" font-weight="bold">산출물</text>
  <text x="198" y="188" fill="#7dff9a" font-size="8.5">✅ 원가 산정치</text>
  <text x="198" y="200" fill="#6aaa70" font-size="7.5">± 우발사태 예비비 포함</text>

  <!-- arrow 2→3 -->
  <polygon points="352,134 365,129 365,139" fill="#6080c0"/>
  <line x1="351" y1="134" x2="365" y2="134" stroke="#6080c0" stroke-width="1.8"/>

  <!-- Process 3: Determine Budget -->
  <rect x="367" y="62" width="163" height="145" rx="10" fill="#2a1a5c" opacity="0.85" stroke="#7a3aac" stroke-width="1.5"/>
  <text x="449" y="80"  text-anchor="middle" fill="#c084f5" font-size="10.5" font-weight="bold">③ 예산 수립</text>
  <text x="449" y="93"  text-anchor="middle" fill="#6a3a9a" font-size="8">Determine Budget</text>
  <line x1="377" y1="99" x2="520" y2="99" stroke="#7a3aac" stroke-width="0.7" opacity="0.5"/>
  <text x="375" y="114" fill="#a080d0" font-size="8">📊 원가 산정치 집계</text>
  <text x="375" y="127" fill="#a080d0" font-size="8">📊 관리 예비비 추가</text>
  <text x="375" y="140" fill="#a080d0" font-size="8">📊 자금 요구사항 프로파일</text>
  <text x="375" y="153" fill="#a080d0" font-size="8">📊 S-Curve 개발</text>
  <line x1="377" y1="160" x2="520" y2="160" stroke="#7a3aac" stroke-width="0.5" opacity="0.4"/>
  <text x="449" y="174" text-anchor="middle" fill="#8060c0" font-size="8" font-weight="bold">산출물</text>
  <text x="375" y="188" fill="#c084f5" font-size="8.5">✅ 원가 기준선(Cost Baseline)</text>
  <text x="375" y="200" fill="#9060d0" font-size="7.5">BAC (Budget at Completion)</text>

  <!-- arrow 3→4 -->
  <polygon points="531,134 544,129 544,139" fill="#6080c0"/>
  <line x1="530" y1="134" x2="544" y2="134" stroke="#6080c0" stroke-width="1.8"/>

  <!-- Process 4: Control Costs / EVM -->
  <rect x="546" y="62" width="164" height="145" rx="10" fill="#3a2a1a" opacity="0.85" stroke="#ac7a3a" stroke-width="1.5"/>
  <text x="628" y="80"  text-anchor="middle" fill="#ffa040" font-size="10.5" font-weight="bold">④ 원가 통제</text>
  <text x="628" y="93"  text-anchor="middle" fill="#8a5a1a" font-size="8">Control Costs (EVM)</text>
  <line x1="556" y1="99" x2="700" y2="99" stroke="#ac7a3a" stroke-width="0.7" opacity="0.5"/>
  <text x="556" y="114" fill="#d09050" font-size="8">📈 EV (획득 가치)</text>
  <text x="556" y="127" fill="#d09050" font-size="8">📈 PV (계획 가치)</text>
  <text x="556" y="140" fill="#d09050" font-size="8">📈 AC (실제 원가)</text>
  <text x="556" y="153" fill="#d09050" font-size="8">📈 CPI · SPI 지수</text>
  <line x1="556" y1="160" x2="700" y2="160" stroke="#ac7a3a" stroke-width="0.5" opacity="0.4"/>
  <text x="628" y="174" text-anchor="middle" fill="#a07030" font-size="8" font-weight="bold">산출물</text>
  <text x="556" y="188" fill="#ffa040" font-size="8.5">✅ 원가 예측치 (EAC)</text>
  <text x="556" y="200" fill="#c08030" font-size="7.5">변경 요청·교훈 등록부</text>

  <!-- Budget breakdown visual -->
  <rect x="10" y="220" width="700" height="80" rx="10" fill="#1a1a3a" opacity="0.85" stroke="#3a3a6a" stroke-width="1.2"/>
  <text x="360" y="238" text-anchor="middle" fill="#d0d0ff" font-size="11" font-weight="bold">프로젝트 예산 구조 (Budget Hierarchy)</text>

  <!-- Budget bar visual -->
  <rect x="22"  y="246" width="195" height="22" rx="5" fill="#1a2a5c" opacity="0.9" stroke="#3a5aac" stroke-width="1"/>
  <text x="119" y="261" text-anchor="middle" fill="#7ab8ff" font-size="9">작업 패키지 원가 합계</text>

  <rect x="22"  y="272" width="230" height="22" rx="5" fill="#1a3a2a" opacity="0.9" stroke="#3aac6a" stroke-width="1"/>
  <text x="137" y="287" text-anchor="middle" fill="#7dff9a" font-size="9">우발사태 예비비(Contingency)</text>

  <rect x="22"  y="246" width="338" height="48" rx="5" fill="transparent" stroke="#7a3aac" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="391" y="265" text-anchor="middle" fill="#c084f5" font-size="8.5">← 원가 기준선(Baseline)</text>
  <text x="391" y="279" text-anchor="middle" fill="#9060c0" font-size="7.5">EVM 통제 대상</text>

  <rect x="22" y="246" width="449" height="48" rx="5" fill="transparent" stroke="#ac7a3a" stroke-width="1.2"/>
  <rect x="362" y="246" width="109" height="48" rx="4" fill="#3a2a1a" opacity="0.8" stroke="#ac7a3a" stroke-width="1"/>
  <text x="416" y="265" text-anchor="middle" fill="#ffa040" font-size="8.5">관리 예비비</text>
  <text x="416" y="279" text-anchor="middle" fill="#c08030" font-size="7.5">(Management)</text>

  <text x="588" y="265" text-anchor="middle" fill="#ffa040" font-size="9">← 총 프로젝트 예산(BAC)</text>

  <!-- Bottom tips -->
  <rect x="10" y="314" width="700" height="62" rx="10" fill="#1a1a2a" opacity="0.82" stroke="#2a2a4a" stroke-width="1"/>
  <text x="360" y="332" text-anchor="middle" fill="#c0c0e0" font-size="11" font-weight="bold">PM 핵심 원칙 — 원가 관리 프로세스</text>
  <text x="100" y="352" text-anchor="middle" fill="#6070a0" font-size="9">산정 기법 → 상향식이 가장 정확</text>
  <text x="100" y="366" text-anchor="middle" fill="#5060a0" font-size="8">WBS 하위 작업별 개별 산정 후 합산</text>
  <text x="280" y="352" text-anchor="middle" fill="#6070a0" font-size="9">우발사태예비 vs 관리예비</text>
  <text x="280" y="366" text-anchor="middle" fill="#5060a0" font-size="8">Known Unknown vs Unknown Unknown</text>
  <text x="470" y="352" text-anchor="middle" fill="#6070a0" font-size="9">EVM은 통합 성과 측정 도구</text>
  <text x="470" y="366" text-anchor="middle" fill="#5060a0" font-size="8">비용·일정·범위 동시 모니터링</text>
  <text x="632" y="352" text-anchor="middle" fill="#6070a0" font-size="9">기준선 변경은 공식 절차</text>
  <text x="632" y="366" text-anchor="middle" fill="#5060a0" font-size="8">CCB 승인 없이 기준선 수정 금지</text>
</svg>
