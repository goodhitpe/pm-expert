<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">자원 분류 체계 (RBS — Resource Breakdown Structure)</text>
  <text x="360" y="50" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">프로젝트 자원을 계층적으로 식별·분류하여 자원 산정 및 관리에 활용</text>

  <!-- Level 0: Project -->
  <rect x="280" y="64" width="160" height="44" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="83" font-family="Arial" font-size="12" font-weight="bold" fill="#93c5fd" text-anchor="middle">Level 0</text>
  <text x="360" y="100" font-family="Arial" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">프로젝트 자원</text>

  <!-- Connector from L0 to L1 -->
  <line x1="360" y1="108" x2="360" y2="126" stroke="#334155" stroke-width="1.5"/>
  <line x1="140" y1="126" x2="580" y2="126" stroke="#334155" stroke-width="1.5"/>
  <line x1="140" y1="126" x2="140" y2="140" stroke="#334155" stroke-width="1.5"/>
  <line x1="360" y1="126" x2="360" y2="140" stroke="#334155" stroke-width="1.5"/>
  <line x1="580" y1="126" x2="580" y2="140" stroke="#334155" stroke-width="1.5"/>

  <!-- Level 1: 3 categories -->
  <!-- Human Resources -->
  <rect x="52" y="140" width="176" height="44" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="159" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">Level 1 — 인적 자원</text>
  <text x="140" y="175" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">Human Resources</text>

  <!-- Physical Resources -->
  <rect x="272" y="140" width="176" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="159" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">Level 1 — 물적 자원</text>
  <text x="360" y="175" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">Physical Resources</text>

  <!-- Technology Resources -->
  <rect x="492" y="140" width="176" height="44" rx="6" fill="#2e1065" stroke="#a855f7" stroke-width="1.5"/>
  <text x="580" y="159" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">Level 1 — 기술 자원</text>
  <text x="580" y="175" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">Technology Resources</text>

  <!-- Connectors L1 to L2 -->
  <!-- Human branch -->
  <line x1="140" y1="184" x2="140" y2="204" stroke="#334155" stroke-width="1.5"/>
  <line x1="60" y1="204" x2="220" y2="204" stroke="#334155" stroke-width="1.5"/>
  <line x1="60" y1="204" x2="60" y2="218" stroke="#334155" stroke-width="1.5"/>
  <line x1="140" y1="204" x2="140" y2="218" stroke="#334155" stroke-width="1.5"/>
  <line x1="220" y1="204" x2="220" y2="218" stroke="#334155" stroke-width="1.5"/>

  <!-- Physical branch -->
  <line x1="360" y1="184" x2="360" y2="204" stroke="#334155" stroke-width="1.5"/>
  <line x1="290" y1="204" x2="430" y2="204" stroke="#334155" stroke-width="1.5"/>
  <line x1="290" y1="204" x2="290" y2="218" stroke="#334155" stroke-width="1.5"/>
  <line x1="430" y1="204" x2="430" y2="218" stroke="#334155" stroke-width="1.5"/>

  <!-- Tech branch -->
  <line x1="580" y1="184" x2="580" y2="204" stroke="#334155" stroke-width="1.5"/>
  <line x1="516" y1="204" x2="644" y2="204" stroke="#334155" stroke-width="1.5"/>
  <line x1="516" y1="204" x2="516" y2="218" stroke="#334155" stroke-width="1.5"/>
  <line x1="580" y1="204" x2="580" y2="218" stroke="#334155" stroke-width="1.5"/>
  <line x1="644" y1="204" x2="644" y2="218" stroke="#334155" stroke-width="1.5"/>

  <!-- Level 2: Human sub-items -->
  <rect x="20" y="218" width="82" height="64" rx="5" fill="#1a3a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="61" y="238" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">PM</text>
  <text x="61" y="254" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">프로젝트</text>
  <text x="61" y="267" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">관리자</text>
  <text x="61" y="277" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">1명</text>

  <rect x="100" y="218" width="82" height="64" rx="5" fill="#1a3a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="141" y="238" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">개발자</text>
  <text x="141" y="254" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">Frontend /</text>
  <text x="141" y="267" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">Backend</text>
  <text x="141" y="277" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">5명</text>

  <rect x="180" y="218" width="82" height="64" rx="5" fill="#1a3a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="221" y="238" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">디자이너</text>
  <text x="221" y="254" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">UX/UI</text>
  <text x="221" y="267" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">디자인</text>
  <text x="221" y="277" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">2명</text>

  <!-- Level 2: Physical sub-items -->
  <rect x="248" y="218" width="86" height="64" rx="5" fill="#1e2a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="291" y="238" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">서버</text>
  <text x="291" y="254" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">개발/운영</text>
  <text x="291" y="267" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">서버</text>
  <text x="291" y="277" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">5대</text>

  <rect x="374" y="218" width="86" height="64" rx="5" fill="#1e2a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="417" y="238" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">장비</text>
  <text x="417" y="254" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">PC / 모니터</text>
  <text x="417" y="267" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">네트워크</text>
  <text x="417" y="277" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">10세트</text>

  <!-- Level 2: Tech sub-items -->
  <rect x="474" y="218" width="86" height="64" rx="5" fill="#2a1a3a" stroke="#a855f7" stroke-width="1"/>
  <text x="517" y="238" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">소프트웨어</text>
  <text x="517" y="254" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">IDE / 형상관리</text>
  <text x="517" y="267" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">라이선스</text>
  <text x="517" y="277" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">10개</text>

  <rect x="558" y="218" width="86" height="64" rx="5" fill="#2a1a3a" stroke="#a855f7" stroke-width="1"/>
  <text x="601" y="238" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">클라우드</text>
  <text x="601" y="254" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">AWS / Azure</text>
  <text x="601" y="267" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">서비스</text>
  <text x="601" y="277" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">$2000/월</text>

  <rect x="642" y="218" width="66" height="64" rx="5" fill="#2a1a3a" stroke="#a855f7" stroke-width="1"/>
  <text x="675" y="238" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">도구</text>
  <text x="675" y="254" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">Jira/</text>
  <text x="675" y="267" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">Confluence</text>
  <text x="675" y="277" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">팀 구독</text>

  <!-- Usage Notes Section -->
  <rect x="28" y="302" width="664" height="148" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="360" y="322" font-family="Arial" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">■ RBS 활용 방법 및 핵심 개념</text>

  <!-- 4 boxes -->
  <rect x="40" y="332" width="148" height="80" rx="5" fill="#1a2a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="114" y="350" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">자원 산정</text>
  <text x="114" y="366" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">RBS × WBS =</text>
  <text x="114" y="380" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">활동별 자원 매핑</text>
  <text x="114" y="394" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Bottom-up 산정 근거</text>
  <text x="114" y="407" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">자원 캘린더 작성</text>

  <rect x="198" y="332" width="148" height="80" rx="5" fill="#1e2a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="272" y="350" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">자원 확보</text>
  <text x="272" y="366" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">내부 조달 vs</text>
  <text x="272" y="380" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">외부 채용</text>
  <text x="272" y="394" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">가상팀 / 외주</text>
  <text x="272" y="407" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">자원 협상 전략</text>

  <rect x="356" y="332" width="148" height="80" rx="5" fill="#2a1a06" stroke="#f97316" stroke-width="1"/>
  <text x="430" y="350" font-family="Arial" font-size="11" font-weight="bold" fill="#fb923c" text-anchor="middle">자원 부하 평준화</text>
  <text x="430" y="366" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">Resource</text>
  <text x="430" y="380" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">Leveling</text>
  <text x="430" y="394" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">과부하 자원 조정</text>
  <text x="430" y="407" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">일정 → 자원 균형</text>

  <rect x="514" y="332" width="148" height="80" rx="5" fill="#2e1065" stroke="#a855f7" stroke-width="1"/>
  <text x="588" y="350" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">책임 배정 매트릭스</text>
  <text x="588" y="366" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">RAM / RACI</text>
  <text x="588" y="380" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">역할-책임 명확화</text>
  <text x="588" y="394" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">R=수행 A=승인</text>
  <text x="588" y="407" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">C=협의 I=통보</text>

  <text x="360" y="444" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">RBS는 WBS(Work Breakdown Structure)와 함께 사용하여 활동별 필요 자원을 체계적으로 계획하는 핵심 프로젝트 관리 도구</text>
</svg>
