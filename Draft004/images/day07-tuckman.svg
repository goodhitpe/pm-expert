<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6c63ff"/>
    </marker>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>
  <text x="360" y="28" text-anchor="middle" fill="#f39c12" font-size="16" font-family="Arial,sans-serif" font-weight="bold">Day 07 — 터크만(Tuckman) 팀 발전 모델 + 생산성 곡선</text>

  <!-- Axes -->
  <line x1="60" y1="50" x2="60" y2="310" stroke="#666" stroke-width="2"/>
  <line x1="60" y1="310" x2="690" y2="310" stroke="#666" stroke-width="2"/>
  <text x="40" y="180" text-anchor="middle" fill="#888" font-size="11" font-family="Arial,sans-serif" transform="rotate(-90 40 180)">팀 생산성</text>
  <text x="375" y="335" text-anchor="middle" fill="#888" font-size="11" font-family="Arial,sans-serif">시간 경과 →</text>

  <!-- Y labels -->
  <text x="55" y="314" text-anchor="end" fill="#888" font-size="9">낮음</text>
  <text x="55" y="185" text-anchor="end" fill="#888" font-size="9">중간</text>
  <text x="55" y="60" text-anchor="end" fill="#888" font-size="9">높음</text>

  <!-- Productivity curve -->
  <path d="M 60,285 C 90,282 130,290 170,295 S 250,290 290,230 S 370,120 450,80 S 570,70 680,65"
    fill="none" stroke="#00d4aa" stroke-width="3"/>

  <!-- Shaded area under curve -->
  <path d="M 60,285 C 90,282 130,290 170,295 S 250,290 290,230 S 370,120 450,80 S 570,70 680,65 L 680,310 L 60,310 Z"
    fill="rgba(0,212,170,0.07)"/>

  <!-- Stage dividers -->
  <line x1="185" y1="50" x2="185" y2="310" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="320" y1="50" x2="320" y2="310" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="460" y1="50" x2="460" y2="310" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="585" y1="50" x2="585" y2="310" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Stage sections -->
  <!-- Forming -->
  <rect x="60" y="50" width="125" height="30" rx="5" fill="rgba(108,99,255,0.3)"/>
  <text x="122" y="70" text-anchor="middle" fill="#c9b8ff" font-size="13" font-family="Arial,sans-serif" font-weight="bold">Forming</text>
  <text x="122" y="90" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">형성</text>
  <text x="122" y="105" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">서로 탐색</text>
  <text x="122" y="118" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">역할 불명확</text>
  <text x="122" y="131" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">지시형 리더십</text>

  <!-- Storming -->
  <rect x="185" y="50" width="135" height="30" rx="5" fill="rgba(231,76,60,0.3)"/>
  <text x="252" y="70" text-anchor="middle" fill="#f4b2ae" font-size="13" font-family="Arial,sans-serif" font-weight="bold">Storming</text>
  <text x="252" y="90" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">혼돈 (⚠️)</text>
  <text x="252" y="105" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">갈등·경쟁</text>
  <text x="252" y="118" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">생산성 최저</text>
  <text x="252" y="131" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">코치형 리더십</text>

  <!-- Norming -->
  <rect x="320" y="50" width="140" height="30" rx="5" fill="rgba(243,156,18,0.3)"/>
  <text x="390" y="70" text-anchor="middle" fill="#ffd180" font-size="13" font-family="Arial,sans-serif" font-weight="bold">Norming</text>
  <text x="390" y="90" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">규범화</text>
  <text x="390" y="105" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">신뢰 구축</text>
  <text x="390" y="118" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">역할 명확화</text>
  <text x="390" y="131" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">지원형 리더십</text>

  <!-- Performing -->
  <rect x="460" y="50" width="125" height="30" rx="5" fill="rgba(0,212,170,0.3)"/>
  <text x="522" y="70" text-anchor="middle" fill="#b2f0e8" font-size="13" font-family="Arial,sans-serif" font-weight="bold">Performing</text>
  <text x="522" y="90" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">성과 ✅</text>
  <text x="522" y="105" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">자율적 운영</text>
  <text x="522" y="118" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">고성과 창출</text>
  <text x="522" y="131" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">위임형 리더십</text>

  <!-- Adjourning -->
  <rect x="585" y="50" width="105" height="30" rx="5" fill="rgba(155,89,182,0.3)"/>
  <text x="637" y="70" text-anchor="middle" fill="#d7b8ff" font-size="13" font-family="Arial,sans-serif" font-weight="bold">Adjourning</text>
  <text x="637" y="90" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">해산</text>
  <text x="637" y="105" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">프로젝트 종료</text>
  <text x="637" y="118" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">팀원 이동</text>
  <text x="637" y="131" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">인정·감사</text>

  <!-- Info box -->
  <rect x="60" y="350" width="600" height="38" rx="6" fill="rgba(255,255,255,0.05)" stroke="#444" stroke-width="1"/>
  <text x="360" y="364" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Arial,sans-serif" font-weight="bold">PM 핵심 역할 — Storming 단계를 빠르게 돌파해 Performing으로 이끌기</text>
  <text x="360" y="380" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">갈등 해결 → 팀 빌딩 → RACI 명확화 → 심리적 안전감 조성</text>
</svg>
