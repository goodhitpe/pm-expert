<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="480" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="36" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">작업 성과 데이터 흐름 및 지식 관리</text>

  <!-- Section label -->
  <text x="360" y="60" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">■ 프로젝트 실행 중 데이터가 변환되는 3단계 흐름</text>

  <!-- WPD Box -->
  <rect x="28" y="75" width="188" height="140" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <rect x="28" y="75" width="188" height="32" rx="8" fill="#3b82f6"/>
  <rect x="28" y="91" width="188" height="16" fill="#3b82f6"/>
  <text x="122" y="96" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">WPD — 원시 데이터</text>
  <text x="122" y="111" font-family="Arial" font-size="10" fill="#bfdbfe" text-anchor="middle">Work Performance Data</text>
  <text x="122" y="133" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 완료된 활동 목록</text>
  <text x="122" y="150" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 실제 발생 비용(AC)</text>
  <text x="122" y="167" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 일정 달성 측정값</text>
  <text x="122" y="187" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">수집 주체: 팀원</text>
  <text x="122" y="202" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">프로세스: 지시 및 관리</text>

  <!-- Arrow WPD → WPI -->
  <line x1="216" y1="145" x2="256" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="236" y="138" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">분석·</text>
  <text x="236" y="150" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">처리</text>

  <!-- WPI Box -->
  <rect x="260" y="75" width="188" height="140" rx="8" fill="#1a3a2a" stroke="#22c55e" stroke-width="2"/>
  <rect x="260" y="75" width="188" height="32" rx="8" fill="#22c55e"/>
  <rect x="260" y="91" width="188" height="16" fill="#22c55e"/>
  <text x="354" y="96" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">WPI — 성과 정보</text>
  <text x="354" y="111" font-family="Arial" font-size="10" fill="#bbf7d0" text-anchor="middle">Work Performance Information</text>
  <text x="354" y="133" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• SPI, CPI 계산 결과</text>
  <text x="354" y="150" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• EV vs AC vs PV 비교</text>
  <text x="354" y="167" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 리스크 현황 분석</text>
  <text x="354" y="187" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">분석 주체: PM</text>
  <text x="354" y="202" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">프로세스: 통제 프로세스들</text>

  <!-- Arrow WPI → WPR -->
  <line x1="448" y1="145" x2="488" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="468" y="138" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">종합·</text>
  <text x="468" y="150" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">보고</text>

  <!-- WPR Box -->
  <rect x="492" y="75" width="196" height="140" rx="8" fill="#3a1a1a" stroke="#f97316" stroke-width="2"/>
  <rect x="492" y="75" width="196" height="32" rx="8" fill="#f97316"/>
  <rect x="492" y="91" width="196" height="16" fill="#f97316"/>
  <text x="590" y="96" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">WPR — 성과 보고서</text>
  <text x="590" y="111" font-family="Arial" font-size="10" fill="#fed7aa" text-anchor="middle">Work Performance Report</text>
  <text x="590" y="133" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 상태 보고서</text>
  <text x="590" y="150" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 진행 보고서</text>
  <text x="590" y="167" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 경영진 대시보드</text>
  <text x="590" y="187" font-family="Arial" font-size="10" fill="#fdba74" text-anchor="middle">배포 주체: PM</text>
  <text x="590" y="202" font-family="Arial" font-size="10" fill="#fdba74" text-anchor="middle">배포 대상: 이해관계자</text>

  <!-- Divider -->
  <line x1="40" y1="238" x2="680" y2="238" stroke="#334155" stroke-width="1"/>
  <text x="360" y="258" font-family="Arial" font-size="15" font-weight="bold" fill="#e2e8f0" text-anchor="middle">지식 관리 (Knowledge Management)</text>

  <!-- Tacit Knowledge Box -->
  <rect x="40" y="272" width="296" height="176" rx="8" fill="#2e1065" stroke="#a855f7" stroke-width="2"/>
  <rect x="40" y="272" width="296" height="32" rx="8" fill="#a855f7"/>
  <rect x="40" y="288" width="296" height="16" fill="#a855f7"/>
  <text x="188" y="294" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">암묵지 (Tacit Knowledge)</text>
  <text x="188" y="320" font-family="Arial" font-size="11" fill="#e9d5ff" text-anchor="middle">개인이 체득한, 문서화하기 어려운 지식</text>
  <text x="188" y="342" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 숙련 전문가의 직관과 경험</text>
  <text x="188" y="360" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 프로젝트 리스크 감지 능력</text>
  <text x="188" y="378" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 이해관계자 대응 노하우</text>
  <text x="188" y="400" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">관리: 멘토링, CoP, 교훈 등록부(Lessons Learned)</text>
  <text x="188" y="418" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">도구: 지식 이전(Knowledge Transfer) 세션</text>
  <text x="188" y="436" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">출력물: 교훈 저장소(OPA 업데이트)</text>

  <!-- Double arrow between knowledge types -->
  <text x="360" y="365" font-family="Arial" font-size="22" fill="#64748b" text-anchor="middle">⇄</text>

  <!-- Explicit Knowledge Box -->
  <rect x="384" y="272" width="296" height="176" rx="8" fill="#0c1a3a" stroke="#38bdf8" stroke-width="2"/>
  <rect x="384" y="272" width="296" height="32" rx="8" fill="#38bdf8"/>
  <rect x="384" y="288" width="296" height="16" fill="#38bdf8"/>
  <text x="532" y="294" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">명시지 (Explicit Knowledge)</text>
  <text x="532" y="320" font-family="Arial" font-size="11" fill="#bae6fd" text-anchor="middle">문서화된, 공유 가능한 공식 지식</text>
  <text x="532" y="342" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 프로세스 매뉴얼, 정책서</text>
  <text x="532" y="360" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• WBS, 일정 계획서, 리스크 등록부</text>
  <text x="532" y="378" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 기술 문서, 설계 명세서</text>
  <text x="532" y="400" font-family="Arial" font-size="10" fill="#7dd3fc" text-anchor="middle">관리: 위키, 문서 관리 시스템(DMS)</text>
  <text x="532" y="418" font-family="Arial" font-size="10" fill="#7dd3fc" text-anchor="middle">저장: 조직 프로세스 자산(OPA)</text>
  <text x="532" y="436" font-family="Arial" font-size="10" fill="#7dd3fc" text-anchor="middle">활용: 다음 프로젝트 계획 수립 시 참조</text>
</svg>
