<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="380" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">Day 09 — Risk vs Issue 비교</text>

  <!-- Risk column header -->
  <rect x="40" y="55" width="300" height="42" rx="8" fill="#7b3a1a" opacity="0.9"/>
  <text x="190" y="72" text-anchor="middle" fill="#ffd0a0" font-size="14" font-weight="bold">⚠️ RISK (리스크)</text>
  <text x="190" y="90" text-anchor="middle" fill="#e0b080" font-size="11">미래에 일어날 수 있는 불확실한 사건</text>

  <!-- Issue column header -->
  <rect x="380" y="55" width="300" height="42" rx="8" fill="#1a1a7a" opacity="0.9"/>
  <text x="530" y="72" text-anchor="middle" fill="#a0c0ff" font-size="14" font-weight="bold">🔴 ISSUE (이슈)</text>
  <text x="530" y="90" text-anchor="middle" fill="#80a8f0" font-size="11">지금 현재 발생한 문제</text>

  <!-- Divider -->
  <line x1="350" y1="100" x2="350" y2="350" stroke="#4a4a7a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="20"  y1="100" x2="700" y2="100" stroke="#4a4a7a" stroke-width="1"/>

  <!-- Row labels -->
  <text x="25" y="130" fill="#9090c0" font-size="11">시간</text>
  <text x="25" y="168" fill="#9090c0" font-size="11">발생 여부</text>
  <text x="25" y="206" fill="#9090c0" font-size="11">관리 방법</text>
  <text x="25" y="244" fill="#9090c0" font-size="11">문서</text>
  <text x="25" y="282" fill="#9090c0" font-size="11">책임자</text>
  <text x="25" y="320" fill="#9090c0" font-size="11">예시</text>

  <!-- Risk values -->
  <rect x="80" y="115" width="255" height="26" rx="5" fill="#3a1a0a" opacity="0.8"/>
  <text x="207" y="133" text-anchor="middle" fill="#ffa060" font-size="12">미래 (아직 발생 전)</text>

  <rect x="80" y="153" width="255" height="26" rx="5" fill="#3a1a0a" opacity="0.8"/>
  <text x="207" y="171" text-anchor="middle" fill="#ffa060" font-size="12">발생 가능성 있음 (확률)</text>

  <rect x="80" y="191" width="255" height="26" rx="5" fill="#3a1a0a" opacity="0.8"/>
  <text x="207" y="209" text-anchor="middle" fill="#ffcc80" font-size="12">예방·전가·완화·수용</text>

  <rect x="80" y="229" width="255" height="26" rx="5" fill="#3a1a0a" opacity="0.8"/>
  <text x="207" y="247" text-anchor="middle" fill="#ffa060" font-size="12">리스크 등록부 (Risk Register)</text>

  <rect x="80" y="267" width="255" height="26" rx="5" fill="#3a1a0a" opacity="0.8"/>
  <text x="207" y="285" text-anchor="middle" fill="#ffa060" font-size="12">리스크 오너 (Risk Owner)</text>

  <rect x="80" y="305" width="255" height="34" rx="5" fill="#3a1a0a" opacity="0.8"/>
  <text x="207" y="318" text-anchor="middle" fill="#e0d080" font-size="11">핵심 개발자 이탈 가능성,</text>
  <text x="207" y="332" text-anchor="middle" fill="#e0d080" font-size="11">환율 변동, 의존 라이브러리 지원 종료</text>

  <!-- Issue values -->
  <rect x="365" y="115" width="255" height="26" rx="5" fill="#0a0a3a" opacity="0.8"/>
  <text x="492" y="133" text-anchor="middle" fill="#80b0ff" font-size="12">현재 (이미 발생)</text>

  <rect x="365" y="153" width="255" height="26" rx="5" fill="#0a0a3a" opacity="0.8"/>
  <text x="492" y="171" text-anchor="middle" fill="#80b0ff" font-size="12">확정 (100%, 진행 중)</text>

  <rect x="365" y="191" width="255" height="26" rx="5" fill="#0a0a3a" opacity="0.8"/>
  <text x="492" y="209" text-anchor="middle" fill="#a0c8ff" font-size="12">해결·에스컬레이션·수용</text>

  <rect x="365" y="229" width="255" height="26" rx="5" fill="#0a0a3a" opacity="0.8"/>
  <text x="492" y="247" text-anchor="middle" fill="#80b0ff" font-size="12">이슈 로그 (Issue Log)</text>

  <rect x="365" y="267" width="255" height="26" rx="5" fill="#0a0a3a" opacity="0.8"/>
  <text x="492" y="285" text-anchor="middle" fill="#80b0ff" font-size="12">이슈 오너 (Issue Owner)</text>

  <rect x="365" y="305" width="255" height="34" rx="5" fill="#0a0a3a" opacity="0.8"/>
  <text x="492" y="318" text-anchor="middle" fill="#c0d8ff" font-size="11">서버 장애, 팀원 부상 병가,</text>
  <text x="492" y="332" text-anchor="middle" fill="#c0d8ff" font-size="11">요구사항 변경으로 인한 일정 초과</text>

  <!-- Key insight -->
  <text x="360" y="365" text-anchor="middle" fill="#8888b8" font-size="10">핵심: 리스크는 '예방'이 목표, 이슈는 '해결'이 목표 — 리스크가 현실화되면 이슈로 전환됩니다</text>
</svg>
