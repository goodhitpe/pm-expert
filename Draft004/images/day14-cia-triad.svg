<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 480" width="660" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="660" height="480" fill="url(#bg)" rx="12"/>
  <text x="330" y="28" text-anchor="middle" fill="#f39c12" font-size="17" font-family="Arial,sans-serif" font-weight="bold">Day 14 — CIA Triad (정보보안 3원칙)</text>

  <!-- Triangle -->
  <polygon points="330,65 110,385 550,385" fill="none" stroke="#6c63ff" stroke-width="2.5"/>

  <!-- Confidentiality (Top) -->
  <circle cx="330" cy="65" r="50" fill="#6c63ff"/>
  <text x="330" y="58" text-anchor="middle" fill="white" font-size="13" font-family="Arial,sans-serif" font-weight="bold">C</text>
  <text x="330" y="74" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">기밀성</text>
  <text x="330" y="88" text-anchor="middle" fill="#c9b8ff" font-size="9" font-family="Arial,sans-serif">Confidentiality</text>

  <!-- Integrity (Bottom-left) -->
  <circle cx="110" cy="385" r="50" fill="#00d4aa"/>
  <text x="110" y="378" text-anchor="middle" fill="white" font-size="13" font-family="Arial,sans-serif" font-weight="bold">I</text>
  <text x="110" y="394" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">무결성</text>
  <text x="110" y="408" text-anchor="middle" fill="#b2f0e8" font-size="9" font-family="Arial,sans-serif">Integrity</text>

  <!-- Availability (Bottom-right) -->
  <circle cx="550" cy="385" r="50" fill="#e74c3c"/>
  <text x="550" y="378" text-anchor="middle" fill="white" font-size="13" font-family="Arial,sans-serif" font-weight="bold">A</text>
  <text x="550" y="394" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">가용성</text>
  <text x="550" y="408" text-anchor="middle" fill="#f4b2ae" font-size="9" font-family="Arial,sans-serif">Availability</text>

  <!-- Center label -->
  <circle cx="330" cy="265" r="42" fill="rgba(0,0,0,0.6)" stroke="#f39c12" stroke-width="1.5"/>
  <text x="330" y="260" text-anchor="middle" fill="#f39c12" font-size="11" font-family="Arial,sans-serif" font-weight="bold">정보보안</text>
  <text x="330" y="275" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">CIA Triad</text>

  <!-- Explanation boxes -->
  <!-- C -->
  <rect x="350" y="88" width="200" height="84" rx="7" fill="rgba(108,99,255,0.15)" stroke="#6c63ff" stroke-width="1"/>
  <text x="450" y="106" text-anchor="middle" fill="#9b8fff" font-size="11" font-family="Arial,sans-serif" font-weight="bold">기밀성</text>
  <text x="360" y="122" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">• 인가된 자만 접근 가능</text>
  <text x="360" y="137" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">• 암호화 (AES, RSA)</text>
  <text x="360" y="152" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">• 접근 통제 (RBAC)</text>
  <text x="360" y="167" fill="#888" font-size="8" font-family="Arial,sans-serif">위협: 도청, 스니핑</text>

  <!-- I -->
  <rect x="20" y="285" width="195" height="84" rx="7" fill="rgba(0,212,170,0.15)" stroke="#00d4aa" stroke-width="1"/>
  <text x="117" y="303" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="Arial,sans-serif" font-weight="bold">무결성</text>
  <text x="30" y="319" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">• 데이터 변조 없음 보장</text>
  <text x="30" y="334" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">• 해시(SHA-256), 전자서명</text>
  <text x="30" y="349" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">• 체크섬, 감사 로그</text>
  <text x="30" y="364" fill="#888" font-size="8" font-family="Arial,sans-serif">위협: 변조, 위조</text>

  <!-- A -->
  <rect x="440" y="285" width="200" height="84" rx="7" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1"/>
  <text x="540" y="303" text-anchor="middle" fill="#e74c3c" font-size="11" font-family="Arial,sans-serif" font-weight="bold">가용성</text>
  <text x="450" y="319" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">• 필요 시 항상 접근 가능</text>
  <text x="450" y="334" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">• DDoS 방어, 이중화</text>
  <text x="450" y="349" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">• 백업, DR 사이트</text>
  <text x="450" y="364" fill="#888" font-size="8" font-family="Arial,sans-serif">위협: DDoS, 재해</text>

  <!-- Bottom -->
  <rect x="80" y="435" width="500" height="34" rx="6" fill="rgba(255,255,255,0.05)" stroke="#444" stroke-width="1"/>
  <text x="330" y="449" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Arial,sans-serif" font-weight="bold">OWASP Top 10 공격 유형 → 기밀성/무결성/가용성 중 한 가지 이상 위협</text>
  <text x="330" y="463" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial,sans-serif">#1 SQL Injection(무결성) | #2 인증 깨짐(기밀성) | #10 SSRF(가용성)</text>
</svg>
