<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="460" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">이해관계자 변화 저항 관리 — Kotter &amp; Schlesinger</text>
  <text x="360" y="50" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">저항의 원인을 분석하고 적절한 전략을 선택하여 변화를 성공적으로 이끄는 6가지 전략</text>

  <!-- Strategy Cards: 2 rows × 3 columns -->

  <!-- Row 1 -->
  <!-- Strategy 1: Education -->
  <rect x="28" y="66" width="210" height="122" rx="6" fill="#1a3a1a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="28" y="66" width="210" height="32" rx="6" fill="#14532d"/>
  <text x="52" y="86" font-family="Arial" font-size="18">📚</text>
  <text x="82" y="82" font-family="Arial" font-size="12" font-weight="bold" fill="#4ade80">① 교육과 소통</text>
  <text x="82" y="94" font-family="Arial" font-size="9" fill="#86efac">Education &amp; Communication</text>
  <text x="40" y="116" font-family="Arial" font-size="10" fill="#e2e8f0">저항의 원인: 정보 부족, 오해</text>
  <text x="40" y="132" font-family="Arial" font-size="10" fill="#e2e8f0">• 변화의 필요성과 목적 설명</text>
  <text x="40" y="146" font-family="Arial" font-size="10" fill="#e2e8f0">• 정기 미팅, 뉴스레터, 교육</text>
  <rect x="40" y="157" width="188" height="24" rx="3" fill="#0d2b0d"/>
  <text x="134" y="173" font-family="Arial" font-size="9" fill="#86efac" text-anchor="middle">적합: 소수, 정보 부비대칭 시</text>

  <!-- Strategy 2: Participation -->
  <rect x="256" y="66" width="208" height="122" rx="6" fill="#1e2a3a" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="256" y="66" width="208" height="32" rx="6" fill="#1e3a5f"/>
  <text x="280" y="86" font-family="Arial" font-size="18">🤝</text>
  <text x="310" y="82" font-family="Arial" font-size="12" font-weight="bold" fill="#93c5fd">② 참여와 관여</text>
  <text x="310" y="94" font-family="Arial" font-size="9" fill="#60a5fa">Participation &amp; Involvement</text>
  <text x="268" y="116" font-family="Arial" font-size="10" fill="#e2e8f0">저항의 원인: 배제감, 소외감</text>
  <text x="268" y="132" font-family="Arial" font-size="10" fill="#e2e8f0">• 설계 단계부터 이해관계자 참여</text>
  <text x="268" y="146" font-family="Arial" font-size="10" fill="#e2e8f0">• 의사결정 권한 일부 위임</text>
  <rect x="268" y="157" width="188" height="24" rx="3" fill="#0d1e3a"/>
  <text x="362" y="173" font-family="Arial" font-size="9" fill="#60a5fa" text-anchor="middle">적합: 변화에 영향받는 핵심 그룹</text>

  <!-- Strategy 3: Support -->
  <rect x="484" y="66" width="208" height="122" rx="6" fill="#2e1065" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="484" y="66" width="208" height="32" rx="6" fill="#3b0764"/>
  <text x="508" y="86" font-family="Arial" font-size="18">💪</text>
  <text x="538" y="82" font-family="Arial" font-size="12" font-weight="bold" fill="#c4b5fd">③ 지원과 섬김</text>
  <text x="538" y="94" font-family="Arial" font-size="9" fill="#a78bfa">Facilitation &amp; Support</text>
  <text x="496" y="116" font-family="Arial" font-size="10" fill="#e2e8f0">저항의 원인: 두려움, 능력 부족</text>
  <text x="496" y="132" font-family="Arial" font-size="10" fill="#e2e8f0">• 교육 훈련, 코칭 제공</text>
  <text x="496" y="146" font-family="Arial" font-size="10" fill="#e2e8f0">• 심리적 안전망 구축</text>
  <rect x="496" y="157" width="188" height="24" rx="3" fill="#1e0035"/>
  <text x="590" y="173" font-family="Arial" font-size="9" fill="#a78bfa" text-anchor="middle">적합: 강한 두려움·적응 어려움</text>

  <!-- Row 2 -->
  <!-- Strategy 4: Negotiation -->
  <rect x="28" y="200" width="210" height="122" rx="6" fill="#2a1a06" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="28" y="200" width="210" height="32" rx="6" fill="#3a2206"/>
  <text x="52" y="220" font-family="Arial" font-size="18">⚖️</text>
  <text x="82" y="216" font-family="Arial" font-size="12" font-weight="bold" fill="#fbbf24">④ 협상과 합의</text>
  <text x="82" y="228" font-family="Arial" font-size="9" fill="#fde68a">Negotiation &amp; Agreement</text>
  <text x="40" y="250" font-family="Arial" font-size="10" fill="#e2e8f0">저항의 원인: 이해 충돌, 손해 우려</text>
  <text x="40" y="266" font-family="Arial" font-size="10" fill="#e2e8f0">• 인센티브 제공, 손실 보상</text>
  <text x="40" y="280" font-family="Arial" font-size="10" fill="#e2e8f0">• Win-Win 타협점 도출</text>
  <rect x="40" y="291" width="188" height="24" rx="3" fill="#1a1000"/>
  <text x="134" y="307" font-family="Arial" font-size="9" fill="#fde68a" text-anchor="middle">적합: 강한 이해충돌 그룹</text>

  <!-- Strategy 5: Manipulation / Co-optation -->
  <rect x="256" y="200" width="208" height="122" rx="6" fill="#3a1a1a" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="256" y="200" width="208" height="32" rx="6" fill="#450a0a"/>
  <text x="280" y="220" font-family="Arial" font-size="18">🎭</text>
  <text x="310" y="216" font-family="Arial" font-size="12" font-weight="bold" fill="#f87171">⑤ 조작과 포섭</text>
  <text x="310" y="228" font-family="Arial" font-size="9" fill="#fca5a5">Manipulation &amp; Co-optation</text>
  <text x="268" y="250" font-family="Arial" font-size="10" fill="#e2e8f0">저항의 원인: 시간 부족, 타방법 실패</text>
  <text x="268" y="266" font-family="Arial" font-size="10" fill="#e2e8f0">• 리더를 명목상 역할에 임명</text>
  <text x="268" y="280" font-family="Arial" font-size="10" fill="#e2e8f0">• 선택적 정보 제공</text>
  <rect x="268" y="291" width="188" height="24" rx="3" fill="#2a0505"/>
  <text x="362" y="307" font-family="Arial" font-size="9" fill="#fca5a5" text-anchor="middle">⚠️ 신뢰 손상 위험, 최후 수단</text>

  <!-- Strategy 6: Coercion -->
  <rect x="484" y="200" width="208" height="122" rx="6" fill="#1a1a3a" stroke="#64748b" stroke-width="1.5"/>
  <rect x="484" y="200" width="208" height="32" rx="6" fill="#1e293b"/>
  <text x="508" y="220" font-family="Arial" font-size="18">⚡</text>
  <text x="538" y="216" font-family="Arial" font-size="12" font-weight="bold" fill="#94a3b8">⑥ 명시적/묵시적 강제</text>
  <text x="538" y="228" font-family="Arial" font-size="9" fill="#64748b">Explicit &amp; Implicit Coercion</text>
  <text x="496" y="250" font-family="Arial" font-size="10" fill="#e2e8f0">저항의 원인: 시간 극도 부족</text>
  <text x="496" y="266" font-family="Arial" font-size="10" fill="#e2e8f0">• 변화 따르지 않으면 처벌 경고</text>
  <text x="496" y="280" font-family="Arial" font-size="10" fill="#e2e8f0">• 직급·자원·경력 위협 활용</text>
  <rect x="496" y="291" width="188" height="24" rx="3" fill="#0d0d1e"/>
  <text x="590" y="307" font-family="Arial" font-size="9" fill="#ef4444" text-anchor="middle">⚠️ 분노·불신 야기 위험</text>

  <!-- Resistance Causes Analysis -->
  <rect x="28" y="338" width="664" height="110" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="360" y="358" font-family="Arial" font-size="12" font-weight="bold" fill="#e2e8f0" text-anchor="middle">■ 저항의 4가지 주요 원인 (Kotter &amp; Schlesinger)</text>

  <rect x="40" y="366" width="148" height="70" rx="4" fill="#1a3a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="114" y="384" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">① 자기 이익 우선</text>
  <text x="114" y="400" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">변화로 인한 개인적</text>
  <text x="114" y="414" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">손실·이익 충돌 우려</text>
  <text x="114" y="430" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">→ 협상·인센티브</text>

  <rect x="200" y="366" width="148" height="70" rx="4" fill="#1e2a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="274" y="384" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">② 정보 부족·오해</text>
  <text x="274" y="400" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">변화의 목적과 영향</text>
  <text x="274" y="414" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">이해 부족</text>
  <text x="274" y="430" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">→ 교육·소통</text>

  <rect x="360" y="366" width="148" height="70" rx="4" fill="#2e1065" stroke="#a855f7" stroke-width="1"/>
  <text x="434" y="384" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">③ 낮은 변화 허용</text>
  <text x="434" y="400" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">현상 유지 선호,</text>
  <text x="434" y="414" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">불확실성 회피</text>
  <text x="434" y="430" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">→ 지원·점진적 변화</text>

  <rect x="520" y="366" width="160" height="70" rx="4" fill="#2a1a06" stroke="#f97316" stroke-width="1"/>
  <text x="600" y="384" font-family="Arial" font-size="11" font-weight="bold" fill="#fb923c" text-anchor="middle">④ 변화 평가 차이</text>
  <text x="600" y="400" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">변화 필요성과 편익에</text>
  <text x="600" y="414" font-family="Arial" font-size="10" fill="#e2e8f0" text-anchor="middle">대한 다른 견해</text>
  <text x="600" y="430" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">→ 참여·데이터 공유</text>
</svg>
