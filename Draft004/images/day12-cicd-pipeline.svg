<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4aa"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>
  <text x="360" y="28" text-anchor="middle" fill="#f39c12" font-size="16" font-family="Arial,sans-serif" font-weight="bold">Day 12 — CI/CD 파이프라인</text>

  <!-- Stages -->
  <!-- Code -->
  <rect x="20" y="140" width="90" height="64" rx="8" fill="rgba(108,99,255,0.8)"/>
  <text x="65" y="165" text-anchor="middle" fill="white" font-size="20">💻</text>
  <text x="65" y="184" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Code</text>
  <text x="65" y="197" text-anchor="middle" fill="#ddd" font-size="8">Git Push</text>

  <line x1="110" y1="172" x2="128" y2="172" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Build -->
  <rect x="130" y="140" width="90" height="64" rx="8" fill="rgba(0,172,255,0.7)"/>
  <text x="175" y="165" text-anchor="middle" fill="white" font-size="20">🔨</text>
  <text x="175" y="184" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Build</text>
  <text x="175" y="197" text-anchor="middle" fill="#ddd" font-size="8">Maven/Gradle</text>

  <line x1="220" y1="172" x2="238" y2="172" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Test -->
  <rect x="240" y="140" width="90" height="64" rx="8" fill="rgba(0,212,170,0.7)"/>
  <text x="285" y="165" text-anchor="middle" fill="white" font-size="20">🧪</text>
  <text x="285" y="184" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Test</text>
  <text x="285" y="197" text-anchor="middle" fill="#ddd" font-size="8">JUnit/Selenium</text>

  <line x1="330" y1="172" x2="348" y2="172" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Security Scan (DevSecOps) -->
  <rect x="350" y="140" width="90" height="64" rx="8" fill="rgba(243,156,18,0.7)"/>
  <text x="395" y="165" text-anchor="middle" fill="white" font-size="20">🔒</text>
  <text x="395" y="184" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Scan</text>
  <text x="395" y="197" text-anchor="middle" fill="#ddd" font-size="8">SonarQube</text>

  <line x1="440" y1="172" x2="458" y2="172" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Package -->
  <rect x="460" y="140" width="90" height="64" rx="8" fill="rgba(155,89,182,0.7)"/>
  <text x="505" y="165" text-anchor="middle" fill="white" font-size="20">📦</text>
  <text x="505" y="184" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Package</text>
  <text x="505" y="197" text-anchor="middle" fill="#ddd" font-size="8">Docker Image</text>

  <line x1="550" y1="172" x2="568" y2="172" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Deploy -->
  <rect x="570" y="140" width="90" height="64" rx="8" fill="rgba(231,76,60,0.7)"/>
  <text x="615" y="165" text-anchor="middle" fill="white" font-size="20">🚀</text>
  <text x="615" y="184" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Deploy</text>
  <text x="615" y="197" text-anchor="middle" fill="#ddd" font-size="8">K8s / AWS</text>

  <!-- Tool labels above -->
  <text x="65" y="128" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">GitHub/GitLab</text>
  <text x="175" y="128" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">Jenkins/GitHub Actions</text>
  <text x="285" y="128" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">자동화 테스트</text>
  <text x="395" y="128" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">SAST/DAST</text>
  <text x="505" y="128" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">ECR/Harbor</text>
  <text x="615" y="128" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">ArgoCD/Helm</text>

  <!-- Continuous Integration bracket -->
  <line x1="20" y1="230" x2="330" y2="230" stroke="#6c63ff" stroke-width="2"/>
  <line x1="20" y1="230" x2="20" y2="222" stroke="#6c63ff" stroke-width="2"/>
  <line x1="330" y1="230" x2="330" y2="222" stroke="#6c63ff" stroke-width="2"/>
  <text x="175" y="248" text-anchor="middle" fill="#6c63ff" font-size="12" font-family="Arial,sans-serif" font-weight="bold">CI — Continuous Integration</text>
  <text x="175" y="262" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">코드 통합 → 자동 빌드·테스트 (수분 내 피드백)</text>

  <!-- Continuous Delivery bracket -->
  <line x1="330" y1="230" x2="660" y2="230" stroke="#00d4aa" stroke-width="2"/>
  <line x1="330" y1="230" x2="330" y2="222" stroke="#00d4aa" stroke-width="0"/>
  <line x1="660" y1="230" x2="660" y2="222" stroke="#00d4aa" stroke-width="2"/>
  <text x="495" y="248" text-anchor="middle" fill="#00d4aa" font-size="12" font-family="Arial,sans-serif" font-weight="bold">CD — Continuous Delivery/Deployment</text>
  <text x="495" y="262" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">자동 스테이징 배포 → (승인 후) 운영 배포</text>

  <!-- Environments row -->
  <text x="360" y="295" text-anchor="middle" fill="#f39c12" font-size="11" font-family="Arial,sans-serif" font-weight="bold">배포 환경 파이프라인:</text>
  <rect x="70" y="306" width="100" height="32" rx="5" fill="rgba(255,255,255,0.1)" stroke="#00d4aa" stroke-width="1"/>
  <text x="120" y="326" text-anchor="middle" fill="#00d4aa" font-size="10" font-family="Arial,sans-serif">Dev (개발)</text>
  <line x1="170" y1="322" x2="195" y2="322" stroke="#888" stroke-width="1.5" marker-end="url(#arr2)"/>
  <rect x="196" y="306" width="100" height="32" rx="5" fill="rgba(255,255,255,0.1)" stroke="#f39c12" stroke-width="1"/>
  <text x="246" y="326" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Arial,sans-serif">Staging (UAT)</text>
  <line x1="296" y1="322" x2="321" y2="322" stroke="#888" stroke-width="1.5" marker-end="url(#arr2)"/>
  <rect x="322" y="306" width="100" height="32" rx="5" fill="rgba(255,255,255,0.1)" stroke="#e74c3c" stroke-width="1"/>
  <text x="372" y="326" text-anchor="middle" fill="#e74c3c" font-size="10" font-family="Arial,sans-serif">Production 🔴</text>

  <!-- Rollback -->
  <path d="M 450 322 C 500 322 530 300 490 285" stroke="#888" fill="none" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="530" y="302" fill="#888" font-size="8" font-family="Arial,sans-serif">장애 시 자동</text>
  <text x="530" y="314" fill="#888" font-size="8" font-family="Arial,sans-serif">Rollback</text>

  <text x="360" y="380" text-anchor="middle" fill="#555" font-size="9" font-family="Arial,sans-serif">DevOps = Dev + Ops 협업 문화 | MTTR (평균 복구 시간) ↓ | 배포 주기 ↑ | 변경 실패율 ↓</text>
</svg>
