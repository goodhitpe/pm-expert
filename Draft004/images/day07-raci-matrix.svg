<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="420" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="33" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">Day 07 — RACI 책임 배정 매트릭스</text>
  <text x="360" y="52" text-anchor="middle" fill="#9090c0" font-size="11">R(수행) · A(책임) · C(자문) · I(통보) — 역할·책임 모호성 제거 도구</text>

  <!-- RACI legend -->
  <rect x="30"  y="64" width="145" height="28" rx="6" fill="#3a1a1a" opacity="0.9" stroke="#cc4040" stroke-width="1.5"/>
  <text x="102" y="83" text-anchor="middle" fill="#ff8888" font-size="12" font-weight="bold">R — Responsible</text>

  <rect x="185" y="64" width="145" height="28" rx="6" fill="#1a3a1a" opacity="0.9" stroke="#40cc40" stroke-width="1.5"/>
  <text x="257" y="83" text-anchor="middle" fill="#7dff9a" font-size="12" font-weight="bold">A — Accountable</text>

  <rect x="340" y="64" width="145" height="28" rx="6" fill="#1a1a5a" opacity="0.9" stroke="#4040cc" stroke-width="1.5"/>
  <text x="412" y="83" text-anchor="middle" fill="#8888ff" font-size="12" font-weight="bold">C — Consulted</text>

  <rect x="495" y="64" width="145" height="28" rx="6" fill="#3a3a1a" opacity="0.9" stroke="#cccc40" stroke-width="1.5"/>
  <text x="567" y="83" text-anchor="middle" fill="#ffff80" font-size="12" font-weight="bold">I — Informed</text>

  <!-- Sub text -->
  <text x="102" y="108" text-anchor="middle" fill="#e08080" font-size="10">실제 작업 수행자</text>
  <text x="257" y="108" text-anchor="middle" fill="#80e090" font-size="10">최종 책임 1인</text>
  <text x="412" y="108" text-anchor="middle" fill="#8898ff" font-size="10">전문 의견 제공</text>
  <text x="567" y="108" text-anchor="middle" fill="#f0f060" font-size="10">결과만 통보받음</text>

  <!-- RACI table -->
  <!-- Column headers -->
  <rect x="220" y="120" width="100" height="28" rx="5" fill="#2a2a4a" opacity="0.9"/>
  <text x="270" y="139" text-anchor="middle" fill="#c0c0e0" font-size="11" font-weight="bold">PM</text>
  <rect x="326" y="120" width="100" height="28" rx="5" fill="#2a2a4a" opacity="0.9"/>
  <text x="376" y="139" text-anchor="middle" fill="#c0c0e0" font-size="11" font-weight="bold">개발팀</text>
  <rect x="432" y="120" width="100" height="28" rx="5" fill="#2a2a4a" opacity="0.9"/>
  <text x="482" y="139" text-anchor="middle" fill="#c0c0e0" font-size="11" font-weight="bold">설계팀</text>
  <rect x="538" y="120" width="100" height="28" rx="5" fill="#2a2a4a" opacity="0.9"/>
  <text x="588" y="139" text-anchor="middle" fill="#c0c0e0" font-size="11" font-weight="bold">경영진</text>
  <rect x="644" y="120" width="62" height="28" rx="5" fill="#2a2a4a" opacity="0.9"/>
  <text x="675" y="139" text-anchor="middle" fill="#c0c0e0" font-size="11" font-weight="bold">QA</text>

  <!-- Row background grid -->
  <rect x="30" y="152" width="656" height="28" rx="4" fill="#1a1a2a" opacity="0.5"/>
  <rect x="30" y="184" width="656" height="28" rx="4" fill="#1a2a1a" opacity="0.5"/>
  <rect x="30" y="216" width="656" height="28" rx="4" fill="#1a1a2a" opacity="0.5"/>
  <rect x="30" y="248" width="656" height="28" rx="4" fill="#1a2a1a" opacity="0.5"/>
  <rect x="30" y="280" width="656" height="28" rx="4" fill="#1a1a2a" opacity="0.5"/>

  <!-- Row labels -->
  <text x="35"  y="171" fill="#d0d0f0" font-size="11">요구사항 정의</text>
  <text x="35"  y="203" fill="#d0d0f0" font-size="11">아키텍처 설계</text>
  <text x="35"  y="235" fill="#d0d0f0" font-size="11">코드 개발</text>
  <text x="35"  y="267" fill="#d0d0f0" font-size="11">테스트 수행</text>
  <text x="35"  y="299" fill="#d0d0f0" font-size="11">배포 승인</text>

  <!-- Row 1: 요구사항 정의 -->
  <text x="270" y="171" text-anchor="middle" fill="#7dff9a" font-size="13" font-weight="bold">A</text>
  <text x="376" y="171" text-anchor="middle" fill="#ff8888" font-size="13" font-weight="bold">R</text>
  <text x="482" y="171" text-anchor="middle" fill="#8888ff" font-size="13" font-weight="bold">C</text>
  <text x="588" y="171" text-anchor="middle" fill="#ffff80" font-size="13" font-weight="bold">I</text>
  <text x="675" y="171" text-anchor="middle" fill="#8888ff" font-size="13" font-weight="bold">C</text>

  <!-- Row 2: 아키텍처 설계 -->
  <text x="270" y="203" text-anchor="middle" fill="#8888ff" font-size="13" font-weight="bold">C</text>
  <text x="376" y="203" text-anchor="middle" fill="#ff8888" font-size="13" font-weight="bold">R</text>
  <text x="482" y="203" text-anchor="middle" fill="#7dff9a" font-size="13" font-weight="bold">A</text>
  <text x="588" y="203" text-anchor="middle" fill="#ffff80" font-size="13" font-weight="bold">I</text>
  <text x="675" y="203" text-anchor="middle" fill="#8888ff" font-size="13" font-weight="bold">C</text>

  <!-- Row 3: 코드 개발 -->
  <text x="270" y="235" text-anchor="middle" fill="#ffff80" font-size="13" font-weight="bold">I</text>
  <text x="376" y="235" text-anchor="middle" fill="#ff8888" font-size="13" font-weight="bold">R/A</text>
  <text x="482" y="235" text-anchor="middle" fill="#8888ff" font-size="13" font-weight="bold">C</text>
  <text x="588" y="235" text-anchor="middle" fill="#9a9a9a" font-size="13">—</text>
  <text x="675" y="235" text-anchor="middle" fill="#ffff80" font-size="13" font-weight="bold">I</text>

  <!-- Row 4: 테스트 수행 -->
  <text x="270" y="267" text-anchor="middle" fill="#8888ff" font-size="13" font-weight="bold">C</text>
  <text x="376" y="267" text-anchor="middle" fill="#8888ff" font-size="13" font-weight="bold">C</text>
  <text x="482" y="267" text-anchor="middle" fill="#ffff80" font-size="13" font-weight="bold">I</text>
  <text x="588" y="267" text-anchor="middle" fill="#ffff80" font-size="13" font-weight="bold">I</text>
  <text x="675" y="267" text-anchor="middle" fill="#ff8888" font-size="13" font-weight="bold">R/A</text>

  <!-- Row 5: 배포 승인 -->
  <text x="270" y="299" text-anchor="middle" fill="#7dff9a" font-size="13" font-weight="bold">A</text>
  <text x="376" y="299" text-anchor="middle" fill="#ff8888" font-size="13" font-weight="bold">R</text>
  <text x="482" y="299" text-anchor="middle" fill="#8888ff" font-size="13" font-weight="bold">C</text>
  <text x="588" y="299" text-anchor="middle" fill="#7dff9a" font-size="13" font-weight="bold">A</text>
  <text x="675" y="299" text-anchor="middle" fill="#ff8888" font-size="13" font-weight="bold">R</text>

  <!-- Rules panel -->
  <rect x="30" y="320" width="660" height="70" rx="10" fill="#0f1a3a" opacity="0.9" stroke="#2a3a6a" stroke-width="1"/>
  <text x="360" y="340" text-anchor="middle" fill="#a0b8e0" font-size="12" font-weight="bold">RACI 작성 원칙</text>
  <text x="55"  y="360" fill="#ff8888" font-size="11">• A는 반드시 1인만 (Two-pizza rule)</text>
  <text x="55"  y="378" fill="#7dff9a" font-size="11">• R은 복수 가능, 단 책임이 중복되지 않게</text>
  <text x="380" y="360" fill="#8888ff" font-size="11">• C는 양방향 소통 (결과에 반영됨)</text>
  <text x="380" y="378" fill="#ffff80" font-size="11">• I는 일방향 통보만 (업데이트 수신)</text>

  <!-- Footer -->
  <text x="360" y="406" text-anchor="middle" fill="#6a6a9a" font-size="10">PM 관점: RACI 없이 시작하면 "누가 결정권자인가"가 불명확해져 의사결정 지연과 갈등이 발생합니다</text>
</svg>
