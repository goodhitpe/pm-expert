<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="420" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">워터폴 vs 애자일 — 핵심 비교</text>

  <!-- Column headers -->
  <rect x="220" y="44" width="220" height="32" rx="8" fill="#1a2a5a" opacity="0.9"/>
  <text x="330" y="65" text-anchor="middle" fill="#58c4f6" font-size="13" font-weight="bold">🏗️ 워터폴 (Waterfall)</text>

  <rect x="450" y="44" width="240" height="32" rx="8" fill="#1a4a2a" opacity="0.9"/>
  <text x="570" y="65" text-anchor="middle" fill="#7dff9a" font-size="13" font-weight="bold">🔄 애자일 (Agile)</text>

  <!-- Row items -->
  <!-- Row helper function: y starts at 85, each row 33px -->
  <!-- Row 1: 접근방식 -->
  <rect x="20"  y="84" width="195" height="28" rx="4" fill="#2a2a4a" opacity="0.6"/>
  <text x="117" y="102" text-anchor="middle" fill="#a0b0d8" font-size="11" font-weight="bold">접근 방식</text>
  <rect x="220" y="84" width="220" height="28" rx="4" fill="#192448" opacity="0.6"/>
  <text x="330" y="102" text-anchor="middle" fill="#90b0e0" font-size="11">예측적 (Predictive)</text>
  <rect x="450" y="84" width="240" height="28" rx="4" fill="#193828" opacity="0.6"/>
  <text x="570" y="102" text-anchor="middle" fill="#90d8a0" font-size="11">적응적 (Adaptive)</text>

  <!-- Row 2: 요구사항 -->
  <rect x="20"  y="116" width="195" height="28" rx="4" fill="#2a2a4a" opacity="0.5"/>
  <text x="117" y="134" text-anchor="middle" fill="#a0b0d8" font-size="11" font-weight="bold">요구사항</text>
  <rect x="220" y="116" width="220" height="28" rx="4" fill="#142040" opacity="0.5"/>
  <text x="330" y="134" text-anchor="middle" fill="#8090c8" font-size="11">초기에 전체 확정</text>
  <rect x="450" y="116" width="240" height="28" rx="4" fill="#143428" opacity="0.5"/>
  <text x="570" y="134" text-anchor="middle" fill="#80d090" font-size="11">점진적 발견·변경 환영</text>

  <!-- Row 3: 변경 -->
  <rect x="20"  y="148" width="195" height="28" rx="4" fill="#2a2a4a" opacity="0.6"/>
  <text x="117" y="166" text-anchor="middle" fill="#a0b0d8" font-size="11" font-weight="bold">변경 대응</text>
  <rect x="220" y="148" width="220" height="28" rx="4" fill="#1a2040" opacity="0.6"/>
  <text x="330" y="166" text-anchor="middle" fill="#ff9090" font-size="11">통제 대상 (변경 비용↑)</text>
  <rect x="450" y="148" width="240" height="28" rx="4" fill="#193828" opacity="0.6"/>
  <text x="570" y="166" text-anchor="middle" fill="#90ff90" font-size="11">환영 대상 (저비용 수정)</text>

  <!-- Row 4: 인도 -->
  <rect x="20"  y="180" width="195" height="28" rx="4" fill="#2a2a4a" opacity="0.5"/>
  <text x="117" y="198" text-anchor="middle" fill="#a0b0d8" font-size="11" font-weight="bold">가치 인도</text>
  <rect x="220" y="180" width="220" height="28" rx="4" fill="#142040" opacity="0.5"/>
  <text x="330" y="198" text-anchor="middle" fill="#90a0d0" font-size="11">프로젝트 종료 시 1회</text>
  <rect x="450" y="180" width="240" height="28" rx="4" fill="#143428" opacity="0.5"/>
  <text x="570" y="198" text-anchor="middle" fill="#80d090" font-size="11">2주마다 반복 인도</text>

  <!-- Row 5: 고객 참여 -->
  <rect x="20"  y="212" width="195" height="28" rx="4" fill="#2a2a4a" opacity="0.6"/>
  <text x="117" y="230" text-anchor="middle" fill="#a0b0d8" font-size="11" font-weight="bold">고객 참여</text>
  <rect x="220" y="212" width="220" height="28" rx="4" fill="#1a2040" opacity="0.6"/>
  <text x="330" y="230" text-anchor="middle" fill="#90a0d0" font-size="11">초기 요건 · 종료 시 검수</text>
  <rect x="450" y="212" width="240" height="28" rx="4" fill="#193828" opacity="0.6"/>
  <text x="570" y="230" text-anchor="middle" fill="#80d090" font-size="11">매 스프린트 시연 참여</text>

  <!-- Row 6: 문서화 -->
  <rect x="20"  y="244" width="195" height="28" rx="4" fill="#2a2a4a" opacity="0.5"/>
  <text x="117" y="262" text-anchor="middle" fill="#a0b0d8" font-size="11" font-weight="bold">문서화</text>
  <rect x="220" y="244" width="220" height="28" rx="4" fill="#142040" opacity="0.5"/>
  <text x="330" y="262" text-anchor="middle" fill="#90a0d0" font-size="11">상세 (선행 작성)</text>
  <rect x="450" y="244" width="240" height="28" rx="4" fill="#143428" opacity="0.5"/>
  <text x="570" y="262" text-anchor="middle" fill="#80d090" font-size="11">필요한 만큼 (적시 작성)</text>

  <!-- Row 7: 리스크 -->
  <rect x="20"  y="276" width="195" height="28" rx="4" fill="#2a2a4a" opacity="0.6"/>
  <text x="117" y="294" text-anchor="middle" fill="#a0b0d8" font-size="11" font-weight="bold">리스크 발견 시점</text>
  <rect x="220" y="276" width="220" height="28" rx="4" fill="#3a1a1a" opacity="0.6"/>
  <text x="330" y="294" text-anchor="middle" fill="#ff9090" font-size="11">후반기 (수정 비용 대)</text>
  <rect x="450" y="276" width="240" height="28" rx="4" fill="#143428" opacity="0.6"/>
  <text x="570" y="294" text-anchor="middle" fill="#90ff90" font-size="11">초기 스프린트 (저비용)</text>

  <!-- Row 8: 적합 상황 -->
  <rect x="20"  y="308" width="195" height="28" rx="4" fill="#2a2a4a" opacity="0.5"/>
  <text x="117" y="326" text-anchor="middle" fill="#a0b0d8" font-size="11" font-weight="bold">적합 상황</text>
  <rect x="220" y="308" width="220" height="28" rx="4" fill="#1a2040" opacity="0.5"/>
  <text x="330" y="326" text-anchor="middle" fill="#7ac0f8" font-size="11">요건 명확 · 규제 산업</text>
  <rect x="450" y="308" width="240" height="28" rx="4" fill="#143428" opacity="0.5"/>
  <text x="570" y="326" text-anchor="middle" fill="#80d090" font-size="11">불확실 · 혁신 프로젝트</text>

  <!-- Hybrid note -->
  <rect x="20" y="348" width="670" height="40" rx="8" fill="#2a2a1a" opacity="0.8" stroke="#8a8a30" stroke-width="1"/>
  <text x="355" y="364" text-anchor="middle" fill="#f0f060" font-size="12" font-weight="bold">🔀 하이브리드 접근</text>
  <text x="355" y="381" text-anchor="middle" fill="#d8d880" font-size="10">팀 내부: 스크럼 스프린트 | 경영진 보고: 워터폴 마일스톤 형식 | 규제 산업: 애자일 + 문서화 병행</text>

  <!-- Bottom note -->
  <text x="360" y="408" text-anchor="middle" fill="#6a6a9a" font-size="10">PM 관점: 방법론은 도구입니다 — 프로젝트 성격에 맞게 선택하고 혼용할 수 있어야 합니다</text>
</svg>
