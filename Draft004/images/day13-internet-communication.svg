<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" width="720" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="720" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="34" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">인터넷 통신 원리 — DNS 흐름 및 HTTP/HTTPS</text>

  <!-- DNS Resolution Flow Section -->
  <text x="360" y="58" font-family="Arial" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">■ DNS 이름 확인 흐름 (www.example.com 을 찾아가는 과정)</text>

  <!-- User -->
  <rect x="20" y="72" width="80" height="60" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="60" y="99" font-family="Arial" font-size="20" text-anchor="middle">👤</text>
  <text x="60" y="115" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">사용자</text>
  <text x="60" y="128" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">브라우저</text>

  <!-- Arrow 1 -->
  <line x1="100" y1="102" x2="138" y2="102" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="119" y="96" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">①쿼리</text>

  <!-- Recursive DNS (ISP) -->
  <rect x="138" y="72" width="96" height="60" rx="6" fill="#1a2820" stroke="#22c55e" stroke-width="1.5"/>
  <text x="186" y="96" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">재귀 DNS</text>
  <text x="186" y="110" font-family="Arial" font-size="9" fill="#86efac" text-anchor="middle">Resolver</text>
  <text x="186" y="124" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">ISP 제공</text>

  <!-- Arrow 2 -->
  <line x1="234" y1="102" x2="272" y2="102" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="253" y="96" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">②질의</text>

  <!-- Root DNS -->
  <rect x="272" y="72" width="96" height="60" rx="6" fill="#3a1a1a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="320" y="96" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">루트 DNS</text>
  <text x="320" y="110" font-family="Arial" font-size="9" fill="#fca5a5" text-anchor="middle">Root Server</text>
  <text x="320" y="124" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">전 세계 13개</text>

  <!-- Arrow 3 -->
  <line x1="368" y1="102" x2="406" y2="102" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="387" y="96" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">③.com</text>

  <!-- TLD DNS -->
  <rect x="406" y="72" width="96" height="60" rx="6" fill="#2e1065" stroke="#a855f7" stroke-width="1.5"/>
  <text x="454" y="96" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">TLD DNS</text>
  <text x="454" y="110" font-family="Arial" font-size="9" fill="#c4b5fd" text-anchor="middle">.com 서버</text>
  <text x="454" y="124" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">최상위 도메인</text>

  <!-- Arrow 4 -->
  <line x1="502" y1="102" x2="540" y2="102" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="521" y="96" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">④권한</text>

  <!-- Authoritative DNS -->
  <rect x="540" y="72" width="96" height="60" rx="6" fill="#3a3a1a" stroke="#eab308" stroke-width="1.5"/>
  <text x="588" y="96" font-family="Arial" font-size="10" fill="#fde68a" text-anchor="middle">권한 DNS</text>
  <text x="588" y="110" font-family="Arial" font-size="9" fill="#fde68a" text-anchor="middle">Authoritative</text>
  <text x="588" y="124" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">도메인 소유자</text>

  <!-- Arrow 5 (response back to user) -->
  <line x1="636" y1="102" x2="674" y2="102" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- Web Server -->
  <rect x="674" y="72" width="38" height="60" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="693" y="93" font-family="Arial" font-size="8" fill="#93c5fd" text-anchor="middle">웹</text>
  <text x="693" y="105" font-family="Arial" font-size="8" fill="#93c5fd" text-anchor="middle">서버</text>
  <text x="693" y="122" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">IP수신</text>

  <!-- Return flow arrow (bottom) -->
  <path d="M654 140 Q360 180 100 140" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
  <text x="360" y="176" font-family="Arial" font-size="10" fill="#4ade80" text-anchor="middle">⑤ IP 주소 응답 → 브라우저가 해당 IP로 직접 연결</text>

  <!-- HTTP vs HTTPS Comparison -->
  <line x1="40" y1="200" x2="680" y2="200" stroke="#334155" stroke-width="1"/>
  <text x="360" y="222" font-family="Arial" font-size="15" font-weight="bold" fill="#e2e8f0" text-anchor="middle">■ HTTP vs HTTPS 비교</text>

  <!-- HTTP Column -->
  <rect x="40" y="236" width="300" height="236" rx="8" fill="#3a1a1a" stroke="#ef4444" stroke-width="2"/>
  <rect x="40" y="236" width="300" height="32" rx="8" fill="#dc2626"/>
  <rect x="40" y="252" width="300" height="16" fill="#dc2626"/>
  <text x="190" y="258" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">HTTP</text>
  <text x="190" y="274" font-family="Arial" font-size="10" fill="#fecaca" text-anchor="middle">HyperText Transfer Protocol (비암호화)</text>
  <text x="190" y="298" font-family="Arial" font-size="11" fill="#fca5a5" text-anchor="middle">포트: 80</text>
  <text x="190" y="318" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 데이터 평문(Plain text) 전송</text>
  <text x="190" y="336" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 중간자 공격(MITM) 취약</text>
  <text x="190" y="354" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 패킷 가로채기 시 내용 노출</text>
  <text x="190" y="372" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 인증서 없음, 신원 확인 불가</text>
  <text x="190" y="394" font-family="Arial" font-size="10" fill="#f87171" text-anchor="middle">⚠️ 개인정보, 로그인 데이터 전송 금지</text>
  <text x="190" y="412" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">사용 가능: 공개 정보 조회 페이지</text>
  <text x="190" y="432" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">브라우저 표시: Not Secure ⚠️</text>
  <text x="190" y="452" font-family="Arial" font-size="9" fill="#450a0a" text-anchor="middle" font-weight="bold">📋 현재 대부분 사이트는 HTTPS로 전환됨</text>

  <!-- HTTPS Column -->
  <rect x="380" y="236" width="300" height="236" rx="8" fill="#1a2820" stroke="#22c55e" stroke-width="2"/>
  <rect x="380" y="236" width="300" height="32" rx="8" fill="#16a34a"/>
  <rect x="380" y="252" width="300" height="16" fill="#16a34a"/>
  <text x="530" y="258" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">HTTPS</text>
  <text x="530" y="274" font-family="Arial" font-size="10" fill="#bbf7d0" text-anchor="middle">HTTP Secure (TLS/SSL 암호화)</text>
  <text x="530" y="298" font-family="Arial" font-size="11" fill="#4ade80" text-anchor="middle">포트: 443</text>
  <text x="530" y="318" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• TLS/SSL로 암호화 전송</text>
  <text x="530" y="336" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 가로채도 내용 해독 불가</text>
  <text x="530" y="354" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• SSL 인증서로 서버 신원 확인</text>
  <text x="530" y="372" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 데이터 무결성 보장(변조 탐지)</text>
  <text x="530" y="394" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">✅ 필수: 로그인, 결제, 개인정보 처리</text>
  <text x="530" y="412" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">TLS Handshake 과정: 인증서 교환</text>
  <text x="530" y="432" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">→ 공개키/세션키 협상 → 암호화 통신</text>
  <text x="530" y="452" font-family="Arial" font-size="9" fill="#166534" text-anchor="middle" font-weight="bold">브라우저 표시: 🔒 자물쇠 아이콘</text>
</svg>
