<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7a9ad8"/>
    </marker>
  </defs>
  <rect width="720" height="440" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">스크럼 스프린트 사이클</text>
  <text x="360" y="50" text-anchor="middle" fill="#9090c0" font-size="11">2주 반복 — 계획 → 개발 → 검토 → 회고 → 다음 스프린트</text>

  <!-- Product Backlog -->
  <rect x="20" y="62" width="120" height="270" rx="10" fill="#1a2a5c" opacity="0.85" stroke="#3a5aac" stroke-width="1.5"/>
  <text x="80" y="82"  text-anchor="middle" fill="#58c4f6" font-size="11" font-weight="bold">Product</text>
  <text x="80" y="96"  text-anchor="middle" fill="#58c4f6" font-size="11" font-weight="bold">Backlog</text>
  <rect x="33" y="107" width="94" height="18" rx="4" fill="#2a4a8c" opacity="0.8"/>
  <text x="80"  y="120" text-anchor="middle" fill="#c0d8ff" font-size="9">Epic 1: 사용자 인증</text>
  <rect x="33" y="130" width="94" height="18" rx="4" fill="#2a4a8c" opacity="0.8"/>
  <text x="80"  y="143" text-anchor="middle" fill="#c0d8ff" font-size="9">Epic 2: 결제 시스템</text>
  <rect x="33" y="153" width="94" height="18" rx="4" fill="#2a4a8c" opacity="0.7"/>
  <text x="80"  y="166" text-anchor="middle" fill="#90b0e0" font-size="9">Story: 로그인 화면</text>
  <rect x="33" y="176" width="94" height="18" rx="4" fill="#2a4a8c" opacity="0.7"/>
  <text x="80"  y="189" text-anchor="middle" fill="#90b0e0" font-size="9">Story: 비밀번호 변경</text>
  <rect x="33" y="199" width="94" height="18" rx="4" fill="#2a4a8c" opacity="0.6"/>
  <text x="80"  y="212" text-anchor="middle" fill="#7090c0" font-size="9">Story: SNS 연동</text>
  <rect x="33" y="222" width="94" height="18" rx="4" fill="#2a4a8c" opacity="0.6"/>
  <text x="80"  y="235" text-anchor="middle" fill="#7090c0" font-size="9">Task: API 설계</text>
  <text x="80" y="288" text-anchor="middle" fill="#5a7ac0" font-size="9">…더 많은 항목…</text>
  <text x="80" y="312" text-anchor="middle" fill="#4a9ad8" font-size="9" font-weight="bold">PO 관리</text>
  <text x="80" y="327" text-anchor="middle" fill="#58c4f6" font-size="9">우선순위 정렬</text>

  <!-- Arrow: Backlog -> Sprint Planning -->
  <line x1="143" y1="197" x2="168" y2="197" stroke="#7a9ad8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Sprint box (center) -->
  <rect x="170" y="62" width="380" height="270" rx="12" fill="#0f1a3a" opacity="0.9" stroke="#3a5aac" stroke-width="2"/>
  <text x="360" y="84" text-anchor="middle" fill="#7ac0ff" font-size="14" font-weight="bold">🔄 Sprint (2주)</text>

  <!-- Sprint Planning -->
  <rect x="183" y="92" width="160" height="80" rx="8" fill="#1a2a6a" opacity="0.85"/>
  <text x="263" y="109" text-anchor="middle" fill="#58c4f6" font-size="11" font-weight="bold">① Sprint Planning</text>
  <text x="263" y="124" text-anchor="middle" fill="#90b8e8" font-size="9">Sprint 목표 설정</text>
  <text x="263" y="138" text-anchor="middle" fill="#90b8e8" font-size="9">Sprint Backlog 구성</text>
  <text x="263" y="152" text-anchor="middle" fill="#90b8e8" font-size="9">작업 분해 (4h 이하)</text>
  <text x="263" y="165" text-anchor="middle" fill="#c0d8ff" font-size="8">산출물: Sprint Backlog</text>

  <!-- Daily Scrum -->
  <rect x="357" y="92" width="180" height="80" rx="8" fill="#1a3a2a" opacity="0.85"/>
  <text x="447" y="109" text-anchor="middle" fill="#7dff9a" font-size="11" font-weight="bold">② Daily Scrum</text>
  <text x="447" y="124" text-anchor="middle" fill="#90d0a0" font-size="9">매일 15분 / 아침</text>
  <text x="447" y="138" text-anchor="middle" fill="#90d0a0" font-size="9">어제 한 일?</text>
  <text x="447" y="152" text-anchor="middle" fill="#90d0a0" font-size="9">오늘 할 일? 장애물?</text>
  <text x="447" y="165" text-anchor="middle" fill="#a0e8a8" font-size="8">진행: Scrum Master</text>

  <!-- Dev work -->
  <rect x="183" y="188" width="354" height="50" rx="8" fill="#2a1a3a" opacity="0.85"/>
  <text x="360" y="208" text-anchor="middle" fill="#c084f5" font-size="11" font-weight="bold">개발 작업 (Development Work)</text>
  <text x="360" y="228" text-anchor="middle" fill="#b090d8" font-size="9">코딩 · 테스트 · 통합 · 코드 리뷰 · 자동화 테스트 (CI/CD)</text>

  <!-- Sprint Review -->
  <rect x="183" y="254" width="160" height="65" rx="8" fill="#3a2a1a" opacity="0.85"/>
  <text x="263" y="271" text-anchor="middle" fill="#ffa040" font-size="11" font-weight="bold">③ Sprint Review</text>
  <text x="263" y="287" text-anchor="middle" fill="#e0b080" font-size="9">완성된 기능 시연</text>
  <text x="263" y="302" text-anchor="middle" fill="#e0b080" font-size="9">PO·고객 피드백</text>
  <text x="263" y="313" text-anchor="middle" fill="#ffd090" font-size="8">산출물: Increment</text>

  <!-- Sprint Retro -->
  <rect x="357" y="254" width="180" height="65" rx="8" fill="#2a2a1a" opacity="0.85"/>
  <text x="447" y="271" text-anchor="middle" fill="#f0f060" font-size="11" font-weight="bold">④ Sprint Retro</text>
  <text x="447" y="287" text-anchor="middle" fill="#e0e090" font-size="9">잘된 것 / 개선할 것</text>
  <text x="447" y="302" text-anchor="middle" fill="#e0e090" font-size="9">액션 아이템 결정</text>
  <text x="447" y="313" text-anchor="middle" fill="#fff080" font-size="8">팀 프로세스 개선</text>

  <!-- Loop arrow inside sprint -->
  <path d="M 447 189 Q 447 165 360 160 Q 273 155 263 172" stroke="#c084f5" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Arrow: Sprint -> Increment -->
  <line x1="553" y1="197" x2="578" y2="197" stroke="#7a9ad8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Increment -->
  <rect x="580" y="62" width="118" height="270" rx="10" fill="#1a3a2a" opacity="0.85" stroke="#3aac6a" stroke-width="1.5"/>
  <text x="639" y="82"  text-anchor="middle" fill="#7dff9a" font-size="11" font-weight="bold">Increment</text>
  <text x="639" y="96"  text-anchor="middle" fill="#7dff9a" font-size="10">(잠재 출시 가능)</text>
  <rect x="593" y="107" width="92" height="26" rx="5" fill="#2a6a4a" opacity="0.8"/>
  <text x="639" y="120" text-anchor="middle" fill="#a0f8c0" font-size="9" font-weight="bold">Sprint 1</text>
  <text x="639" y="132" text-anchor="middle" fill="#80d0a0" font-size="8">로그인 기능</text>
  <rect x="593" y="138" width="92" height="26" rx="5" fill="#2a6a4a" opacity="0.75"/>
  <text x="639" y="152" text-anchor="middle" fill="#a0f8c0" font-size="9" font-weight="bold">Sprint 2</text>
  <text x="639" y="164" text-anchor="middle" fill="#80d0a0" font-size="8">결제 기능</text>
  <rect x="593" y="169" width="92" height="26" rx="5" fill="#2a6a4a" opacity="0.7"/>
  <text x="639" y="183" text-anchor="middle" fill="#90e8b0" font-size="9" font-weight="bold">Sprint 3</text>
  <text x="639" y="195" text-anchor="middle" fill="#70c090" font-size="8">알림 기능</text>
  <text x="639" y="250" text-anchor="middle" fill="#5aac7a" font-size="9">누적 증가</text>
  <text x="639" y="265" text-anchor="middle" fill="#5aac7a" font-size="9">DoD 충족</text>
  <text x="639" y="290" text-anchor="middle" fill="#7dff9a" font-size="9" font-weight="bold">PO 릴리즈</text>
  <text x="639" y="305" text-anchor="middle" fill="#58c490" font-size="9">결정권 보유</text>

  <!-- Loop arrow: Retro back to Planning -->
  <path d="M 360 337 Q 360 360 263 360 Q 185 360 185 340" stroke="#f0f060" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="360" y="376" text-anchor="middle" fill="#d8d860" font-size="9">다음 스프린트로 반복 →</text>

  <!-- Roles legend -->
  <rect x="20" y="348" width="670" height="60" rx="8" fill="#1a1a3a" opacity="0.8" stroke="#3a3a6a" stroke-width="1"/>
  <text x="360" y="364" text-anchor="middle" fill="#a0b0d8" font-size="11" font-weight="bold">스크럼 3역할</text>
  <rect x="35"  y="372" width="185" height="26" rx="5" fill="#1a2a5c" opacity="0.7"/>
  <text x="127" y="388" text-anchor="middle" fill="#58c4f6" font-size="10">🎯 PO (Product Owner): WHY</text>
  <text x="127" y="398" text-anchor="middle" fill="#80a0d0" font-size="8">비즈니스 가치 · 백로그 우선순위</text>

  <rect x="233" y="372" width="235" height="26" rx="5" fill="#1a3a2a" opacity="0.7"/>
  <text x="350" y="388" text-anchor="middle" fill="#7dff9a" font-size="10">🛡️ SM (Scrum Master): HOW</text>
  <text x="350" y="398" text-anchor="middle" fill="#80c890" font-size="8">장애물 제거 · 프로세스 코치 · 퍼실리테이터</text>

  <rect x="482" y="372" width="195" height="26" rx="5" fill="#2a1a3a" opacity="0.7"/>
  <text x="579" y="388" text-anchor="middle" fill="#c084f5" font-size="10">👷 Dev Team: WHAT</text>
  <text x="579" y="398" text-anchor="middle" fill="#9070c0" font-size="8">개발·테스트·설계 · 자기조직화</text>
</svg>
