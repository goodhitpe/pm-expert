<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>
  <text x="360" y="26" text-anchor="middle" fill="#e0e0ff" font-size="14" font-weight="bold">프로젝트 헌장 (Project Charter) — 구성 요소</text>
  <text x="360" y="43" text-anchor="middle" fill="#9090c0" font-size="9.5">프로젝트 존재의 공식 승인 문서 · 스폰서 서명 필수 · PM 권한의 근거</text>

  <!-- Left: 8 key components -->
  <rect x="12" y="56" width="340" height="272" rx="9" fill="#12122a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
  <text x="182" y="74" text-anchor="middle" fill="#d0d0ff" font-size="10.5" font-weight="bold">헌장의 8대 구성 요소</text>

  <rect x="22"  y="81"  width="320" height="28" rx="5" fill="#1a2060" opacity="0.8"/>
  <text x="37"  y="99"  fill="#7ab8ff" font-size="9" font-weight="bold">① 프로젝트 목적 및 정당성</text>
  <text x="340" y="99"  text-anchor="end" fill="#5070a0" font-size="8">왜 이 프로젝트가 필요한가?</text>

  <rect x="22"  y="112" width="320" height="28" rx="5" fill="#1a2860" opacity="0.8"/>
  <text x="37"  y="130" fill="#7ad8ff" font-size="9" font-weight="bold">② 측정 가능한 목표 및 성공 기준</text>
  <text x="340" y="130" text-anchor="end" fill="#406080" font-size="8">SMART 목표</text>

  <rect x="22"  y="143" width="320" height="28" rx="5" fill="#1a3a20" opacity="0.8"/>
  <text x="37"  y="161" fill="#7dff9a" font-size="9" font-weight="bold">③ 상위 수준 요구사항 및 범위 기술</text>
  <text x="340" y="161" text-anchor="end" fill="#2a7040" font-size="8">인·아웃 스코프 경계</text>

  <rect x="22"  y="174" width="320" height="28" rx="5" fill="#3a2a10" opacity="0.8"/>
  <text x="37"  y="192" fill="#ffc070" font-size="9" font-weight="bold">④ 전반적 리스크</text>
  <text x="340" y="192" text-anchor="end" fill="#806020" font-size="8">주요 불확실성·전제 조건</text>

  <rect x="22"  y="205" width="320" height="28" rx="5" fill="#3a1a10" opacity="0.8"/>
  <text x="37"  y="223" fill="#ff9060" font-size="9" font-weight="bold">⑤ 요약 마스터 일정 및 마일스톤</text>
  <text x="340" y="223" text-anchor="end" fill="#802020" font-size="8">주요 산출물 예상 일정</text>

  <rect x="22"  y="236" width="320" height="28" rx="5" fill="#2a1a5c" opacity="0.8"/>
  <text x="37"  y="254" fill="#c084f5" font-size="9" font-weight="bold">⑥ 사전 승인된 재무 자원</text>
  <text x="340" y="254" text-anchor="end" fill="#5030a0" font-size="8">예산 상한·분류</text>

  <rect x="22"  y="267" width="320" height="28" rx="5" fill="#1a2a3a" opacity="0.8"/>
  <text x="37"  y="285" fill="#70d0ff" font-size="9" font-weight="bold">⑦ 주요 이해관계자 목록</text>
  <text x="340" y="285" text-anchor="end" fill="#304060" font-size="8">스폰서·고객·팀·기타</text>

  <rect x="22"  y="298" width="320" height="28" rx="5" fill="#2a2a10" opacity="0.8"/>
  <text x="37"  y="316" fill="#e0d060" font-size="9" font-weight="bold">⑧ PM 자격 요건 및 권한 수준</text>
  <text x="340" y="316" text-anchor="end" fill="#606020" font-size="8">PM 공식 임명</text>

  <!-- Right: Business Case + Comparison -->
  <rect x="366" y="56" width="342" height="144" rx="9" fill="#12122a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
  <text x="537" y="74" text-anchor="middle" fill="#d0d0ff" font-size="10.5" font-weight="bold">비즈니스 케이스 vs 헌장</text>
  <!-- header row -->
  <rect x="376" y="81"  width="100" height="20" rx="3" fill="#1a2060"/>
  <rect x="480" y="81"  width="110" height="20" rx="3" fill="#192a40"/>
  <rect x="594" y="81"  width="106" height="20" rx="3" fill="#1a3a10"/>
  <text x="426" y="95"  text-anchor="middle" fill="#9090c0" font-size="8" font-weight="bold">항목</text>
  <text x="535" y="95"  text-anchor="middle" fill="#7ab8ff" font-size="8" font-weight="bold">비즈니스 케이스</text>
  <text x="647" y="95"  text-anchor="middle" fill="#7dff9a" font-size="8" font-weight="bold">프로젝트 헌장</text>
  <!-- rows -->
  <text x="426" y="114" text-anchor="middle" fill="#9090c0" font-size="7.5">작성자</text>
  <text x="535" y="114" text-anchor="middle" fill="#7ab8ff" font-size="7.5">스폰서/임원</text>
  <text x="647" y="114" text-anchor="middle" fill="#7dff9a" font-size="7.5">스폰서 (PM 입력)</text>
  <rect x="376" y="118" width="324" height="1" fill="#2a2a4a"/>
  <text x="426" y="131" text-anchor="middle" fill="#9090c0" font-size="7.5">목적</text>
  <text x="535" y="131" text-anchor="middle" fill="#7ab8ff" font-size="7.5">투자 결정 근거</text>
  <text x="647" y="131" text-anchor="middle" fill="#7dff9a" font-size="7.5">가스프승인+PM권한</text>
  <rect x="376" y="135" width="324" height="1" fill="#2a2a4a"/>
  <text x="426" y="148" text-anchor="middle" fill="#9090c0" font-size="7.5">시점</text>
  <text x="535" y="148" text-anchor="middle" fill="#7ab8ff" font-size="7.5">착수 이전</text>
  <text x="647" y="148" text-anchor="middle" fill="#7dff9a" font-size="7.5">착수 프로세스</text>
  <rect x="376" y="152" width="324" height="1" fill="#2a2a4a"/>
  <text x="426" y="165" text-anchor="middle" fill="#9090c0" font-size="7.5">내용</text>
  <text x="535" y="165" text-anchor="middle" fill="#7ab8ff" font-size="7.5">ROI·리스크·대안</text>
  <text x="647" y="165" text-anchor="middle" fill="#7dff9a" font-size="7.5">목표·범위·예산</text>
  <rect x="376" y="169" width="324" height="1" fill="#2a2a4a"/>
  <text x="426" y="182" text-anchor="middle" fill="#9090c0" font-size="7.5">법적 효력</text>
  <text x="535" y="182" text-anchor="middle" fill="#7ab8ff" font-size="7.5">없음</text>
  <text x="647" y="182" text-anchor="middle" fill="#7dff9a" font-size="7.5">있음 (공식 승인)</text>

  <!-- Right bottom: Lessons Learned -->
  <rect x="366" y="210" width="342" height="118" rx="9" fill="#12122a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
  <text x="537" y="228" text-anchor="middle" fill="#d0d0ff" font-size="10.5" font-weight="bold">교훈 (Lessons Learned) 관리</text>
  <rect x="376" y="236" width="152" height="84" rx="5" fill="#1a3a10" opacity="0.8"/>
  <rect x="538" y="236" width="162" height="84" rx="5" fill="#2a1a5c" opacity="0.8"/>
  <text x="452" y="250" text-anchor="middle" fill="#7dff9a" font-size="8.5" font-weight="bold">등록 시점</text>
  <text x="452" y="263" text-anchor="middle" fill="#40a060" font-size="7.5">• 프로젝트 진행 중 수시</text>
  <text x="452" y="274" text-anchor="middle" fill="#40a060" font-size="7.5">• 단계(Phase) 종료 시</text>
  <text x="452" y="285" text-anchor="middle" fill="#40a060" font-size="7.5">• 프로젝트 종료 시 정리</text>
  <text x="452" y="296" text-anchor="middle" fill="#40a060" font-size="7.5">• 위기·변경 후 즉시</text>
  <text x="452" y="312" text-anchor="middle" fill="#205030" font-size="7">조직 프로세스 자산 → OPA</text>
  <text x="619" y="250" text-anchor="middle" fill="#c084f5" font-size="8.5" font-weight="bold">활용 목적</text>
  <text x="619" y="263" text-anchor="middle" fill="#8060b0" font-size="7.5">• 미래 프로젝트 반복 방지</text>
  <text x="619" y="274" text-anchor="middle" fill="#8060b0" font-size="7.5">• 성공 패턴 재사용</text>
  <text x="619" y="285" text-anchor="middle" fill="#8060b0" font-size="7.5">• 지식 관리 (4.4)</text>
  <text x="619" y="296" text-anchor="middle" fill="#8060b0" font-size="7.5">• 입찰·제안 시 참고</text>
  <text x="619" y="312" text-anchor="middle" fill="#402080" font-size="7">지식관리 시스템 → PMIS</text>

  <!-- Bottom bar -->
  <rect x="12" y="338" width="696" height="54" rx="10" fill="#0e0e2a" opacity="0.85" stroke="#2a2a4a" stroke-width="1"/>
  <text x="360" y="356" text-anchor="middle" fill="#d0d0ff" font-size="10.5" font-weight="bold">PMP 시험 핵심 — 헌장 없이 프로젝트 시작 ❌ (반드시 승인 후 착수)</text>
  <text x="180" y="374" text-anchor="middle" fill="#7ab8ff" font-size="8">헌장 기반 → 계획서 수립</text>
  <text x="360" y="374" text-anchor="middle" fill="#ffc070" font-size="8">스폰서 서명 = PM 공식 임명</text>
  <text x="560" y="374" text-anchor="middle" fill="#c084f5" font-size="8">범위 변경 → CCB 승인 필수</text>
  <text x="180" y="385" text-anchor="middle" fill="#405070" font-size="7.5">(4.2 Project Mgmt Plan)</text>
  <text x="360" y="385" text-anchor="middle" fill="#806020" font-size="7.5">(선임 없이 결정권 없음)</text>
  <text x="560" y="385" text-anchor="middle" fill="#402080" font-size="7.5">(4.6 Perform Integrated Change Control)</text>
</svg>
