<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="34" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">공급업체 선정 — 가중 점수 기법</text>
  <text x="360" y="54" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">■ Weighted Scoring Method: 평가 기준별 가중치 × 점수로 객관적 선정</text>

  <!-- Weighted Scoring Table -->
  <rect x="28" y="68" width="664" height="228" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>

  <!-- Table header -->
  <rect x="28" y="68" width="664" height="32" rx="8" fill="#1e3a5f"/>
  <rect x="28" y="84" width="664" height="16" fill="#1e3a5f"/>
  <text x="165" y="89" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">평가 기준</text>
  <text x="310" y="89" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">가중치(W)</text>
  <text x="420" y="89" font-family="Arial" font-size="11" font-weight="bold" fill="#fbbf24" text-anchor="middle">업체 A 점수</text>
  <text x="520" y="89" font-family="Arial" font-size="11" font-weight="bold" fill="#86efac" text-anchor="middle">업체 B 점수</text>
  <text x="632" y="89" font-family="Arial" font-size="11" font-weight="bold" fill="#f87171" text-anchor="middle">업체 C 점수</text>

  <!-- Grid lines -->
  <line x1="248" y1="100" x2="248" y2="296" stroke="#334155" stroke-width="1"/>
  <line x1="360" y1="100" x2="360" y2="296" stroke="#334155" stroke-width="1"/>
  <line x1="468" y1="100" x2="468" y2="296" stroke="#334155" stroke-width="1"/>
  <line x1="576" y1="100" x2="576" y2="296" stroke="#334155" stroke-width="1"/>

  <!-- Row 1: Technical -->
  <rect x="28" y="100" width="664" height="32" fill="#111827"/>
  <text x="165" y="121" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">기술 역량</text>
  <text x="304" y="121" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">30%</text>
  <text x="414" y="121" font-family="Arial" font-size="11" fill="#fbbf24" text-anchor="middle">90 → 27.0</text>
  <text x="522" y="121" font-family="Arial" font-size="11" fill="#86efac" text-anchor="middle">80 → 24.0</text>
  <text x="625" y="121" font-family="Arial" font-size="11" fill="#f87171" text-anchor="middle">70 → 21.0</text>

  <!-- Row 2: Price -->
  <rect x="28" y="132" width="664" height="32" fill="#0f172a"/>
  <text x="165" y="153" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">가격 경쟁력</text>
  <text x="304" y="153" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">25%</text>
  <text x="414" y="153" font-family="Arial" font-size="11" fill="#fbbf24" text-anchor="middle">70 → 17.5</text>
  <text x="522" y="153" font-family="Arial" font-size="11" fill="#86efac" text-anchor="middle">85 → 21.25</text>
  <text x="625" y="153" font-family="Arial" font-size="11" fill="#f87171" text-anchor="middle">95 → 23.75</text>

  <!-- Row 3: Experience -->
  <rect x="28" y="164" width="664" height="32" fill="#111827"/>
  <text x="165" y="185" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">유사 프로젝트 경험</text>
  <text x="304" y="185" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">20%</text>
  <text x="414" y="185" font-family="Arial" font-size="11" fill="#fbbf24" text-anchor="middle">85 → 17.0</text>
  <text x="522" y="185" font-family="Arial" font-size="11" fill="#86efac" text-anchor="middle">90 → 18.0</text>
  <text x="625" y="185" font-family="Arial" font-size="11" fill="#f87171" text-anchor="middle">75 → 15.0</text>

  <!-- Row 4: Support -->
  <rect x="28" y="196" width="664" height="32" fill="#0f172a"/>
  <text x="165" y="217" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">유지보수 지원</text>
  <text x="304" y="217" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">15%</text>
  <text x="414" y="217" font-family="Arial" font-size="11" fill="#fbbf24" text-anchor="middle">80 → 12.0</text>
  <text x="522" y="217" font-family="Arial" font-size="11" fill="#86efac" text-anchor="middle">75 → 11.25</text>
  <text x="625" y="217" font-family="Arial" font-size="11" fill="#f87171" text-anchor="middle">70 → 10.5</text>

  <!-- Row 5: Stability -->
  <rect x="28" y="228" width="664" height="32" fill="#111827"/>
  <text x="165" y="249" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">재정 안정성</text>
  <text x="304" y="249" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">10%</text>
  <text x="414" y="249" font-family="Arial" font-size="11" fill="#fbbf24" text-anchor="middle">90 → 9.0</text>
  <text x="522" y="249" font-family="Arial" font-size="11" fill="#86efac" text-anchor="middle">80 → 8.0</text>
  <text x="625" y="249" font-family="Arial" font-size="11" fill="#f87171" text-anchor="middle">60 → 6.0</text>

  <!-- Total row -->
  <rect x="28" y="260" width="664" height="36" fill="#1e3a5f"/>
  <text x="165" y="283" font-family="Arial" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">총 가중 점수</text>
  <text x="304" y="283" font-family="Arial" font-size="12" font-weight="bold" fill="#e2e8f0" text-anchor="middle">100%</text>
  <text x="414" y="283" font-family="Arial" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle">82.5 ⭐1위</text>
  <text x="522" y="283" font-family="Arial" font-size="14" font-weight="bold" fill="#86efac" text-anchor="middle">82.5 ★2위</text>
  <text x="625" y="283" font-family="Arial" font-size="14" font-weight="bold" fill="#f87171" text-anchor="middle">76.25 3위</text>

  <!-- Selection Process -->
  <text x="360" y="322" font-family="Arial" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">■ 공급업체 선정 프로세스</text>

  <!-- Process steps: horizontal flow -->
  <rect x="28" y="336" width="108" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="82" y="358" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">① 제안서</text>
  <text x="82" y="373" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">접수</text>

  <line x1="136" y1="361" x2="156" y2="361" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="156" y="336" width="108" height="50" rx="6" fill="#1a2820" stroke="#22c55e" stroke-width="1.5"/>
  <text x="210" y="358" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">② 기술</text>
  <text x="210" y="373" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">평가</text>

  <line x1="264" y1="361" x2="284" y2="361" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="284" y="336" width="108" height="50" rx="6" fill="#3a2a1a" stroke="#f97316" stroke-width="1.5"/>
  <text x="338" y="358" font-family="Arial" font-size="10" fill="#fdba74" text-anchor="middle">③ 가격</text>
  <text x="338" y="373" font-family="Arial" font-size="10" fill="#fdba74" text-anchor="middle">평가</text>

  <line x1="392" y1="361" x2="412" y2="361" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="412" y="336" width="108" height="50" rx="6" fill="#2e1065" stroke="#a855f7" stroke-width="1.5"/>
  <text x="466" y="358" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">④ 협상</text>
  <text x="466" y="373" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">(BATNA)</text>

  <line x1="520" y1="361" x2="540" y2="361" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="540" y="336" width="108" height="50" rx="6" fill="#1a2a3a" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="594" y="358" font-family="Arial" font-size="10" fill="#7dd3fc" text-anchor="middle">⑤ 계약</text>
  <text x="594" y="373" font-family="Arial" font-size="10" fill="#7dd3fc" text-anchor="middle">체결</text>

  <!-- BATNA note -->
  <text x="360" y="412" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">💡 BATNA (Best Alternative to Negotiated Agreement): 협상 결렬 시의 최선 대안</text>
  <text x="360" y="430" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">동점 시 처리: 핵심 기준(기술 역량) 점수가 높은 업체 우선 선정</text>
  <text x="360" y="448" font-family="Arial" font-size="10" fill="#475569" text-anchor="middle">→ 업체 A, B 동점(82.5)이나 기술 역량(A:90 vs B:80)에서 A 우선</text>
</svg>
