<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>

  <text x="360" y="32" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">효과적인 회의 운영 가이드</text>
  <text x="360" y="50" text-anchor="middle" fill="#9090c0" font-size="11">회의 종류별 운영 원칙 + 나쁜 회의 패턴 방지</text>

  <!-- Meeting types grid -->
  <!-- Daily Standup -->
  <rect x="20"  y="62" width="160" height="130" rx="10" fill="#1a3a2a" opacity="0.85" stroke="#3aac6a" stroke-width="1.5"/>
  <text x="100" y="80"  text-anchor="middle" fill="#7dff9a" font-size="11" font-weight="bold">📅 데일리 스탠드업</text>
  <text x="100" y="95"  text-anchor="middle" fill="#4a9a6a" font-size="9">매일 15분 | Scrum Daily</text>
  <line x1="33" y1="102" x2="167" y2="102" stroke="#3aac6a" stroke-width="0.8" opacity="0.5"/>
  <text x="100" y="116" text-anchor="middle" fill="#80d090" font-size="9">어제 한 일?</text>
  <text x="100" y="130" text-anchor="middle" fill="#80d090" font-size="9">오늘 할 일?</text>
  <text x="100" y="144" text-anchor="middle" fill="#80d090" font-size="9">장애물은?</text>
  <text x="100" y="162" text-anchor="middle" fill="#a0ffa0" font-size="8" font-weight="bold">⏰ 시간 엄수</text>
  <text x="100" y="177" text-anchor="middle" fill="#70c080" font-size="8">상태 보고 X → 문제 공유 O</text>
  <text x="100" y="188" text-anchor="middle" fill="#70c080" font-size="8">스크럼 마스터 퍼실리테이션</text>

  <!-- Kickoff -->
  <rect x="190" y="62" width="160" height="130" rx="10" fill="#1a2a5c" opacity="0.85" stroke="#3a5aac" stroke-width="1.5"/>
  <text x="270" y="80"  text-anchor="middle" fill="#58c4f6" font-size="11" font-weight="bold">🚀 킥오프 미팅</text>
  <text x="270" y="95"  text-anchor="middle" fill="#4a88d0" font-size="9">프로젝트 시작 | 1~2시간</text>
  <line x1="203" y1="102" x2="337" y2="102" stroke="#3a5aac" stroke-width="0.8" opacity="0.5"/>
  <text x="270" y="116" text-anchor="middle" fill="#90b8e0" font-size="9">목표·범위·일정 공유</text>
  <text x="270" y="130" text-anchor="middle" fill="#90b8e0" font-size="9">역할·책임 배분</text>
  <text x="270" y="144" text-anchor="middle" fill="#90b8e0" font-size="9">팀 공감대 형성</text>
  <text x="270" y="162" text-anchor="middle" fill="#a0c8ff" font-size="8" font-weight="bold">📋 사전 자료 배포</text>
  <text x="270" y="177" text-anchor="middle" fill="#70a0c0" font-size="8">전 이해관계자 참여 필수</text>
  <text x="270" y="188" text-anchor="middle" fill="#70a0c0" font-size="8">회의록 → 공식 문서화</text>

  <!-- Status Review -->
  <rect x="360" y="62" width="160" height="130" rx="10" fill="#3a2a1a" opacity="0.85" stroke="#ac7a3a" stroke-width="1.5"/>
  <text x="440" y="80"  text-anchor="middle" fill="#ffa040" font-size="11" font-weight="bold">📊 상태 검토</text>
  <text x="440" y="95"  text-anchor="middle" fill="#9a6030" font-size="9">주간/월간 | 30~60분</text>
  <line x1="373" y1="102" x2="507" y2="102" stroke="#ac7a3a" stroke-width="0.8" opacity="0.5"/>
  <text x="440" y="116" text-anchor="middle" fill="#e0b080" font-size="9">진행 상황 보고</text>
  <text x="440" y="130" text-anchor="middle" fill="#e0b080" font-size="9">이슈·리스크 공유</text>
  <text x="440" y="144" text-anchor="middle" fill="#e0b080" font-size="9">다음 단계 계획 확인</text>
  <text x="440" y="162" text-anchor="middle" fill="#ffd090" font-size="8" font-weight="bold">📈 데이터 기반 보고</text>
  <text x="440" y="177" text-anchor="middle" fill="#c09050" font-size="8">구두 설명 전 자료 공유</text>
  <text x="440" y="188" text-anchor="middle" fill="#c09050" font-size="8">액션 아이템 명확히 기록</text>

  <!-- Retrospective -->
  <rect x="530" y="62" width="170" height="130" rx="10" fill="#2a1a3a" opacity="0.85" stroke="#7a3aac" stroke-width="1.5"/>
  <text x="615" y="80"  text-anchor="middle" fill="#c084f5" font-size="11" font-weight="bold">🔄 회고 (Retro)</text>
  <text x="615" y="95"  text-anchor="middle" fill="#6a3a9a" font-size="9">스프린트 종료 | 1시간</text>
  <line x1="543" y1="102" x2="687" y2="102" stroke="#7a3aac" stroke-width="0.8" opacity="0.5"/>
  <text x="615" y="116" text-anchor="middle" fill="#c090e0" font-size="9">잘된 것 (Keep)</text>
  <text x="615" y="130" text-anchor="middle" fill="#c090e0" font-size="9">개선할 것 (Problem)</text>
  <text x="615" y="144" text-anchor="middle" fill="#c090e0" font-size="9">시도할 것 (Try)</text>
  <text x="615" y="162" text-anchor="middle" fill="#e0a8ff" font-size="8" font-weight="bold">🛡️ 심리적 안전 보장</text>
  <text x="615" y="177" text-anchor="middle" fill="#a070c0" font-size="8">비난 금지 · 문제 중심</text>
  <text x="615" y="188" text-anchor="middle" fill="#a070c0" font-size="8">액션 아이템 → 다음 스프린트</text>

  <!-- Bad meeting patterns -->
  <rect x="20" y="208" width="680" height="76" rx="10" fill="#3a1a1a" opacity="0.8" stroke="#8a2a2a" stroke-width="1.2"/>
  <text x="360" y="224" text-anchor="middle" fill="#ff7070" font-size="12" font-weight="bold">🚫 나쁜 회의 패턴 — PM이 방지해야 할 안티패턴</text>
  <rect x="35"  y="232" width="155" height="38" rx="6" fill="#2a1010" opacity="0.7"/>
  <text x="112" y="247" text-anchor="middle" fill="#ff9090" font-size="9" font-weight="bold">목적 없는 회의</text>
  <text x="112" y="260" text-anchor="middle" fill="#c07070" font-size="8">아젠다 없이 소집 → 집중력↓</text>
  <text x="112" y="271" text-anchor="middle" fill="#906060" font-size="7.5">💡 아젠다 24시간 전 배포</text>
  <rect x="200" y="232" width="155" height="38" rx="6" fill="#2a1010" opacity="0.7"/>
  <text x="277" y="247" text-anchor="middle" fill="#ff9090" font-size="9" font-weight="bold">핵심 결정자 부재</text>
  <text x="277" y="260" text-anchor="middle" fill="#c07070" font-size="8">의사결정 불가 → 재회의 낭비</text>
  <text x="277" y="271" text-anchor="middle" fill="#906060" font-size="7.5">💡 RACI로 의사결정자 사전 확인</text>
  <rect x="365" y="232" width="155" height="38" rx="6" fill="#2a1010" opacity="0.7"/>
  <text x="442" y="247" text-anchor="middle" fill="#ff9090" font-size="9" font-weight="bold">시간 초과 반복</text>
  <text x="442" y="260" text-anchor="middle" fill="#c07070" font-size="8">토론 제어 불가 → 피로 누적</text>
  <text x="442" y="271" text-anchor="middle" fill="#906060" font-size="7.5">💡 타임박스 설정 + 파킹랏</text>
  <rect x="530" y="232" width="160" height="38" rx="6" fill="#2a1010" opacity="0.7"/>
  <text x="610" y="247" text-anchor="middle" fill="#ff9090" font-size="9" font-weight="bold">액션 아이템 없음</text>
  <text x="610" y="260" text-anchor="middle" fill="#c07070" font-size="8">결론 없는 회의 → 변화 없음</text>
  <text x="610" y="271" text-anchor="middle" fill="#906060" font-size="7.5">💡 회의록: 담당자+기한 명시</text>

  <!-- Meeting agenda template -->
  <rect x="20" y="298" width="680" height="80" rx="10" fill="#1a1a3a" opacity="0.85" stroke="#3a3a6a" stroke-width="1"/>
  <text x="360" y="315" text-anchor="middle" fill="#a0b8e0" font-size="12" font-weight="bold">회의록 필수 항목 (Minutes of Meeting)</text>
  <text x="80"  y="333" text-anchor="middle" fill="#7addff" font-size="9.5">📅 일시·장소</text>
  <text x="220" y="333" text-anchor="middle" fill="#7addff" font-size="9.5">👥 참석자</text>
  <text x="360" y="333" text-anchor="middle" fill="#7addff" font-size="9.5">📋 안건 &amp; 논의 내용</text>
  <text x="500" y="333" text-anchor="middle" fill="#7addff" font-size="9.5">✅ 의사결정 사항</text>
  <text x="640" y="333" text-anchor="middle" fill="#7addff" font-size="9.5">📌 次 회의</text>
  <text x="80"  y="349" text-anchor="middle" fill="#5090b0" font-size="8">기록 필수</text>
  <text x="220" y="349" text-anchor="middle" fill="#5090b0" font-size="8">역할 포함</text>
  <text x="360" y="349" text-anchor="middle" fill="#5090b0" font-size="8">요약 형태</text>
  <text x="500" y="349" text-anchor="middle" fill="#5090b0" font-size="8">숫자 근거</text>
  <text x="640" y="349" text-anchor="middle" fill="#5090b0" font-size="8">일정 확정</text>
  <text x="360" y="368" text-anchor="middle" fill="#f0c030" font-size="9">액션 아이템: [담당자] [할 일] [완료 기한] — 반드시 3개 요소 포함</text>
  <text x="360" y="381" text-anchor="middle" fill="#6a6a9a" font-size="8">회의 종료 24시간 내 배포 | 참석자 확인 서명/이메일 수신 확인 권장</text>
</svg>
