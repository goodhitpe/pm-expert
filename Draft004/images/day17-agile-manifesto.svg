<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="440" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">애자일 선언문 (Agile Manifesto, 2001)</text>
  <text x="360" y="50" text-anchor="middle" fill="#9090c0" font-size="11">17명의 소프트웨어 개발자 — 유타주 스노우버드 회의 산물</text>

  <!-- 4 Values section -->
  <text x="360" y="72" text-anchor="middle" fill="#f0f060" font-size="13" font-weight="bold">4가지 핵심 가치</text>
  <text x="360" y="88" text-anchor="middle" fill="#9090b0" font-size="10">왼쪽을 오른쪽보다 더 가치 있게 여긴다 (단, 오른쪽도 가치 있음)</text>

  <!-- Value boxes -->
  <rect x="20"  y="96" width="160" height="90" rx="10" fill="#1a3a1a" opacity="0.85" stroke="#3a9a3a" stroke-width="1.5"/>
  <text x="100" y="113" text-anchor="middle" fill="#7dff9a" font-size="10.5" font-weight="bold">프로세스·도구</text>
  <text x="100" y="127" text-anchor="middle" fill="#5a9a6a" font-size="11">↓ 보다</text>
  <text x="100" y="142" text-anchor="middle" fill="#a0ffa0" font-size="10.5" font-weight="bold">개인과 상호작용</text>
  <text x="100" y="160" text-anchor="middle" fill="#80d090" font-size="9">사람 간 소통이 도구보다</text>
  <text x="100" y="173" text-anchor="middle" fill="#80d090" font-size="9">프로젝트 성패 결정</text>

  <rect x="192" y="96" width="160" height="90" rx="10" fill="#1a3a5c" opacity="0.85" stroke="#3a7aac" stroke-width="1.5"/>
  <text x="272" y="113" text-anchor="middle" fill="#58c4f6" font-size="10.5" font-weight="bold">포괄적 문서</text>
  <text x="272" y="127" text-anchor="middle" fill="#4a90c0" font-size="11">↓ 보다</text>
  <text x="272" y="142" text-anchor="middle" fill="#90e0ff" font-size="10.5" font-weight="bold">작동하는 소프트웨어</text>
  <text x="272" y="160" text-anchor="middle" fill="#80b8d8" font-size="9">실제 동작하는 제품이</text>
  <text x="272" y="173" text-anchor="middle" fill="#80b8d8" font-size="9">가장 강력한 진척 척도</text>

  <rect x="364" y="96" width="160" height="90" rx="10" fill="#3a2a1a" opacity="0.85" stroke="#9a6a3a" stroke-width="1.5"/>
  <text x="444" y="113" text-anchor="middle" fill="#ffa040" font-size="10.5" font-weight="bold">계약 협상</text>
  <text x="444" y="127" text-anchor="middle" fill="#8a6030" font-size="11">↓ 보다</text>
  <text x="444" y="142" text-anchor="middle" fill="#ffc880" font-size="10.5" font-weight="bold">고객과의 협력</text>
  <text x="444" y="160" text-anchor="middle" fill="#d09060" font-size="9">계약서보다 지속적인</text>
  <text x="444" y="173" text-anchor="middle" fill="#d09060" font-size="9">고객 참여가 중요</text>

  <rect x="536" y="96" width="164" height="90" rx="10" fill="#2a1a3a" opacity="0.85" stroke="#7a4aac" stroke-width="1.5"/>
  <text x="618" y="113" text-anchor="middle" fill="#c084f5" font-size="10.5" font-weight="bold">계획 따르기</text>
  <text x="618" y="127" text-anchor="middle" fill="#7a4a9a" font-size="11">↓ 보다</text>
  <text x="618" y="142" text-anchor="middle" fill="#e0a8ff" font-size="10.5" font-weight="bold">변화에 대응하기</text>
  <text x="618" y="160" text-anchor="middle" fill="#b080d8" font-size="9">환경 변화에 유연하게</text>
  <text x="618" y="173" text-anchor="middle" fill="#b080d8" font-size="9">계획을 조정할 수 있어야</text>

  <!-- 12 Principles -->
  <text x="360" y="206" text-anchor="middle" fill="#f0f060" font-size="12" font-weight="bold">12가지 원칙 — 핵심 6개</text>

  <!-- 2x3 grid of principles -->
  <rect x="20"  y="214" width="330" height="52" rx="8" fill="#131a3a" opacity="0.85" stroke="#2a4a8a" stroke-width="1"/>
  <text x="185" y="230" text-anchor="middle" fill="#7af0c8" font-size="9.5" font-weight="bold">① 고객 만족 최우선</text>
  <text x="185" y="245" text-anchor="middle" fill="#90c8b0" font-size="9">지속적 가치 있는 소프트웨어를 조기에, 지속적으로 제공</text>
  <text x="185" y="260" text-anchor="middle" fill="#80b8a0" font-size="9">→ MVP 출시 → 피드백 루프</text>

  <rect x="360" y="214" width="340" height="52" rx="8" fill="#131a3a" opacity="0.85" stroke="#2a4a8a" stroke-width="1"/>
  <text x="530" y="230" text-anchor="middle" fill="#7af0c8" font-size="9.5" font-weight="bold">② 변경 사항 환영</text>
  <text x="530" y="245" text-anchor="middle" fill="#90c8b0" font-size="9">개발 후반이라도 고객 경쟁 우위를 위해 요건 변경 수용</text>
  <text x="530" y="260" text-anchor="middle" fill="#80b8a0" font-size="9">→ 변경 관리 프로세스 간소화</text>

  <rect x="20"  y="272" width="330" height="52" rx="8" fill="#131a3a" opacity="0.85" stroke="#2a4a8a" stroke-width="1"/>
  <text x="185" y="288" text-anchor="middle" fill="#7af0c8" font-size="9.5" font-weight="bold">③ 짧은 반복 제공</text>
  <text x="185" y="303" text-anchor="middle" fill="#90c8b0" font-size="9">2주~2개월 간격으로 작동하는 소프트웨어 지속 인도</text>
  <text x="185" y="318" text-anchor="middle" fill="#80b8a0" font-size="9">→ 스프린트 = 2주 표준</text>

  <rect x="360" y="272" width="340" height="52" rx="8" fill="#131a3a" opacity="0.85" stroke="#2a4a8a" stroke-width="1"/>
  <text x="530" y="288" text-anchor="middle" fill="#7af0c8" font-size="9.5" font-weight="bold">④ 지속 가능한 개발 pace</text>
  <text x="530" y="303" text-anchor="middle" fill="#90c8b0" font-size="9">스폰서·개발자·사용자 모두 일정한 속도 무기한 유지</text>
  <text x="530" y="318" text-anchor="middle" fill="#80b8a0" font-size="9">→ 야근 금지 · 번아웃 방지</text>

  <rect x="20"  y="330" width="330" height="52" rx="8" fill="#131a3a" opacity="0.85" stroke="#2a4a8a" stroke-width="1"/>
  <text x="185" y="346" text-anchor="middle" fill="#7af0c8" font-size="9.5" font-weight="bold">⑤ 자기조직화 팀</text>
  <text x="185" y="361" text-anchor="middle" fill="#90c8b0" font-size="9">최고의 아키텍처·요건·설계는 자기조직화 팀에서 창출</text>
  <text x="185" y="376" text-anchor="middle" fill="#80b8a0" font-size="9">→ 마이크로매니지먼트 금지</text>

  <rect x="360" y="330" width="340" height="52" rx="8" fill="#131a3a" opacity="0.85" stroke="#2a4a8a" stroke-width="1"/>
  <text x="530" y="346" text-anchor="middle" fill="#7af0c8" font-size="9.5" font-weight="bold">⑥ 정기적 회고 (Retrospective)</text>
  <text x="530" y="361" text-anchor="middle" fill="#90c8b0" font-size="9">팀이 정기적으로 효과적 개선 방법을 찾아 실천</text>
  <text x="530" y="376" text-anchor="middle" fill="#80b8a0" font-size="9">→ Sprint Retro 필수 이벤트</text>

  <!-- Footer -->
  <text x="360" y="416" text-anchor="middle" fill="#f0f060" font-size="10" font-weight="bold">PM 관점: 애자일은 방법론이 아닌 마인드셋입니다 — 가치와 원칙이 먼저, 도구와 프로세스는 그 다음</text>
  <text x="360" y="430" text-anchor="middle" fill="#6a6a9a" font-size="9">선언문 원본: agilemanifesto.org (2001) | 17명의 서명자 포함 Uncle Bob (Clean Code), Kent Beck (XP), Ken Schwaber (Scrum)</text>
</svg>
