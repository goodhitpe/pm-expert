<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrorange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>
  <rect width="720" height="520" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">블록체인 구조 + IoT 4계층 아키텍처</text>

  <!-- ===== BLOCKCHAIN SECTION ===== -->
  <text x="200" y="54" font-family="Arial" font-size="13" font-weight="bold" fill="#fbbf24" text-anchor="middle">■ 블록체인 블록/체인 구조</text>

  <!-- Block 0 (Genesis) -->
  <rect x="28" y="66" width="130" height="104" rx="6" fill="#1a2a1a" stroke="#22c55e" stroke-width="2"/>
  <rect x="28" y="66" width="130" height="22" rx="6" fill="#14532d" stroke="none"/>
  <text x="93" y="82" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">Block #0 (Genesis)</text>
  <text x="40" y="103" font-family="Arial" font-size="10" fill="#64748b">Hash:</text>
  <text x="78" y="103" font-family="Arial" font-size="10" fill="#4ade80" font-family="monospace">000a7f2c...</text>
  <text x="40" y="119" font-family="Arial" font-size="10" fill="#64748b">Prev:</text>
  <text x="78" y="119" font-family="Arial" font-size="10" fill="#64748b">0000000000</text>
  <text x="40" y="135" font-family="Arial" font-size="10" fill="#64748b">Data:</text>
  <text x="78" y="135" font-family="Arial" font-size="10" fill="#e2e8f0">Genesis</text>
  <text x="40" y="151" font-family="Arial" font-size="10" fill="#64748b">Nonce:</text>
  <text x="83" y="151" font-family="Arial" font-size="10" fill="#e2e8f0">83471</text>
  <text x="40" y="162" font-family="Arial" font-size="9" fill="#64748b">Timestamp: 2009-01-03</text>

  <line x1="160" y1="118" x2="178" y2="118" stroke="#f97316" stroke-width="2" marker-end="url(#arrorange)"/>

  <!-- Block 1 -->
  <rect x="180" y="66" width="130" height="104" rx="6" fill="#1e2a3a" stroke="#60a5fa" stroke-width="2"/>
  <rect x="180" y="66" width="130" height="22" rx="6" fill="#1e3a5f" stroke="none"/>
  <text x="245" y="82" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">Block #1</text>
  <text x="192" y="103" font-family="Arial" font-size="10" fill="#64748b">Hash:</text>
  <text x="230" y="103" font-family="Arial" font-size="10" fill="#93c5fd" font-family="monospace">b3e1d9f5...</text>
  <text x="192" y="119" font-family="Arial" font-size="10" fill="#64748b">Prev:</text>
  <text x="230" y="119" font-family="Arial" font-size="10" fill="#4ade80">000a7f2c...</text>
  <text x="192" y="135" font-family="Arial" font-size="10" fill="#64748b">Data:</text>
  <text x="230" y="135" font-family="Arial" font-size="10" fill="#e2e8f0">TX A→B</text>
  <text x="192" y="151" font-family="Arial" font-size="10" fill="#64748b">Nonce:</text>
  <text x="235" y="151" font-family="Arial" font-size="10" fill="#e2e8f0">192847</text>
  <text x="192" y="162" font-family="Arial" font-size="9" fill="#64748b">Timestamp: 2024-01-15</text>

  <line x1="312" y1="118" x2="330" y2="118" stroke="#f97316" stroke-width="2" marker-end="url(#arrorange)"/>

  <!-- Block 2 -->
  <rect x="332" y="66" width="130" height="104" rx="6" fill="#2e1065" stroke="#a855f7" stroke-width="2"/>
  <rect x="332" y="66" width="130" height="22" rx="6" fill="#3b0764" stroke="none"/>
  <text x="397" y="82" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">Block #2</text>
  <text x="344" y="103" font-family="Arial" font-size="10" fill="#64748b">Hash:</text>
  <text x="382" y="103" font-family="Arial" font-size="10" fill="#c4b5fd">f9c2a381...</text>
  <text x="344" y="119" font-family="Arial" font-size="10" fill="#64748b">Prev:</text>
  <text x="382" y="119" font-family="Arial" font-size="10" fill="#93c5fd">b3e1d9f5...</text>
  <text x="344" y="135" font-family="Arial" font-size="10" fill="#64748b">Data:</text>
  <text x="382" y="135" font-family="Arial" font-size="10" fill="#e2e8f0">TX C→D</text>
  <text x="344" y="151" font-family="Arial" font-size="10" fill="#64748b">Nonce:</text>
  <text x="387" y="151" font-family="Arial" font-size="10" fill="#e2e8f0">748291</text>
  <text x="344" y="162" font-family="Arial" font-size="9" fill="#64748b">Timestamp: 2024-01-15</text>

  <!-- Tamper warning -->
  <rect x="478" y="66" width="214" height="104" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="585" y="86" font-family="Arial" font-size="11" font-weight="bold" fill="#f87171" text-anchor="middle">⚠️ 변조 시도</text>
  <text x="585" y="105" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">Block #1 Data 수정</text>
  <text x="585" y="120" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">→ Hash 값 변경</text>
  <text x="585" y="135" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">→ Block #2 PrevHash 불일치</text>
  <text x="585" y="150" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">→ 이후 모든 블록 무효화</text>
  <text x="585" y="165" font-family="Arial" font-size="9" fill="#ef4444" text-anchor="middle">∴ 불변성(Immutability) 보장</text>

  <!-- PoW vs PoS Section -->
  <text x="360" y="194" font-family="Arial" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">■ 합의 알고리즘 비교</text>

  <!-- PoW -->
  <rect x="28" y="206" width="322" height="86" rx="6" fill="#2a1a06" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="52" y="226" font-family="Arial" font-size="12" font-weight="bold" fill="#fbbf24">PoW (Proof of Work) — 작업 증명</text>
  <text x="40" y="244" font-family="Arial" font-size="11" fill="#e2e8f0">• 방법: 복잡한 수학 문제(Nonce 탐색) 먼저 풀면 블록 생성권</text>
  <text x="40" y="260" font-family="Arial" font-size="11" fill="#e2e8f0">• 장점: 보안성 높음, 분산화 우수  |  단점: 전력 과소비, 느린 처리</text>
  <text x="40" y="276" font-family="Arial" font-size="11" fill="#fbbf24">• 사례: Bitcoin, Ethereum 1.0  |  채굴자(Miner) 경쟁 구조</text>

  <!-- PoS -->
  <rect x="370" y="206" width="322" height="86" rx="6" fill="#0a1a2a" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="394" y="226" font-family="Arial" font-size="12" font-weight="bold" fill="#7dd3fc">PoS (Proof of Stake) — 지분 증명</text>
  <text x="382" y="244" font-family="Arial" font-size="11" fill="#e2e8f0">• 방법: 보유 코인 지분에 비례한 확률로 블록 생성권 부여</text>
  <text x="382" y="260" font-family="Arial" font-size="11" fill="#e2e8f0">• 장점: 에너지 효율적, 실거래 빠름  |  단점: 코인 집중화 위험</text>
  <text x="382" y="276" font-family="Arial" font-size="11" fill="#7dd3fc">• 사례: Ethereum 2.0, Cardano  |  검증자(Validator) 선정 구조</text>

  <!-- ===== IoT 4-Layer Section ===== -->
  <text x="360" y="316" font-family="Arial" font-size="13" font-weight="bold" fill="#86efac" text-anchor="middle">■ IoT 4계층 아키텍처 (Edge → Cloud)</text>

  <!-- Layer 1: Perception (Sensor) -->
  <rect x="28" y="328" width="664" height="40" rx="4" fill="#1a3a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="48" y="353" font-family="Arial" font-size="19">🌡</text>
  <text x="80" y="348" font-family="Arial" font-size="12" font-weight="bold" fill="#4ade80">Layer 1 — 인지/센서 계층 (Perception Layer)</text>
  <text x="350" y="348" font-family="Arial" font-size="11" fill="#e2e8f0">온도/습도/GPS/카메라 센서, RFID 태그, Actuator (직접 물리 세계 인식)</text>
  <text x="692" y="348" font-family="Arial" font-size="10" fill="#64748b" text-anchor="end">Edge Device</text>

  <text x="360" y="376" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">▼ 데이터 전송</text>

  <!-- Layer 2: Network -->
  <rect x="28" y="382" width="664" height="40" rx="4" fill="#1e2a3a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="48" y="407" font-family="Arial" font-size="19">📡</text>
  <text x="80" y="402" font-family="Arial" font-size="12" font-weight="bold" fill="#93c5fd">Layer 2 — 네트워크 계층 (Network Layer)</text>
  <text x="350" y="402" font-family="Arial" font-size="11" fill="#e2e8f0">WiFi / 5G / LPWAN (LoRa, NB-IoT) / Bluetooth / Zigbee — 데이터 전달</text>
  <text x="692" y="402" font-family="Arial" font-size="10" fill="#64748b" text-anchor="end">Gateway</text>

  <text x="360" y="430" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">▼ 데이터 집계·처리</text>

  <!-- Layer 3: Platform -->
  <rect x="28" y="436" width="664" height="40" rx="4" fill="#2e1065" stroke="#a855f7" stroke-width="1.5"/>
  <text x="48" y="461" font-family="Arial" font-size="19">☁</text>
  <text x="80" y="456" font-family="Arial" font-size="12" font-weight="bold" fill="#c4b5fd">Layer 3 — 플랫폼/미들웨어 계층 (Platform Layer)</text>
  <text x="350" y="456" font-family="Arial" font-size="11" fill="#e2e8f0">AWS IoT Core, Azure IoT Hub — 데이터 수집, 저장, 기기 관리, 보안 인증</text>
  <text x="692" y="456" font-family="Arial" font-size="10" fill="#64748b" text-anchor="end">Cloud PaaS</text>

  <text x="360" y="484" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">▼ 서비스 제공</text>

  <!-- Layer 4: Application -->
  <rect x="28" y="488" width="664" height="28" rx="4" fill="#3a1a1a" stroke="#f97316" stroke-width="1.5"/>
  <text x="48" y="507" font-family="Arial" font-size="19">📱</text>
  <text x="80" y="504" font-family="Arial" font-size="12" font-weight="bold" fill="#fb923c">Layer 4 — 응용 서비스 계층 (Application Layer)</text>
  <text x="350" y="504" font-family="Arial" font-size="11" fill="#e2e8f0">스마트홈 / 스마트팩토리 / 의료 IoT / 커넥티드카 — 최종 사용자 서비스</text>
  <text x="692" y="504" font-family="Arial" font-size="10" fill="#64748b" text-anchor="end">Application</text>
</svg>
