<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>

  <text x="360" y="26" text-anchor="middle" fill="#e0e0ff" font-size="14" font-weight="bold">3점 산정법(PERT) + 간트차트 구조</text>
  <text x="360" y="43" text-anchor="middle" fill="#9090c0" font-size="9.5">불확실성 하의 기간 산정 ∙ 표준편차 계산 ∙ 간트차트 핵심 요소</text>

  <!-- Left PERT panel -->
  <rect x="12" y="54" width="345" height="180" rx="8" fill="#1a2a5c" opacity="0.85" stroke="#4a6adc" stroke-width="1.2"/>
  <text x="184" y="72" text-anchor="middle" fill="#7ab8ff" font-size="12" font-weight="bold">3점 산정법 (PERT)</text>
  <text x="184" y="87" text-anchor="middle" fill="#9090c0" font-size="8.5">낙관(O) · 비관(P) · 최빈(M) 세 시나리오로 불확실성 반영</text>

  <!-- Formula box -->
  <rect x="24" y="95" width="321" height="80" rx="6" fill="#0e1430" stroke="#2a3a80" stroke-width="1"/>
  <!-- PERT mean -->
  <text x="184" y="114" text-anchor="middle" fill="#c0c0ff" font-size="11" font-weight="bold">기댓값 (Expected Duration)</text>
  <text x="184" y="132" text-anchor="middle" fill="#7ab8ff" font-size="14" font-weight="bold">tE = (O + 4M + P) / 6</text>
  <!-- Std dev -->
  <text x="184" y="152" text-anchor="middle" fill="#c0c0ff" font-size="10" font-weight="bold">표준편차 (σ)  및  분산 (σ²)</text>
  <text x="184" y="167" text-anchor="middle" fill="#7ab8ff" font-size="12" font-weight="bold">σ = (P − O) / 6    σ² = σ²</text>

  <!-- Example calc -->
  <text x="184" y="193" text-anchor="middle" fill="#d0d0ff" font-size="9" font-weight="bold">▼ 계산 예시: 개발 활동 기간 산정</text>
  <rect x="24" y="200" width="321" height="28" rx="4" fill="#0a0e24" stroke="#202060"/>
  <text x="34"  y="215" fill="#9090c0" font-size="8.5">O=3일  M=6일  P=15일</text>
  <text x="184" y="215" text-anchor="middle" fill="#7ab8ff" font-size="8.5">tE = (3 + 4×6 + 15) / 6 = 42/6 =</text>
  <text x="330" y="215" text-anchor="end" fill="#7dff9a" font-size="9" font-weight="bold">7일</text>
  <text x="34"  y="228" fill="#9090c0" font-size="8">σ = (15−3)/6 = 2일</text>
  <text x="184" y="228" text-anchor="middle" fill="#7090c0" font-size="8">신뢰구간: 7±2일 (68%)  /  7±4일 (95%)</text>

  <!-- PERT confidence levels -->
  <rect x="12" y="242" width="345" height="54" rx="8" fill="#12122e" opacity="0.9" stroke="#2a2a6a" stroke-width="1"/>
  <text x="184" y="258" text-anchor="middle" fill="#9090c0" font-size="8.5" font-weight="bold">신뢰 수준별 기간 범위  (경로 전체에 적용)</text>
  <rect x="20"  y="265" width="100" height="24" rx="4" fill="#1a3a6c"/>
  <rect x="130" y="265" width="100" height="24" rx="4" fill="#1a4a2c"/>
  <rect x="247" y="265" width="100" height="24" rx="4" fill="#4a2a1c"/>
  <text x="70"  y="276" text-anchor="middle" fill="#7ab8ff" font-size="8.5" font-weight="bold">±1σ = 68.3%</text>
  <text x="70"  y="287" text-anchor="middle" fill="#5070b0" font-size="7.5">tE ± σ</text>
  <text x="180" y="276" text-anchor="middle" fill="#7dff9a" font-size="8.5" font-weight="bold">±2σ = 95.5%</text>
  <text x="180" y="287" text-anchor="middle" fill="#40a060" font-size="7.5">tE ± 2σ</text>
  <text x="297" y="276" text-anchor="middle" fill="#ffa040" font-size="8.5" font-weight="bold">±3σ = 99.7%</text>
  <text x="297" y="287" text-anchor="middle" fill="#c07030" font-size="7.5">tE ± 3σ</text>

  <!-- Right Gantt panel -->
  <rect x="370" y="54" width="338" height="180" rx="8" fill="#1a3a2a" opacity="0.85" stroke="#2a9a5a" stroke-width="1.2"/>
  <text x="539" y="72" text-anchor="middle" fill="#7dff9a" font-size="12" font-weight="bold">간트차트 (Gantt Chart)</text>
  <text x="539" y="87" text-anchor="middle" fill="#9090c0" font-size="8.5">H. Gantt 고안 · 시간 축 + 활동 바 · 진행률 표시</text>

  <!-- Gantt header -->
  <rect x="380" y="94" width="318" height="18" rx="3" fill="#0a1e0a"/>
  <text x="440" y="107" text-anchor="middle" fill="#5080c0" font-size="8">활동</text>
  <text x="490" y="107" text-anchor="middle" fill="#5080c0" font-size="8">W1</text>
  <text x="520" y="107" text-anchor="middle" fill="#5080c0" font-size="8">W2</text>
  <text x="550" y="107" text-anchor="middle" fill="#5080c0" font-size="8">W3</text>
  <text x="580" y="107" text-anchor="middle" fill="#5080c0" font-size="8">W4</text>
  <text x="610" y="107" text-anchor="middle" fill="#5080c0" font-size="8">W5</text>
  <text x="640" y="107" text-anchor="middle" fill="#5080c0" font-size="8">W6</text>
  <text x="675" y="107" text-anchor="middle" fill="#5080c0" font-size="8">%</text>

  <!-- Activity rows -->
  <!-- Row 1: 요구사항 -->
  <rect x="380" y="115" width="318" height="16" rx="2" fill="#0a1810" opacity="0.5"/>
  <text x="447" y="127" text-anchor="middle" fill="#80b080" font-size="7.5">요구사항 분석</text>
  <rect x="477" y="118" width="58" height="10" rx="2" fill="#2a7a4a" opacity="0.9"/>
  <rect x="477" y="118" width="58" height="10" rx="2" fill="#4aaa6a" opacity="0.4"/>
  <text x="675" y="127" text-anchor="middle" fill="#7dff9a" font-size="8">100%</text>

  <!-- Row 2: 설계 -->
  <rect x="380" y="133" width="318" height="16" rx="2" fill="#0a1810" opacity="0.3"/>
  <text x="447" y="145" text-anchor="middle" fill="#80b080" font-size="7.5">시스템 설계</text>
  <rect x="507" y="136" width="58" height="10" rx="2" fill="#2a7a4a" opacity="0.9"/>
  <rect x="507" y="136" width="58" height="10" rx="2" fill="#4aaa6a" opacity="0.4"/>
  <text x="675" y="145" text-anchor="middle" fill="#7dff9a" font-size="8">100%</text>

  <!-- Row 3: 개발 (in-progress) -->
  <rect x="380" y="151" width="318" height="16" rx="2" fill="#0a1810" opacity="0.5"/>
  <text x="447" y="163" text-anchor="middle" fill="#80b080" font-size="7.5">개발</text>
  <rect x="537" y="154" width="88" height="10" rx="2" fill="#1a4a2a" opacity="0.9"/>
  <rect x="537" y="154" width="44" height="10" rx="2" fill="#3a9a5a" opacity="0.9"/>
  <text x="675" y="163" text-anchor="middle" fill="#ffa040" font-size="8">50%</text>

  <!-- Row 4: 테스트 (not started) -->
  <rect x="380" y="169" width="318" height="16" rx="2" fill="#0a1810" opacity="0.3"/>
  <text x="447" y="181" text-anchor="middle" fill="#80b080" font-size="7.5">테스트</text>
  <rect x="597" y="172" width="58" height="10" rx="2" fill="#1a3a2a" opacity="0.5" stroke="#2a5a3a" stroke-width="0.8"/>
  <text x="675" y="181" text-anchor="middle" fill="#506050" font-size="8">0%</text>

  <!-- Critical path marker -->
  <line x1="477" y1="112" x2="477" y2="186" stroke="#ffa040" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <text x="477" y="110" text-anchor="middle" fill="#ffa040" font-size="6.5">▼ Start</text>

  <!-- Milestone diamond -->
  <polygon points="567,192 573,198 567,204 561,198" fill="#ffd740" opacity="0.9"/>
  <text x="575" y="202" fill="#c0a020" font-size="7.5"> 마일스톤</text>

  <!-- Gantt legend -->
  <rect x="380" y="207" width="318" height="22" rx="3" fill="#0a180a" opacity="0.7"/>
  <rect x="388" y="213" width="18" height="8" rx="2" fill="#3a9a5a"/>
  <text x="412" y="221" fill="#60a070" font-size="7.5">완료 구간</text>
  <rect x="460" y="213" width="18" height="8" rx="2" fill="#1a3a2a" stroke="#2a5a3a" stroke-width="0.8"/>
  <text x="484" y="221" fill="#60a070" font-size="7.5">계획 구간</text>
  <polygon points="540,213 544,218 540,223 536,218" fill="#ffd740"/>
  <text x="556" y="221" fill="#c0a020" font-size="7.5">마일스톤</text>
  <line x1="610" y1="213" x2="610" y2="222" stroke="#ffa040" stroke-width="1" stroke-dasharray="2,1"/>
  <text x="625" y="221" fill="#c07020" font-size="7.5">오늘 기준</text>

  <!-- Bottom comparison -->
  <rect x="12" y="304" width="695" height="88" rx="10" fill="#12122a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
  <text x="360" y="321" text-anchor="middle" fill="#d0d0ff" font-size="11" font-weight="bold">기간 산정 기법 비교 — 3가지 핵심 기법</text>

  <rect x="22"  y="330" width="210" height="55" rx="6" fill="#1a2060" opacity="0.8"/>
  <rect x="245" y="330" width="210" height="55" rx="6" fill="#1a3a20" opacity="0.8"/>
  <rect x="469" y="330" width="224" height="55" rx="6" fill="#3a1a1a" opacity="0.8"/>

  <text x="127" y="345" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">유사 산정 (Analogous)</text>
  <text x="127" y="358" text-anchor="middle" fill="#5080c0" font-size="8">과거 유사 프로젝트 기반</text>
  <text x="127" y="370" text-anchor="middle" fill="#4060a0" font-size="7.5">빠름 · 부정확  /  착수 초기 유용</text>
  <text x="127" y="381" text-anchor="middle" fill="#304080" font-size="7.5">전문가 판단 필수</text>

  <text x="350" y="345" text-anchor="middle" fill="#7dff9a" font-size="9.5" font-weight="bold">모수 산정 (Parametric)</text>
  <text x="350" y="358" text-anchor="middle" fill="#40a060" font-size="8">단위생산성 × 수량</text>
  <text x="350" y="370" text-anchor="middle" fill="#308050" font-size="7.5">예: 코드 100라인/일 × 500라인</text>
  <text x="350" y="381" text-anchor="middle" fill="#205040" font-size="7.5">= 5일  /  신뢰성 ★★★</text>

  <text x="581" y="345" text-anchor="middle" fill="#ffa040" font-size="9.5" font-weight="bold">3점 산정 PERT</text>
  <text x="581" y="358" text-anchor="middle" fill="#c08030" font-size="8">O, M, P → tE = (O+4M+P)/6</text>
  <text x="581" y="370" text-anchor="middle" fill="#a06020" font-size="7.5">불확실성 반영 · σ 계산 가능</text>
  <text x="581" y="381" text-anchor="middle" fill="#804010" font-size="7.5">신뢰성 ★★★★  /  시간 소요</text>
</svg>
