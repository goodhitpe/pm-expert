<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>

  <text x="360" y="30" text-anchor="middle" fill="#e0e0ff" font-size="16" font-weight="bold">QA vs QC — 품질 보증 vs 품질 통제</text>
  <text x="360" y="48" text-anchor="middle" fill="#9090c0" font-size="10.5">Quality Assurance vs Quality Control — 핵심 차이와 PM 역할</text>

  <!-- QA column -->
  <rect x="18" y="62" width="330" height="270" rx="10" fill="#1a2a5c" opacity="0.82" stroke="#3a5aac" stroke-width="1.5"/>
  <text x="183" y="82"  text-anchor="middle" fill="#7ab8ff" font-size="13" font-weight="bold">🔵 QA (품질 보증)</text>
  <text x="183" y="96"  text-anchor="middle" fill="#5a8ac0" font-size="9">Quality Assurance — 예방 중심</text>
  <line x1="28" y1="103" x2="338" y2="103" stroke="#3a5aac" stroke-width="0.8" opacity="0.6"/>

  <text x="30"  y="120" fill="#80a8e0" font-size="9.5" font-weight="bold">목적:</text>
  <text x="70"  y="120" fill="#9090c0" font-size="9">결함 발생 방지 — 프로세스 개선</text>
  <text x="30"  y="136" fill="#80a8e0" font-size="9.5" font-weight="bold">시점:</text>
  <text x="70"  y="136" fill="#9090c0" font-size="9">전체 프로젝트 생애주기 (상시적)</text>
  <text x="30"  y="152" fill="#80a8e0" font-size="9.5" font-weight="bold">대상:</text>
  <text x="70"  y="152" fill="#9090c0" font-size="9">프로세스·방법론·표준·절차</text>
  <text x="30"  y="168" fill="#80a8e0" font-size="9.5" font-weight="bold">성격:</text>
  <text x="70"  y="168" fill="#9090c0" font-size="9">사전 예방적(Proactive)</text>

  <text x="30" y="192" fill="#6090c0" font-size="9" font-weight="bold">주요 활동:</text>
  <rect x="28" y="198" width="312" height="20" rx="4" fill="#12182e" opacity="0.7"/>
  <text x="37" y="211" fill="#7ab8ff" font-size="9">📋 표준 프로세스 수립 및 준수 감사</text>
  <rect x="28" y="222" width="312" height="20" rx="4" fill="#12182e" opacity="0.7"/>
  <text x="37" y="235" fill="#7ab8ff" font-size="9">🔍 품질 감사(Quality Audit) 수행</text>
  <rect x="28" y="246" width="312" height="20" rx="4" fill="#12182e" opacity="0.7"/>
  <text x="37" y="259" fill="#7ab8ff" font-size="9">📊 프로세스 개선 분석 (PAL 활용)</text>
  <rect x="28" y="270" width="312" height="20" rx="4" fill="#12182e" opacity="0.7"/>
  <text x="37" y="283" fill="#7ab8ff" font-size="9">📝 교육·훈련 계획 수립 및 실행</text>
  <rect x="28" y="294" width="312" height="20" rx="4" fill="#12182e" opacity="0.7"/>
  <text x="37" y="307" fill="#7ab8ff" font-size="9">⚙️ 품질 관리 계획서(QMP) 작성</text>

  <text x="183" y="327" text-anchor="middle" fill="#4080a0" font-size="8.5" font-weight="bold">산출물: 품질 감사 보고서, 프로세스 개선 계획</text>

  <!-- QC column -->
  <rect x="372" y="62" width="330" height="270" rx="10" fill="#1a3a2a" opacity="0.82" stroke="#3aac6a" stroke-width="1.5"/>
  <text x="537" y="82"  text-anchor="middle" fill="#7dff9a" font-size="13" font-weight="bold">🟢 QC (품질 통제)</text>
  <text x="537" y="96"  text-anchor="middle" fill="#3a8a5a" font-size="9">Quality Control — 적발·수정 중심</text>
  <line x1="382" y1="103" x2="692" y2="103" stroke="#3aac6a" stroke-width="0.8" opacity="0.6"/>

  <text x="384" y="120" fill="#60c080" font-size="9.5" font-weight="bold">목적:</text>
  <text x="422" y="120" fill="#9090c0" font-size="9">결함 발견 및 수정 — 산출물 검사</text>
  <text x="384" y="136" fill="#60c080" font-size="9.5" font-weight="bold">시점:</text>
  <text x="422" y="136" fill="#9090c0" font-size="9">생산·납품 특정 시점 (단계적)</text>
  <text x="384" y="152" fill="#60c080" font-size="9.5" font-weight="bold">대상:</text>
  <text x="422" y="152" fill="#9090c0" font-size="9">산출물·결과물·작업물 품질</text>
  <text x="384" y="168" fill="#60c080" font-size="9.5" font-weight="bold">성격:</text>
  <text x="422" y="168" fill="#9090c0" font-size="9">사후 교정적(Reactive)</text>

  <text x="384" y="192" fill="#409060" font-size="9" font-weight="bold">주요 활동:</text>
  <rect x="382" y="198" width="312" height="20" rx="4" fill="#12201a" opacity="0.7"/>
  <text x="391" y="211" fill="#7dff9a" font-size="9">🔬 검사(Inspection) 및 테스트 수행</text>
  <rect x="382" y="222" width="312" height="20" rx="4" fill="#12201a" opacity="0.7"/>
  <text x="391" y="235" fill="#7dff9a" font-size="9">📈 관리도(Control Chart) 분석</text>
  <rect x="382" y="246" width="312" height="20" rx="4" fill="#12201a" opacity="0.7"/>
  <text x="391" y="259" fill="#7dff9a" font-size="9">🎯 파레토 차트로 결함 우선순위화</text>
  <rect x="382" y="270" width="312" height="20" rx="4" fill="#12201a" opacity="0.7"/>
  <text x="391" y="283" fill="#7dff9a" font-size="9">❌ 불합격품 격리·재작업 관리</text>
  <rect x="382" y="294" width="312" height="20" rx="4" fill="#12201a" opacity="0.7"/>
  <text x="391" y="307" fill="#7dff9a" font-size="9">✅ 인수 기준(AC) 충족 여부 확인</text>

  <text x="537" y="327" text-anchor="middle" fill="#308060" font-size="8.5" font-weight="bold">산출물: 결함 보고서, 검사 결과, 승인된 변경요청</text>

  <!-- Bridge -->
  <rect x="18" y="344" width="684" height="42" rx="10" fill="#1a1a3a" opacity="0.85" stroke="#3a3a6a" stroke-width="1.2"/>
  <text x="360" y="361" text-anchor="middle" fill="#d0d0ff" font-size="11" font-weight="bold">QA ↔ QC 상호 관계 — PMBOK 7판 관점</text>
  <text x="360" y="377" text-anchor="middle" fill="#7070c0" font-size="9">QA(프로세스 개선) → QC(결함 발견) → 데이터 → QA(재개선) : 지속적 품질 향상 사이클</text>
</svg>
