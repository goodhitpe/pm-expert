<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" width="720" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="34" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">간트차트 구성 요소 및 일정 단축 기법</text>

  <!-- Gantt Chart Section -->
  <text x="360" y="58" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">■ 간트차트 (Gantt Chart) — 시간 기반 일정 시각화 도구</text>

  <!-- Gantt chart area -->
  <rect x="28" y="68" width="664" height="160" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>

  <!-- Gantt header row -->
  <rect x="28" y="68" width="180" height="28" fill="#1e293b"/>
  <rect x="208" y="68" width="484" height="28" fill="#1e293b"/>
  <text x="118" y="87" font-family="Arial" font-size="11" font-weight="bold" fill="#94a3b8" text-anchor="middle">활동(Activity)</text>
  <!-- Week headers -->
  <text x="266" y="87" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">1주</text>
  <text x="328" y="87" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">2주</text>
  <text x="390" y="87" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">3주</text>
  <text x="452" y="87" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">4주</text>
  <text x="514" y="87" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">5주</text>
  <text x="576" y="87" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">6주</text>
  <text x="638" y="87" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">7주</text>

  <!-- Grid vertical lines -->
  <line x1="208" y1="96" x2="208" y2="228" stroke="#1e293b" stroke-width="1"/>
  <line x1="270" y1="96" x2="270" y2="228" stroke="#334155" stroke-width="0.5"/>
  <line x1="332" y1="96" x2="332" y2="228" stroke="#334155" stroke-width="0.5"/>
  <line x1="394" y1="96" x2="394" y2="228" stroke="#334155" stroke-width="0.5"/>
  <line x1="456" y1="96" x2="456" y2="228" stroke="#334155" stroke-width="0.5"/>
  <line x1="518" y1="96" x2="518" y2="228" stroke="#334155" stroke-width="0.5"/>
  <line x1="580" y1="96" x2="580" y2="228" stroke="#334155" stroke-width="0.5"/>
  <line x1="642" y1="96" x2="642" y2="228" stroke="#334155" stroke-width="0.5"/>

  <!-- Row 1: 요구사항 분석 (W1~W2) -->
  <rect x="28" y="96" width="180" height="26" fill="#111827"/>
  <text x="38" y="113" font-family="Arial" font-size="10" fill="#e2e8f0">1. 요구사항 분석</text>
  <!-- baseline bar -->
  <rect x="211" y="103" width="118" height="13" rx="2" fill="#374151" opacity="0.6"/>
  <!-- actual bar -->
  <rect x="211" y="103" width="118" height="13" rx="2" fill="#3b82f6" opacity="0.8"/>
  <!-- progress -->
  <rect x="211" y="103" width="118" height="13" rx="2" fill="#60a5fa"/>
  <text x="275" y="113" font-family="Arial" font-size="9" fill="white" text-anchor="middle">완료 ✓</text>

  <!-- Row 2: 설계 (W2~W4) -->
  <rect x="28" y="122" width="180" height="26" fill="#0f172a"/>
  <text x="38" y="139" font-family="Arial" font-size="10" fill="#e2e8f0">2. 시스템 설계</text>
  <rect x="273" y="129" width="180" height="13" rx="2" fill="#7c3aed" opacity="0.8"/>
  <rect x="273" y="129" width="100" height="13" rx="2" fill="#8b5cf6"/>
  <text x="323" y="139" font-family="Arial" font-size="9" fill="white" text-anchor="middle">55%</text>

  <!-- Row 3: 개발 (W3~W6) ← Critical Path -->
  <rect x="28" y="148" width="180" height="26" fill="#111827"/>
  <text x="38" y="165" font-family="Arial" font-size="10" fill="#fca5a5">3. ★ 개발 (주공정)</text>
  <rect x="335" y="155" width="243" height="13" rx="2" fill="#991b1b" opacity="0.5"/>
  <rect x="335" y="155" width="243" height="13" rx="2" fill="#ef4444" opacity="0.85"/>
  <rect x="335" y="155" width="60" height="13" rx="2" fill="#f87171"/>
  <text x="437" y="165" font-family="Arial" font-size="9" fill="white" text-anchor="middle">25% (지연 주의)</text>

  <!-- Row 4: 테스트 (W6~W7) -->
  <rect x="28" y="174" width="180" height="26" fill="#0f172a"/>
  <text x="38" y="191" font-family="Arial" font-size="10" fill="#e2e8f0">4. 테스트</text>
  <rect x="583" y="181" width="59" height="13" rx="2" fill="#0f766e" opacity="0.8"/>
  <text x="613" y="191" font-family="Arial" font-size="9" fill="#a7f3d0" text-anchor="middle">미착수</text>

  <!-- Milestone -->
  <rect x="28" y="200" width="180" height="28" fill="#111827"/>
  <text x="38" y="217" font-family="Arial" font-size="10" fill="#fbbf24">◆ 마일스톤: 릴리즈</text>
  <polygon points="645,205 652,213 645,221 638,213" fill="#fbbf24"/>

  <!-- Legend -->
  <rect x="420" y="102" width="12" height="8" rx="1" fill="#60a5fa"/>
  <text x="435" y="110" font-family="Arial" font-size="9" fill="#94a3b8">완료 활동</text>
  <rect x="480" y="102" width="12" height="8" rx="1" fill="#ef4444"/>
  <text x="495" y="110" font-family="Arial" font-size="9" fill="#94a3b8">주공정(CP)</text>

  <!-- Divider -->
  <line x1="40" y1="240" x2="680" y2="240" stroke="#334155" stroke-width="1"/>
  <text x="360" y="260" font-family="Arial" font-size="15" font-weight="bold" fill="#e2e8f0" text-anchor="middle">일정 단축 기법 비교</text>

  <!-- Crashing Box -->
  <rect x="40" y="274" width="300" height="196" rx="8" fill="#1a1a3e" stroke="#f97316" stroke-width="2"/>
  <rect x="40" y="274" width="300" height="32" rx="8" fill="#f97316"/>
  <rect x="40" y="290" width="300" height="16" fill="#f97316"/>
  <text x="190" y="296" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">크래싱 (Crashing)</text>
  <text x="190" y="322" font-family="Arial" font-size="11" fill="#fed7aa" text-anchor="middle">비용을 추가하여 기간 단축</text>
  <text x="190" y="344" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 자원/인력 추가 투입</text>
  <text x="190" y="362" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 야근·주말 근무 연장</text>
  <text x="190" y="380" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 단축 비용이 항상 발생</text>
  <text x="190" y="402" font-family="Arial" font-size="10" fill="#fb923c" text-anchor="middle">적용 대상: 주공정(Critical Path) 활동만</text>
  <text x="190" y="420" font-family="Arial" font-size="10" fill="#fb923c" text-anchor="middle">단점: 비용 증가, 리스크 상승</text>
  <text x="190" y="438" font-family="Arial" font-size="10" fill="#fdba74" text-anchor="middle">예) 개발자 2명 → 4명 투입</text>
  <text x="190" y="456" font-family="Arial" font-size="10" fill="#fdba74" text-anchor="middle">    (3개월 → 2개월, 비용 40% 증가)</text>

  <!-- Fast-tracking Box -->
  <rect x="380" y="274" width="300" height="196" rx="8" fill="#1a2820" stroke="#22c55e" stroke-width="2"/>
  <rect x="380" y="274" width="300" height="32" rx="8" fill="#22c55e"/>
  <rect x="380" y="290" width="300" height="16" fill="#22c55e"/>
  <text x="530" y="296" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">패스트트래킹 (Fast-tracking)</text>
  <text x="530" y="322" font-family="Arial" font-size="11" fill="#bbf7d0" text-anchor="middle">순차 활동을 병행하여 기간 단축</text>
  <text x="530" y="344" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 원래 FS 관계이던 활동 병행</text>
  <text x="530" y="362" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 추가 비용 없이 기간 단축</text>
  <text x="530" y="380" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 재작업(Rework) 리스크 존재</text>
  <text x="530" y="402" font-family="Arial" font-size="10" fill="#4ade80" text-anchor="middle">적용 조건: 활동 간 의존성이 낮을 때</text>
  <text x="530" y="420" font-family="Arial" font-size="10" fill="#4ade80" text-anchor="middle">단점: 재작업 발생 시 오히려 지연</text>
  <text x="530" y="438" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">예) 설계 완료 전 개발 착수</text>
  <text x="530" y="456" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">    (비용↔리스크 트레이드오프)</text>
</svg>
