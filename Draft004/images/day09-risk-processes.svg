<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6a9ad8"/>
    </marker>
  </defs>
  <rect width="720" height="420" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="33" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">Day 09 — 리스크 관리 6 프로세스</text>
  <text x="360" y="52" text-anchor="middle" fill="#9090c0" font-size="11">PMBOK 프로세스 그룹별 리스크 관리 흐름</text>

  <!-- Process boxes (3 top + 3 bottom) -->

  <!-- P1: 리스크 관리 계획 -->
  <rect x="30"  y="68" width="195" height="80" rx="10" fill="#1a2a5c" opacity="0.85" stroke="#3a5aac" stroke-width="1.5"/>
  <text x="127" y="88"  text-anchor="middle" fill="#58c4f6" font-size="13" font-weight="bold">①</text>
  <text x="127" y="106" text-anchor="middle" fill="#80b8e8" font-size="12" font-weight="bold">리스크 관리 계획</text>
  <text x="127" y="122" text-anchor="middle" fill="#a0c0e0" font-size="10">방법론·역할·예산·</text>
  <text x="127" y="136" text-anchor="middle" fill="#a0c0e0" font-size="10">임계값·보고 방식 수립</text>

  <!-- P2: 리스크 식별 -->
  <rect x="263" y="68" width="195" height="80" rx="10" fill="#1a3a2a" opacity="0.85" stroke="#3aac6a" stroke-width="1.5"/>
  <text x="360" y="88"  text-anchor="middle" fill="#7dff9a" font-size="13" font-weight="bold">②</text>
  <text x="360" y="106" text-anchor="middle" fill="#80e8a8" font-size="12" font-weight="bold">리스크 식별</text>
  <text x="360" y="122" text-anchor="middle" fill="#a0e0c0" font-size="10">브레인스토밍, 인터뷰,</text>
  <text x="360" y="136" text-anchor="middle" fill="#a0e0c0" font-size="10">체크리스트 → 리스크 등록부</text>

  <!-- P3: 정성적 분석 -->
  <rect x="496" y="68" width="195" height="80" rx="10" fill="#3a2a1a" opacity="0.85" stroke="#ac7a3a" stroke-width="1.5"/>
  <text x="593" y="88"  text-anchor="middle" fill="#ffa040" font-size="13" font-weight="bold">③</text>
  <text x="593" y="106" text-anchor="middle" fill="#e8b080" font-size="12" font-weight="bold">정성적 리스크 분석</text>
  <text x="593" y="122" text-anchor="middle" fill="#e0c0a0" font-size="10">확률×영향 매트릭스,</text>
  <text x="593" y"136" text-anchor="middle" fill="#e0c0a0" font-size="10">우선순위화 (상·중·하)</text>

  <!-- arrows row 1 -->
  <line x1="225" y1="108" x2="261" y2="108" stroke="#6a9ad8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="458" y1="108" x2="494" y2="108" stroke="#6a9ad8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- down arrow from P3 to P4 -->
  <line x1="593" y1="148" x2="593" y2="198" stroke="#6a9ad8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- P4: 정량적 분석 -->
  <rect x="496" y="200" width="195" height="80" rx="10" fill="#3a1a3a" opacity="0.85" stroke="#ac3aac" stroke-width="1.5"/>
  <text x="593" y="220" text-anchor="middle" fill="#e070f0" font-size="13" font-weight="bold">④</text>
  <text x="593" y="238" text-anchor="middle" fill="#d090e8" font-size="12" font-weight="bold">정량적 리스크 분석</text>
  <text x="593" y="254" text-anchor="middle" fill="#c0a0e0" font-size="10">Monte Carlo, EMV,</text>
  <text x="593" y="268" text-anchor="middle" fill="#c0a0e0" font-size="10">결정트리 (선택적)</text>

  <!-- left arrow P4→P5 -->
  <line x1="494" y1="240" x2="458" y2="240" stroke="#6a9ad8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- P5: 리스크 대응 계획 -->
  <rect x="263" y="200" width="195" height="80" rx="10" fill="#3a1a1a" opacity="0.85" stroke="#ac3a3a" stroke-width="1.5"/>
  <text x="360" y="220" text-anchor="middle" fill="#ff8888" font-size="13" font-weight="bold">⑤</text>
  <text x="360" y="238" text-anchor="middle" fill="#e08080" font-size="12" font-weight="bold">리스크 대응 계획</text>
  <text x="360" y="254" text-anchor="middle" fill="#e0c0c0" font-size="10">회피·전가·완화·수용</text>
  <text x="360" y="268" text-anchor="middle" fill="#e0c0c0" font-size="10">대응 책임자·예비비 할당</text>

  <!-- left arrow P5→P6 -->
  <line x1="261" y1="240" x2="225" y2="240" stroke="#6a9ad8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- P6: 리스크 감시와 통제 -->
  <rect x="30"  y="200" width="195" height="80" rx="10" fill="#2a2a1a" opacity="0.85" stroke="#8a8a2a" stroke-width="1.5"/>
  <text x="127" y="220" text-anchor="middle" fill="#e8e860" font-size="13" font-weight="bold">⑥</text>
  <text x="127" y="238" text-anchor="middle" fill="#d8d870" font-size="12" font-weight="bold">리스크 감시 &amp; 통제</text>
  <text x="127" y="254" text-anchor="middle" fill="#e0e0a0" font-size="10">주기적 리뷰, 잔존 리스크,</text>
  <text x="127" y="268" text-anchor="middle" fill="#e0e0a0" font-size="10">새 리스크 식별, 재조정</text>

  <!-- feedback arrow P6 back to P2 (loop) -->
  <path d="M 127 200 Q 127 165 263 148" stroke="#6a9ad8" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="190" y="162" fill="#6a9ad8" font-size="9">재식별</text>

  <!-- Key tools section -->
  <rect x="30" y="298" width="660" height="92" rx="10" fill="#0f1a3a" opacity="0.9" stroke="#2a3a6a" stroke-width="1"/>
  <text x="360" y="318" text-anchor="middle" fill="#a0b8e0" font-size="12" font-weight="bold">핵심 도구 &amp; 기법</text>

  <rect x="48"  y="328" width="140" height="28" rx="5" fill="#1a2a4a" opacity="0.85"/>
  <text x="118" y="342" text-anchor="middle" fill="#58c4f6" font-size="10" font-weight="bold">확률·영향 매트릭스</text>
  <text x="118" y="354" text-anchor="middle" fill="#8ab8d8" font-size="9">리스크 우선순위화</text>

  <rect x="200" y="328" width="140" height="28" rx="5" fill="#1a3a2a" opacity="0.85"/>
  <text x="270" y="342" text-anchor="middle" fill="#7dff9a" font-size="10" font-weight="bold">리스크 등록부</text>
  <text x="270" y="354" text-anchor="middle" fill="#90c8a0" font-size="9">식별·분석·대응 통합 문서</text>

  <rect x="352" y="328" width="140" height="28" rx="5" fill="#2a1a3a" opacity="0.85"/>
  <text x="422" y="342" text-anchor="middle" fill="#c084f5" font-size="10" font-weight="bold">EMV 기대화폐가치</text>
  <text x="422" y="354" text-anchor="middle" fill="#b090d0" font-size="9">확률 × 영향액</text>

  <rect x="504" y="328" width="165" height="28" rx="5" fill="#3a1a1a" opacity="0.85"/>
  <text x="586" y="342" text-anchor="middle" fill="#ff9898" font-size="10" font-weight="bold">예비비 (Reserve)</text>
  <text x="586" y="354" text-anchor="middle" fill="#e0b0b0" font-size="9">우발사태 + 관리 예비비</text>

  <text x="360" y="384" text-anchor="middle" fill="#6a6a9a" font-size="10">PM 관점: 리스크 관리는 '나쁜 일 막기'가 아닌 불확실성을 기회로 전환하는 전략적 활동</text>

  <!-- Footer -->
  <text x="360" y="408" text-anchor="middle" fill="#5a5a8a" font-size="10">PMBOK 7th: 리스크 원칙 → 프로젝트 전반에 걸쳐 지속적으로 관리</text>
</svg>
