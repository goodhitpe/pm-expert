  <rect width="720" height="400" fill="url(#bg)" rx="12"/>
  <text x="360" y="26" text-anchor="middle" fill="#e0e0ff" font-size="14" font-weight="bold">DevOps / 로우코드 / 디지털 전환 (DX)</text>
  <text x="360" y="43" text-anchor="middle" fill="#9090c0" font-size="9.5">DevOps 8단계 무한루프 ∙ 로우코드 플랫폼 ∙ DX 4대 기술</text>

  <!-- DevOps Infinity Loop -->
  <rect x="12" y="56" width="380" height="188" rx="9" fill="#12122a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
