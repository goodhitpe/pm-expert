  <text x="558" y="210" text-anchor="middle" fill="#9090c0" font-size="7.5">• 스프린트/릴리즈 계획 · 기술부채 가시화 · 자동화 투자 ROI 설명</text>
  <text x="558" y="222" text-anchor="middle" fill="#9090c0" font-size="7.5">• 개발↔운영 사일로 제거 · DORA 메트릭 추적 (배포빈도·변경실패율)</text>
  <text x="558" y="233" text-anchor="middle" fill="#5060a0" font-size="7">DORA: Deployment Frequency / Lead Time / MTTR / Change Failure Rate</text>

