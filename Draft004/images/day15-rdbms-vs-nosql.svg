<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>

  <text x="360" y="26" text-anchor="middle" fill="#e0e0ff" font-size="14" font-weight="bold">RDBMS vs NoSQL — 특성 비교 및 선택 가이드</text>
  <text x="360" y="43" text-anchor="middle" fill="#9090c0" font-size="9.5">관계형 DB와 비관계형 DB의 핵심 차이 · PM 의존 관점</text>

  <!-- Header row -->
  <rect x="12"  y="54" width="130" height="26" rx="4" fill="#0e0e2a"/>
  <rect x="148" y="54" width="270" height="26" rx="4" fill="#1a2a5c"/>
  <rect x="424" y="54" width="284" height="26" rx="4" fill="#1a3a2a"/>
  <text x="77"  y="71" text-anchor="middle" fill="#7090c0" font-size="8.5" font-weight="bold">비교 항목</text>
  <text x="283" y="71" text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">RDBMS (관계형 DB)</text>
  <text x="566" y="71" text-anchor="middle" fill="#7dff9a" font-size="9.5" font-weight="bold">NoSQL (비관계형 DB)</text>

  <!-- Row 1: Structure -->
  <rect x="12"  y="84" width="130" height="32" rx="3" fill="#0e0e20" opacity="0.7"/>
  <rect x="148" y="84" width="270" height="32" rx="3" fill="#12182e" opacity="0.7"/>
  <rect x="424" y="84" width="284" height="32" rx="3" fill="#12201a" opacity="0.7"/>
  <text x="77"  y="104" text-anchor="middle" fill="#8080b0" font-size="8.5">데이터 구조</text>
  <text x="283" y="98"  text-anchor="middle" fill="#80a8e0" font-size="8.5">행(Row) × 열(Column) = 테이블</text>
  <text x="283" y="111" text-anchor="middle" fill="#6080c0" font-size="7.5">엄격한 스키마(Schema First)</text>
  <text x="566" y="98"  text-anchor="middle" fill="#60b080" font-size="8.5">Document / Key-Value / Graph / Column</text>
  <text x="566" y="111" text-anchor="middle" fill="#408060" font-size="7.5">동적 스키마(Schema-Less / Flexible)</text>

  <!-- Row 2: ACID / BASE -->
  <rect x="12"  y="120" width="130" height="32" rx="3" fill="#0e0e20" opacity="0.7"/>
  <rect x="148" y="120" width="270" height="32" rx="3" fill="#12182e" opacity="0.7"/>
  <rect x="424" y="120" width="284" height="32" rx="3" fill="#12201a" opacity="0.7"/>
  <text x="77"  y="140" text-anchor="middle" fill="#8080b0" font-size="8.5">트랜잭션</text>
  <text x="283" y="134" text-anchor="middle" fill="#7dff9a" font-size="8.5">ACID 보장 ✓</text>
  <text x="283" y="147" text-anchor="middle" fill="#6080c0" font-size="7.5">Atomicity · Consistency · Isolation · Durability</text>
  <text x="566" y="134" text-anchor="middle" fill="#ffa040" font-size="8.5">BASE 모델 (최종 일관성)</text>
  <text x="566" y="147" text-anchor="middle" fill="#c07030" font-size="7.5">Basically Available · Soft-state · Eventually consistent</text>

  <!-- Row 3: Scaling -->
  <rect x="12"  y="156" width="130" height="32" rx="3" fill="#0e0e20" opacity="0.7"/>
  <rect x="148" y="156" width="270" height="32" rx="3" fill="#12182e" opacity="0.7"/>
  <rect x="424" y="156" width="284" height="32" rx="3" fill="#12201a" opacity="0.7"/>
  <text x="77"  y="176" text-anchor="middle" fill="#8080b0" font-size="8.5">확장 방식</text>
  <text x="283" y="170" text-anchor="middle" fill="#80a8e0" font-size="8.5">수직 확장 (Scale-Up)</text>
  <text x="283" y="183" text-anchor="middle" fill="#5070a0" font-size="7.5">서버 사양 업그레이드 → 비용↑↑</text>
  <text x="566" y="170" text-anchor="middle" fill="#7dff9a" font-size="8.5">수평 확장 (Scale-Out) ✓</text>
  <text x="566" y="183" text-anchor="middle" fill="#40a060" font-size="7.5">노드 추가로 선형 확장 → 클라우드 최적화</text>

  <!-- Row 4: Query -->
  <rect x="12"  y="192" width="130" height="32" rx="3" fill="#0e0e20" opacity="0.7"/>
  <rect x="148" y="192" width="270" height="32" rx="3" fill="#12182e" opacity="0.7"/>
  <rect x="424" y="192" width="284" height="32" rx="3" fill="#12201a" opacity="0.7"/>
  <text x="77"  y="212" text-anchor="middle" fill="#8080b0" font-size="8.5">쿼리 언어</text>
  <text x="283" y="206" text-anchor="middle" fill="#80a8e0" font-size="8.5">SQL 표준 (ANSI SQL)</text>
  <text x="283" y="219" text-anchor="middle" fill="#5070a0" font-size="7.5">강력한 JOIN · 집계 · 서브쿼리</text>
  <text x="566" y="206" text-anchor="middle" fill="#7dff9a" font-size="8.5">DB 종류별 고유 API / 쿼리</text>
  <text x="566" y="219" text-anchor="middle" fill="#408060" font-size="7.5">MongoDB: JSON 쿼리 / Redis: 명령어</text>

  <!-- Row 5: Use Case -->
  <rect x="12"  y="228" width="130" height="32" rx="3" fill="#0e0e20" opacity="0.7"/>
  <rect x="148" y="228" width="270" height="32" rx="3" fill="#12182e" opacity="0.7"/>
  <rect x="424" y="228" width="284" height="32" rx="3" fill="#12201a" opacity="0.7"/>
  <text x="77"  y="248" text-anchor="middle" fill="#8080b0" font-size="8.5">주요 사례</text>
  <text x="283" y="242" text-anchor="middle" fill="#80a8e0" font-size="8.5">ERP · 금융 · 회계 · HR 시스템</text>
  <text x="283" y="255" text-anchor="middle" fill="#5070a0" font-size="7.5">Oracle · MySQL · PostgreSQL · MSSQL</text>
  <text x="566" y="242" text-anchor="middle" fill="#7dff9a" font-size="8.5">SNS · IOT · 로그 · 실시간 분석</text>
  <text x="566" y="255" text-anchor="middle" fill="#408060" font-size="7.5">MongoDB · Redis · Cassandra · Neo4j</text>

  <!-- NoSQL type icons row -->
  <rect x="12" y="274" width="696" height="52" rx="8" fill="#12122a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
  <text x="360" y="291" text-anchor="middle" fill="#d0d0ff" font-size="10" font-weight="bold">NoSQL 4대 유형</text>
  <rect x="22"  y="297" width="154" height="22" rx="5" fill="#1a3a20"/>
  <rect x="188" y="297" width="154" height="22" rx="5" fill="#1a2a5c"/>
  <rect x="354" y="297" width="154" height="22" rx="5" fill="#3a2a10"/>
  <rect x="520" y="297" width="180" height="22" rx="5" fill="#2a1a5c"/>
  <text x="99"  y="312" text-anchor="middle" fill="#7dff9a" font-size="8.5">Document Store</text>
  <text x="265" y="312" text-anchor="middle" fill="#7ab8ff" font-size="8.5">Key-Value Store</text>
  <text x="431" y="312" text-anchor="middle" fill="#ffc070" font-size="8.5">Column-Family</text>
  <text x="610" y="312" text-anchor="middle" fill="#c084f5" font-size="8.5">Graph DB</text>
  <text x="99"  y="322" text-anchor="middle" fill="#408060" font-size="7">MongoDB/Couchbase</text>
  <text x="265" y="322" text-anchor="middle" fill="#5070c0" font-size="7">Redis/DynamoDB</text>
  <text x="431" y="322" text-anchor="middle" fill="#a06020" font-size="7">Cassandra/HBase</text>
  <text x="610" y="322" text-anchor="middle" fill="#8060c0" font-size="7">Neo4j/Amazon Neptune</text>

  <!-- CAP Theorem -->
  <rect x="12" y="336" width="340" height="56" rx="8" fill="#0e0e2a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
  <text x="182" y="353" text-anchor="middle" fill="#d0d0ff" font-size="10" font-weight="bold">CAP 정리 (Brewer's Theorem)</text>
  <text x="182" y="367" text-anchor="middle" fill="#8080b0" font-size="8">분산 시스템은 C (일관성) · A (가용성) · P (분할내성)</text>
  <text x="182" y="380" text-anchor="middle" fill="#8080b0" font-size="8">중 동시에 2가지만 보장 가능 → NoSQL은 P+A 또는 P+C 선택</text>

  <!-- PM Selection Guide -->
  <rect x="366" y="336" width="342" height="56" rx="8" fill="#0e0e2a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
  <text x="537" y="353" text-anchor="middle" fill="#d0d0ff" font-size="10" font-weight="bold">PM 선택 기준</text>
  <text x="376" y="367" fill="#7ab8ff" font-size="8">RDBMS: 정형 데이터·트랜잭션·규정 준수 필요 시</text>
  <text x="376" y="380" fill="#7dff9a" font-size="8">NoSQL: 대용량·비정형·빠른 확장·유연한 스키마 필요 시</text>
</svg>
