<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="procGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#5248c8;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#00a884;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow10">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr10" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
    <marker id="arr10b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="540" fill="url(#bg10)" rx="14"/>
  <rect x="0" y="0" width="720" height="3" rx="1" fill="url(#procGrad)"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="700">Day 10 — 조달 관리 (Procurement Management)</text>
  <text x="360" y="58" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="12">Plan → Conduct → Control → Close</text>

  <!-- ===== PROCESS FLOW — top section ===== -->
  <!-- Step boxes: y=88, height=52, spacing 97px -->
  <!-- Step 1: Make or Buy -->
  <rect x="18" y="88" width="90" height="52" rx="8" fill="url(#procGrad)"/>
  <text x="63" y="110" text-anchor="middle" fill="white" font-size="10" font-weight="700">Make</text>
  <text x="63" y="123" text-anchor="middle" fill="white" font-size="10" font-weight="700">or Buy?</text>
  <text x="63" y="135" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">의사결정</text>

  <!-- Arrow -->
  <line x1="108" y1="114" x2="128" y2="114" stroke="#6c63ff" stroke-width="2" marker-end="url(#arr10)"/>

  <!-- Step 2: RFP -->
  <rect x="130" y="88" width="90" height="52" rx="8" fill="url(#procGrad)"/>
  <text x="175" y="110" text-anchor="middle" fill="white" font-size="10" font-weight="700">RFP 작성</text>
  <text x="175" y="123" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">제안요청서</text>
  <text x="175" y="135" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">SOW 포함</text>

  <!-- Arrow -->
  <line x1="220" y1="114" x2="240" y2="114" stroke="#6c63ff" stroke-width="2" marker-end="url(#arr10)"/>

  <!-- Step 3: Bidding -->
  <rect x="242" y="88" width="90" height="52" rx="8" fill="url(#procGrad)"/>
  <text x="287" y="110" text-anchor="middle" fill="white" font-size="10" font-weight="700">입찰 공고</text>
  <text x="287" y="123" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">IFB / RFQ</text>
  <text x="287" y="135" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">제안서 수령</text>

  <!-- Arrow -->
  <line x1="332" y1="114" x2="352" y2="114" stroke="#6c63ff" stroke-width="2" marker-end="url(#arr10)"/>

  <!-- Step 4: Selection -->
  <rect x="354" y="88" width="90" height="52" rx="8" fill="url(#procGrad)"/>
  <text x="399" y="110" text-anchor="middle" fill="white" font-size="10" font-weight="700">업체 선정</text>
  <text x="399" y="123" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">평가 기준</text>
  <text x="399" y="135" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">협상·낙찰</text>

  <!-- Arrow -->
  <line x1="444" y1="114" x2="464" y2="114" stroke="#6c63ff" stroke-width="2" marker-end="url(#arr10)"/>

  <!-- Step 5: Contract -->
  <rect x="466" y="88" width="90" height="52" rx="8" fill="url(#tealGrad)"/>
  <text x="511" y="110" text-anchor="middle" fill="white" font-size="10" font-weight="700">계약 체결</text>
  <text x="511" y="123" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">계약서 서명</text>
  <text x="511" y="135" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">법적 구속력</text>

  <!-- Arrow -->
  <line x1="556" y1="114" x2="576" y2="114" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr10)"/>

  <!-- Step 6: Control -->
  <rect x="578" y="88" width="90" height="52" rx="8" fill="url(#tealGrad)"/>
  <text x="623" y="107" text-anchor="middle" fill="white" font-size="10" font-weight="700">계약 관리</text>
  <text x="623" y="120" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">성과 모니터링</text>
  <text x="623" y="132" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">변경 통제</text>
  <text x="623" y="135" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">분쟁 해결</text>

  <!-- Downward arrow to close -->
  <line x1="623" y1="140" x2="623" y2="158" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr10)"/>
  <rect x="578" y="160" width="90" height="30" rx="8" fill="rgba(0,212,170,0.2)" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="623" y="179" text-anchor="middle" fill="#00d4aa" font-size="10" font-weight="700">계약 종료</text>

  <!-- Phase labels under flow -->
  <rect x="18" y="155" width="200" height="20" rx="4" fill="rgba(108,99,255,0.15)" stroke="rgba(108,99,255,0.4)" stroke-width="1"/>
  <text x="118" y="169" text-anchor="middle" fill="#9b8fff" font-size="10" font-weight="600">PLAN — 조달 계획</text>

  <rect x="242" y="155" width="90" height="20" rx="4" fill="rgba(108,99,255,0.15)" stroke="rgba(108,99,255,0.4)" stroke-width="1"/>
  <text x="287" y="169" text-anchor="middle" fill="#9b8fff" font-size="10" font-weight="600">CONDUCT</text>

  <rect x="354" y="155" width="90" height="20" rx="4" fill="rgba(0,212,170,0.1)" stroke="rgba(0,212,170,0.35)" stroke-width="1"/>
  <text x="399" y="169" text-anchor="middle" fill="#00d4aa" font-size="10" font-weight="600">CONDUCT</text>

  <!-- ===== CONTRACT TYPES TABLE ===== -->
  <text x="360" y="218" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="700">계약 유형 비교 (Contract Types)</text>

  <!-- Table header -->
  <rect x="18" y="228" width="684" height="26" rx="4" fill="rgba(108,99,255,0.4)"/>
  <text x="105" y="245" text-anchor="middle" fill="white" font-size="11" font-weight="700">계약 유형</text>
  <text x="270" y="245" text-anchor="middle" fill="white" font-size="11" font-weight="700">특징</text>
  <text x="455" y="245" text-anchor="middle" fill="white" font-size="11" font-weight="700">구매자 리스크</text>
  <text x="615" y="245" text-anchor="middle" fill="white" font-size="11" font-weight="700">공급자 리스크</text>

  <!-- Row 1 — FFP -->
  <rect x="18" y="254" width="684" height="28" rx="0" fill="rgba(255,255,255,0.03)"/>
  <rect x="18" y="254" width="174" height="28" fill="rgba(108,99,255,0.12)"/>
  <text x="105" y="272" text-anchor="middle" fill="#9b8fff" font-size="11" font-weight="700">FFP</text>
  <text x="105" y="282" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">확정고정가(Firm Fixed Price)</text>
  <text x="270" y="268" text-anchor="middle" fill="#e0e0e0" font-size="10">가격 확정, 범위 변경 없음</text>
  <text x="455" y="268" text-anchor="middle" fill="#00d4aa" font-size="11">🟢 낮음</text>
  <text x="615" y="268" text-anchor="middle" fill="#e74c3c" font-size="11">🔴 높음</text>

  <!-- Row 2 — FP-EPA -->
  <rect x="18" y="282" width="684" height="28" rx="0" fill="rgba(255,255,255,0.02)"/>
  <rect x="18" y="282" width="174" height="28" fill="rgba(108,99,255,0.08)"/>
  <text x="105" y="299" text-anchor="middle" fill="#9b8fff" font-size="11" font-weight="700">FP-EPA</text>
  <text x="105" y="309" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">경제가격조정 고정가</text>
  <text x="270" y="296" text-anchor="middle" fill="#e0e0e0" font-size="10">인플레이션 조정 허용</text>
  <text x="455" y="296" text-anchor="middle" fill="#00d4aa" font-size="11">🟢 낮음</text>
  <text x="615" y="296" text-anchor="middle" fill="#f39c12" font-size="11">🟡 중간</text>

  <!-- Row 3 — FPIF -->
  <rect x="18" y="310" width="684" height="28" rx="0" fill="rgba(255,255,255,0.03)"/>
  <rect x="18" y="310" width="174" height="28" fill="rgba(108,99,255,0.12)"/>
  <text x="105" y="327" text-anchor="middle" fill="#9b8fff" font-size="11" font-weight="700">FPIF</text>
  <text x="105" y="337" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">인센티브 고정가</text>
  <text x="270" y="324" text-anchor="middle" fill="#e0e0e0" font-size="10">절감분을 비율대로 공유</text>
  <text x="455" y="324" text-anchor="middle" fill="#f39c12" font-size="11">🟡 중간</text>
  <text x="615" y="324" text-anchor="middle" fill="#f39c12" font-size="11">🟡 중간</text>

  <!-- Row 4 — T&M -->
  <rect x="18" y="338" width="684" height="28" rx="0" fill="rgba(255,255,255,0.02)"/>
  <rect x="18" y="338" width="174" height="28" fill="rgba(0,212,170,0.08)"/>
  <text x="105" y="355" text-anchor="middle" fill="#00d4aa" font-size="11" font-weight="700">T&amp;M</text>
  <text x="105" y="365" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">시간·자재 계약</text>
  <text x="270" y="352" text-anchor="middle" fill="#e0e0e0" font-size="10">공수×단가. 범위불확실 시</text>
  <text x="455" y="352" text-anchor="middle" fill="#e74c3c" font-size="11">🔴 높음</text>
  <text x="615" y="352" text-anchor="middle" fill="#00d4aa" font-size="11">🟢 낮음</text>

  <!-- Row 5 — CPFF -->
  <rect x="18" y="366" width="684" height="28" rx="0" fill="rgba(255,255,255,0.03)"/>
  <rect x="18" y="366" width="174" height="28" fill="rgba(0,212,170,0.12)"/>
  <text x="105" y="383" text-anchor="middle" fill="#00d4aa" font-size="11" font-weight="700">CPFF</text>
  <text x="105" y="393" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">실비+고정수수료</text>
  <text x="270" y="380" text-anchor="middle" fill="#e0e0e0" font-size="10">실비 정산, 수수료 고정</text>
  <text x="455" y="380" text-anchor="middle" fill="#e74c3c" font-size="11">🔴 매우 높음</text>
  <text x="615" y="380" text-anchor="middle" fill="#00d4aa" font-size="11">🟢 낮음</text>

  <!-- Table border -->
  <rect x="18" y="228" width="684" height="166" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" rx="4"/>
  <!-- Vertical dividers -->
  <line x1="192" y1="228" x2="192" y2="394" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="348" y1="228" x2="348" y2="394" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="510" y1="228" x2="510" y2="394" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ===== RISK TRANSFER BAR ===== -->
  <text x="360" y="422" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">리스크 부담 방향</text>
  <!-- Buyer bar -->
  <rect x="18" y="428" width="335" height="18" rx="4" fill="rgba(231,76,60,0.25)" stroke="#e74c3c" stroke-width="1"/>
  <text x="185" y="441" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="600">← 구매자 리스크 증가 (Cost-Plus)</text>
  <!-- Seller bar -->
  <rect x="367" y="428" width="335" height="18" rx="4" fill="rgba(0,212,170,0.2)" stroke="#00d4aa" stroke-width="1"/>
  <text x="534" y="441" text-anchor="middle" fill="#00d4aa" font-size="10" font-weight="600">공급자 리스크 증가 (Fixed-Price) →</text>

  <!-- Type labels on bar -->
  <text x="30" y="462" fill="rgba(255,255,255,0.4)" font-size="9">CPFF</text>
  <text x="130" y="462" fill="rgba(255,255,255,0.4)" font-size="9">T&amp;M</text>
  <text x="260" y="462" fill="rgba(255,255,255,0.4)" font-size="9">FPIF/FP-EPA</text>
  <text x="440" y="462" fill="rgba(255,255,255,0.4)" font-size="9">FFP</text>

  <!-- Key terms footer -->
  <rect x="18" y="474" width="210" height="48" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="123" y="490" text-anchor="middle" fill="#9b8fff" font-size="10" font-weight="700">SOW (범위기술서)</text>
  <text x="123" y="503" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9">인도물·기준·검수 조건 명시</text>
  <text x="123" y="516" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9">PM이 직접 작성</text>

  <rect x="253" y="474" width="210" height="48" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="358" y="490" text-anchor="middle" fill="#00d4aa" font-size="10" font-weight="700">분쟁 해결 (Claims Admin)</text>
  <text x="358" y="503" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9">협상→조정→중재→소송</text>
  <text x="358" y="516" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9">계약서 증거 보존 핵심</text>

  <rect x="488" y="474" width="210" height="48" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="593" y="490" text-anchor="middle" fill="#f39c12" font-size="10" font-weight="700">프로젝트 조달 계획</text>
  <text x="593" y="503" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9">내부 제작 vs 외부 구매 결정</text>
  <text x="593" y="516" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9">비용·위험·역량 종합 판단</text>
</svg>

