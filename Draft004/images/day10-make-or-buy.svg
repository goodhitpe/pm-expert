<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7a9ad8"/>
    </marker>
  </defs>
  <rect width="720" height="420" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">Make or Buy 의사결정 프레임워크</text>
  <text x="360" y="50" text-anchor="middle" fill="#9090c0" font-size="11">자체 개발 vs 외부 조달 — 정량·정성 분석 통합 모델</text>

  <!-- Decision question -->
  <rect x="260" y="60" width="200" height="40" rx="12" fill="#2a2a5c" stroke="#4a6adc" stroke-width="2"/>
  <text x="360" y="78" text-anchor="middle" fill="#a0c8ff" font-size="12" font-weight="bold">Make or Buy?</text>
  <text x="360" y="94" text-anchor="middle" fill="#7090c0" font-size="10">핵심 역량인가?</text>

  <!-- YES arrow down-left -->
  <line x1="300" y1="100" x2="180" y2="135" stroke="#7dff9a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="228" y="122" text-anchor="middle" fill="#7dff9a" font-size="10" font-weight="bold">핵심 역량 O</text>

  <!-- NO arrow down-right -->
  <line x1="420" y1="100" x2="540" y2="135" stroke="#ff9090" stroke-width="2" marker-end="url(#arr)"/>
  <text x="492" y="122" text-anchor="middle" fill="#ff9090" font-size="10" font-weight="bold">핵심 역량 X</text>

  <!-- Make box -->
  <rect x="40" y="136" width="280" height="130" rx="10" fill="#1a3a2a" opacity="0.85" stroke="#3aac6a" stroke-width="1.5"/>
  <text x="180" y="155" text-anchor="middle" fill="#7dff9a" font-size="14" font-weight="bold">MAKE (자체 개발)</text>
  <text x="180" y="171" text-anchor="middle" fill="#5a9a6a" font-size="9">직접 개발 · 내부 자원 사용</text>
  <text x="73"  y="188" text-anchor="start"  fill="#90d0a0" font-size="10">✅ 유리한 조건</text>
  <text x="73"  y="202" text-anchor="start"  fill="#80c090" font-size="9">• 핵심 경쟁력·기밀 유지 필요</text>
  <text x="73"  y="215" text-anchor="start"  fill="#80c090" font-size="9">• 내부 전문 인력·시설 보유</text>
  <text x="73"  y="228" text-anchor="start"  fill="#80c090" font-size="9">• 장기적 비용 절감 기대</text>
  <text x="73"  y="241" text-anchor="start"  fill="#80c090" font-size="9">• 통제력·품질 관리 중요</text>
  <text x="73"  y="255" text-anchor="start"  fill="#ff9898" font-size="9">⚠️ 초기 투자↑ · 리스크 내재화</text>

  <!-- Buy box -->
  <rect x="400" y="136" width="280" height="130" rx="10" fill="#3a1a1a" opacity="0.85" stroke="#ac3a3a" stroke-width="1.5"/>
  <text x="540" y="155" text-anchor="middle" fill="#ff9090" font-size="14" font-weight="bold">BUY (외부 조달)</text>
  <text x="540" y="171" text-anchor="middle" fill="#9a6060" font-size="9">외부 구매 · 아웃소싱</text>
  <text x="433" y="188" text-anchor="start"  fill="#ffb0a0" font-size="10">✅ 유리한 조건</text>
  <text x="433" y="202" text-anchor="start"  fill="#e0a090" font-size="9">• 전문 업체 활용 · 기술 접근</text>
  <text x="433" y="215" text-anchor="start"  fill="#e0a090" font-size="9">• 내부 인력·시설 부족</text>
  <text x="433" y="228" text-anchor="start"  fill="#e0a090" font-size="9">• 초기 투자 최소화 필요</text>
  <text x="433" y="241" text-anchor="start"  fill="#e0a090" font-size="9">• 단기 프로젝트 · 범위 한정</text>
  <text x="433" y="255" text-anchor="start"  fill="#ff9898" font-size="9">⚠️ 통제력 약화 · 업체 의존도↑</text>

  <!-- Cost comparison section -->
  <rect x="20" y="282" width="680" height="96" rx="10" fill="#131a3a" opacity="0.85" stroke="#2a3a7a" stroke-width="1"/>
  <text x="360" y="300" text-anchor="middle" fill="#a0b8e0" font-size="12" font-weight="bold">정량 분석 — 손익분기점 계산</text>

  <!-- Make cost formula -->
  <rect x="35"  y="308" width="300" height="56" rx="8" fill="#1a3a2a" opacity="0.7"/>
  <text x="185" y="324" text-anchor="middle" fill="#7dff9a" font-size="11" font-weight="bold">Make 비용</text>
  <text x="185" y="340" text-anchor="middle" fill="#90d090" font-size="10">= 고정비(장비·인력) + 변동비(유지보수)</text>
  <text x="185" y="354" text-anchor="middle" fill="#80c080" font-size="9">예: ₩500M(설비) + ₩50M/년 × N년</text>
  <text x="185" y="366" text-anchor="middle" fill="#60a060" font-size="9">→ 5년 이상 사용 시 절감 효과</text>

  <!-- Buy cost formula -->
  <rect x="385" y="308" width="300" height="56" rx="8" fill="#3a1a1a" opacity="0.7"/>
  <text x="535" y="324" text-anchor="middle" fill="#ff9090" font-size="11" font-weight="bold">Buy 비용</text>
  <text x="535" y="340" text-anchor="middle" fill="#e09090" font-size="10">= 구매가 + (운영비/년 × 기간)</text>
  <text x="535" y="354" text-anchor="middle" fill="#c08080" font-size="9">예: ₩100M(구입) + ₩80M/년 × N년</text>
  <text x="535" y="366" text-anchor="middle" fill="#a06060" font-size="9">→ 단기엔 저렴, 장기엔 비용↑</text>

  <!-- Footer -->
  <text x="360" y="396" text-anchor="middle" fill="#f0f060" font-size="10" font-weight="bold">결정 원칙: 비용만이 아닌 리스크·전략적 가치·역량을 종합 판단하세요</text>
  <text x="360" y="410" text-anchor="middle" fill="#6a6a9a" font-size="9">PM 시험 키워드: Make or Buy Analysis | Lease vs Buy | Outsourcing Decision | Strategic Alignment</text>
</svg>
