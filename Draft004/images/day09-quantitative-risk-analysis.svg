<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" width="720" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="720" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="34" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">정량적 리스크 분석 — EMV 및 의사결정 나무</text>

  <!-- EMV Formula section -->
  <rect x="28" y="52" width="340" height="130" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <rect x="28" y="52" width="340" height="32" rx="8" fill="#1d4ed8"/>
  <rect x="28" y="68" width="340" height="16" fill="#1d4ed8"/>
  <text x="198" y="74" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">EMV (기대 화폐 가치)</text>
  <text x="198" y="88" font-family="Arial" font-size="10" fill="#bfdbfe" text-anchor="middle">Expected Monetary Value</text>

  <!-- Formula box -->
  <rect x="48" y="102" width="300" height="38" rx="6" fill="#1e3a5f"/>
  <text x="198" y="117" font-family="Arial" font-size="15" font-weight="bold" fill="#fbbf24" text-anchor="middle">EMV = 발생 확률 × 영향도</text>
  <text x="198" y="133" font-family="Arial" font-size="11" fill="#93c5fd" text-anchor="middle">Probability × Impact</text>

  <text x="198" y="163" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">전체 EMV = 각 리스크의 EMV 합산</text>

  <!-- Monte Carlo note -->
  <rect x="380" y="52" width="316" height="130" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
  <rect x="380" y="52" width="316" height="32" rx="8" fill="#7c3aed"/>
  <rect x="380" y="68" width="316" height="16" fill="#7c3aed"/>
  <text x="538" y="74" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">몬테카를로 시뮬레이션</text>
  <text x="538" y="88" font-family="Arial" font-size="10" fill="#e9d5ff" text-anchor="middle">Monte Carlo Simulation</text>
  <text x="538" y="112" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 수천 번 반복 시뮬레이션</text>
  <text x="538" y="128" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">• 일정·비용의 확률 분포 도출</text>
  <text x="538" y="148" font-family="Arial" font-size="11" fill="#c4b5fd" text-anchor="middle">→ P80: 80% 확률로 완료되는 비용/일정</text>
  <text x="538" y="165" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">도구: @RISK, Crystal Ball</text>

  <!-- Decision Tree section -->
  <text x="360" y="210" font-family="Arial" font-size="15" font-weight="bold" fill="#e2e8f0" text-anchor="middle">■ 의사결정 나무 (Decision Tree) 예시</text>

  <!-- Root node -->
  <rect x="300" y="225" width="120" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="248" font-family="Arial" font-size="12" font-weight="bold" fill="#93c5fd" text-anchor="middle">제품 개발</text>
  <text x="360" y="262" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">의사결정 지점 ■</text>

  <!-- Branch A: 개발 진행 -->
  <line x1="300" y1="245" x2="168" y2="298" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrd)"/>
  <text x="200" y="278" font-family="Arial" font-size="10" fill="#4ade80" text-anchor="middle">개발 진행</text>

  <!-- Branch B: 개발 중단 -->
  <line x1="420" y1="245" x2="548" y2="298" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrr)"/>
  <text x="514" y="278" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">개발 중단</text>

  <!-- Branch A node: 시장 반응 -->
  <rect x="80" y="300" width="176" height="38" rx="6" fill="#1a3a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="168" y="322" font-family="Arial" font-size="11" fill="#86efac" text-anchor="middle">시장 반응 (확률 노드 ◯)</text>

  <!-- Branch A1: 성공 -->
  <line x1="90" y1="318" x2="44" y2="382" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrd)"/>
  <text x="32" y="365" font-family="Arial" font-size="9" fill="#4ade80">성공</text>
  <text x="32" y="376" font-family="Arial" font-size="9" fill="#4ade80">60%</text>
  <rect x="8" y="384" width="148" height="36" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="82" y="403" font-family="Arial" font-size="11" fill="#4ade80" text-anchor="middle">+₩500M</text>
  <text x="82" y="416" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">EMV = 0.6 × 500 = 300M</text>

  <!-- Branch A2: 실패 -->
  <line x1="248" y1="318" x2="280" y2="382" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrr)"/>
  <text x="280" y="365" font-family="Arial" font-size="9" fill="#fca5a5">실패</text>
  <text x="280" y="376" font-family="Arial" font-size="9" fill="#fca5a5">40%</text>
  <rect x="248" y="384" width="148" height="36" rx="4" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="322" y="403" font-family="Arial" font-size="11" fill="#f87171" text-anchor="middle">-₩200M</text>
  <text x="322" y="416" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">EMV = 0.4 × (-200) = -80M</text>

  <!-- Path B: 중단 -->
  <rect x="460" y="300" width="176" height="38" rx="6" fill="#3a1a1a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="548" y="322" font-family="Arial" font-size="11" fill="#fca5a5" text-anchor="middle">개발 비용 손실</text>
  <rect x="478" y="354" width="140" height="36" rx="4" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="548" y="373" font-family="Arial" font-size="11" fill="#f87171" text-anchor="middle">-₩100M (확정)</text>
  <line x1="548" y1="338" x2="548" y2="354" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrr)"/>

  <!-- Summary box -->
  <rect x="28" y="438" width="664" height="46" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="200" y="458" font-family="Arial" font-size="12" font-weight="bold" fill="#fbbf24" text-anchor="middle">개발 진행 EMV 합산</text>
  <text x="200" y="476" font-family="Arial" font-size="12" fill="#e2e8f0" text-anchor="middle">300M + (-80M) = +₩220M</text>
  <text x="520" y="458" font-family="Arial" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">중단 EMV</text>
  <text x="520" y="476" font-family="Arial" font-size="12" fill="#e2e8f0" text-anchor="middle">-₩100M</text>
  <text x="360" y="458" font-family="Arial" font-size="14" font-weight="bold" fill="#4ade80" text-anchor="middle">→ 개발 진행 선택!</text>
  <line x1="340" y1="442" x2="340" y2="480" stroke="#334155" stroke-width="1"/>
  <line x1="450" y1="442" x2="450" y2="480" stroke="#334155" stroke-width="1"/>
</svg>
