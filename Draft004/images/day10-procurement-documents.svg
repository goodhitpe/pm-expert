<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="spec" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="33%" style="stop-color:#22c55e"/>
      <stop offset="66%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="34" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">조달 문서 유형 및 RFP 구조</text>
  <text x="360" y="54" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">■ 구매 필요의 구체화 수준에 따른 조달 문서 선택</text>

  <!-- Spectrum bar -->
  <rect x="40" y="68" width="642" height="22" rx="6" fill="url(#spec)" opacity="0.8"/>
  <text x="40" y="106" font-family="Arial" font-size="10" fill="#93c5fd">← 정보 수집 단계</text>
  <text x="660" y="106" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="end">구체적 조달 단계 →</text>

  <!-- 4 document cards -->
  <!-- RFI -->
  <rect x="28" y="116" width="154" height="196" rx="8" fill="#1e2a4a" stroke="#3b82f6" stroke-width="2"/>
  <rect x="28" y="116" width="154" height="32" rx="8" fill="#2563eb"/>
  <rect x="28" y="132" width="154" height="16" fill="#2563eb"/>
  <text x="105" y="138" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">RFI</text>
  <text x="105" y="153" font-family="Arial" font-size="9" fill="#bfdbfe" text-anchor="middle">Request for Information</text>
  <text x="105" y="172" font-family="Arial" font-size="11" fill="#93c5fd" text-anchor="middle">정보 요청서</text>
  <text x="105" y="192" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">시장 조사 단계</text>
  <text x="105" y="210" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">공급업체 역량 파악</text>
  <text x="105" y="228" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">비구속적 요청</text>
  <text x="105" y="252" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">응답 → 자료 제공</text>
  <text x="105" y="268" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">계약 없음</text>
  <text x="105" y="286" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">예) "AI 솔루션 도입</text>
  <text x="105" y="300" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">시장 현황 파악"</text>

  <!-- RFQ -->
  <rect x="196" y="116" width="154" height="196" rx="8" fill="#1a2a1a" stroke="#22c55e" stroke-width="2"/>
  <rect x="196" y="116" width="154" height="32" rx="8" fill="#16a34a"/>
  <rect x="196" y="132" width="154" height="16" fill="#16a34a"/>
  <text x="273" y="138" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">RFQ</text>
  <text x="273" y="153" font-family="Arial" font-size="9" fill="#bbf7d0" text-anchor="middle">Request for Quotation</text>
  <text x="273" y="172" font-family="Arial" font-size="11" fill="#4ade80" text-anchor="middle">가격 견적 요청서</text>
  <text x="273" y="192" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">표준품 구매 시</text>
  <text x="273" y="210" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">수량·사양 명확할 때</text>
  <text x="273" y="228" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">가격이 주 선정 기준</text>
  <text x="273" y="252" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">응답 → 가격 제시</text>
  <text x="273" y="268" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">비교적 간단</text>
  <text x="273" y="286" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">예) "서버 10대</text>
  <text x="273" y="300" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">단가 견적 제출"</text>

  <!-- RFP -->
  <rect x="364" y="116" width="154" height="196" rx="8" fill="#3a2a1a" stroke="#f97316" stroke-width="2.5"/>
  <rect x="364" y="116" width="154" height="32" rx="8" fill="#ea580c"/>
  <rect x="364" y="132" width="154" height="16" fill="#ea580c"/>
  <text x="441" y="138" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">RFP ⭐핵심</text>
  <text x="441" y="153" font-family="Arial" font-size="9" fill="#fed7aa" text-anchor="middle">Request for Proposal</text>
  <text x="441" y="172" font-family="Arial" font-size="11" fill="#fb923c" text-anchor="middle">제안 요청서</text>
  <text x="441" y="192" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">복잡한 IT 프로젝트</text>
  <text x="441" y="210" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">솔루션+가격 모두 평가</text>
  <text x="441" y="228" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">기술·가격 종합 평가</text>
  <text x="441" y="252" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">응답 → 기술제안서</text>
  <text x="441" y="268" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">+ 가격제안서</text>
  <text x="441" y="286" font-family="Arial" font-size="10" fill="#fdba74" text-anchor="middle">예) "ERP 시스템</text>
  <text x="441" y="300" font-family="Arial" font-size="10" fill="#fdba74" text-anchor="middle">구축 제안서 제출"</text>

  <!-- IFB -->
  <rect x="532" y="116" width="162" height="196" rx="8" fill="#2e1065" stroke="#a855f7" stroke-width="2"/>
  <rect x="532" y="116" width="162" height="32" rx="8" fill="#7c3aed"/>
  <rect x="532" y="132" width="162" height="16" fill="#7c3aed"/>
  <text x="613" y="138" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">IFB</text>
  <text x="613" y="153" font-family="Arial" font-size="9" fill="#e9d5ff" text-anchor="middle">Invitation for Bid</text>
  <text x="613" y="172" font-family="Arial" font-size="11" fill="#c084fc" text-anchor="middle">입찰 초청</text>
  <text x="613" y="192" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">공공/정부 조달</text>
  <text x="613" y="210" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">사양 완전히 정의</text>
  <text x="613" y="228" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">최저가 낙찰 원칙</text>
  <text x="613" y="252" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">응답 → 봉인 입찰서</text>
  <text x="613" y="268" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">공개 개찰</text>
  <text x="613" y="286" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">예) "도로 공사</text>
  <text x="613" y="300" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">최저가 입찰"</text>

  <!-- RFP Structure -->
  <text x="360" y="336" font-family="Arial" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">■ RFP 핵심 구성 요소</text>

  <rect x="28" y="350" width="664" height="94" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <!-- 6 components -->
  <rect x="40" y="360" width="96" height="28" rx="4" fill="#1e3a5f"/>
  <text x="88" y="379" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">프로젝트 개요</text>
  <rect x="148" y="360" width="96" height="28" rx="4" fill="#1a3a1a"/>
  <text x="196" y="379" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">SOW (업무범위)</text>
  <rect x="256" y="360" width="96" height="28" rx="4" fill="#3a1a1a"/>
  <text x="304" y="379" font-family="Arial" font-size="10" fill="#f87171" text-anchor="middle">기술 요구사항</text>
  <rect x="364" y="360" width="96" height="28" rx="4" fill="#3a2a1a"/>
  <text x="412" y="379" font-family="Arial" font-size="10" fill="#fdba74" text-anchor="middle">평가 기준</text>
  <rect x="472" y="360" width="96" height="28" rx="4" fill="#2e1065"/>
  <text x="520" y="379" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">제출 요건</text>
  <rect x="580" y="360" width="96" height="28" rx="4" fill="#1a2a3a"/>
  <text x="628" y="379" font-family="Arial" font-size="10" fill="#7dd3fc" text-anchor="middle">계약 조건</text>

  <text x="88" y="412" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">배경·목적·예산</text>
  <text x="196" y="412" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">인도물·일정·책임</text>
  <text x="304" y="412" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">기능·비기능·통합</text>
  <text x="412" y="412" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">기술60%+가격40%</text>
  <text x="520" y="412" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">형식·기한·분량</text>
  <text x="628" y="412" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">계약 유형·지급</text>
  <text x="88" y="432" font-family="Arial" font-size="9" fill="#475569" text-anchor="middle">(상한)</text>
</svg>
