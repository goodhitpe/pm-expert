<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="460" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="34" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">갈등 해결 5가지 기법 (PMBOK)</text>
  <text x="360" y="54" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">■ 결과(Win/Lose)와 관계(강화/손상) 두 축으로 선택</text>

  <!-- Matrix axes labels -->
  <text x="360" y="78" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">← 관계 손상 ———————————————————————— 관계 강화 →</text>

  <!-- Row 1: Top two techniques -->
  <!-- Collaborate (best) -->
  <rect x="380" y="90" width="296" height="160" rx="8" fill="#1a2820" stroke="#22c55e" stroke-width="2.5"/>
  <rect x="380" y="90" width="296" height="32" rx="8" fill="#22c55e"/>
  <rect x="380" y="106" width="296" height="16" fill="#22c55e"/>
  <text x="528" y="112" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">① 협력/문제해결 ⭐최선</text>
  <text x="528" y="127" font-family="Arial" font-size="10" fill="#bbf7d0" text-anchor="middle">Collaborate / Problem Solve</text>
  <text x="528" y="148" font-family="Arial" font-size="12" fill="#4ade80" text-anchor="middle">Win - Win</text>
  <text x="528" y="168" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">근본 원인 파악 → 모두 만족</text>
  <text x="528" y="186" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">시간이 있을 때, 장기 관계 중요</text>
  <text x="528" y="208" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">관계: 강화 | 해결: 완전 | 속도: 느림</text>
  <text x="528" y="226" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">예) 워크숍을 통해 기능 우선순위 합의</text>

  <!-- Compromise -->
  <rect x="40" y="90" width="296" height="160" rx="8" fill="#1a2a3a" stroke="#38bdf8" stroke-width="2"/>
  <rect x="40" y="90" width="296" height="32" rx="8" fill="#38bdf8"/>
  <rect x="40" y="106" width="296" height="16" fill="#38bdf8"/>
  <text x="188" y="112" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">② 타협 (Compromise)</text>
  <text x="188" y="127" font-family="Arial" font-size="10" fill="#bae6fd" text-anchor="middle">Compromise / Reconcile</text>
  <text x="188" y="148" font-family="Arial" font-size="12" fill="#7dd3fc" text-anchor="middle">Partial Win - Partial Win</text>
  <text x="188" y="168" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">양쪽이 일부씩 양보, 중간 지점</text>
  <text x="188" y="186" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">Win-Win 불가능, 시간 제한적</text>
  <text x="188" y="208" font-family="Arial" font-size="10" fill="#7dd3fc" text-anchor="middle">관계: 유지 | 해결: 부분 | 속도: 중간</text>
  <text x="188" y="226" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">예) 일정 기간은 A안, 이후 B안 적용</text>

  <!-- Row 2: Three more techniques -->
  <!-- Smooth/Accommodate -->
  <rect x="40" y="270" width="192" height="162" rx="8" fill="#1a1a3e" stroke="#a855f7" stroke-width="2"/>
  <rect x="40" y="270" width="192" height="32" rx="8" fill="#a855f7"/>
  <rect x="40" y="286" width="192" height="16" fill="#a855f7"/>
  <text x="136" y="292" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">③ 완화/수용</text>
  <text x="136" y="307" font-family="Arial" font-size="9" fill="#e9d5ff" text-anchor="middle">Smooth / Accommodate</text>
  <text x="136" y="328" font-family="Arial" font-size="11" fill="#c084fc" text-anchor="middle">임시 완화</text>
  <text x="136" y="346" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">공통점 강조</text>
  <text x="136" y="362" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">차이점 축소</text>
  <text x="136" y="382" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">관계: 유지</text>
  <text x="136" y="396" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">해결: 미완</text>
  <text x="136" y="412" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">근본 문제 재발 가능</text>

  <!-- Force/Direct -->
  <rect x="248" y="270" width="192" height="162" rx="8" fill="#3a1a1a" stroke="#ef4444" stroke-width="2"/>
  <rect x="248" y="270" width="192" height="32" rx="8" fill="#ef4444"/>
  <rect x="248" y="286" width="192" height="16" fill="#ef4444"/>
  <text x="344" y="292" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">④ 강요 (Force)</text>
  <text x="344" y="307" font-family="Arial" font-size="9" fill="#fecaca" text-anchor="middle">Force / Direct</text>
  <text x="344" y="328" font-family="Arial" font-size="11" fill="#f87171" text-anchor="middle">Win - Lose</text>
  <text x="344" y="346" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">권력으로 강제 관철</text>
  <text x="344" y="362" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">긴급 상황, 마감</text>
  <text x="344" y="382" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">관계: 손상</text>
  <text x="344" y="396" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">패배자 반감 발생</text>
  <text x="344" y="412" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">최소한으로만 사용</text>

  <!-- Withdraw/Avoid -->
  <rect x="456" y="270" width="220" height="162" rx="8" fill="#1a2a1a" stroke="#64748b" stroke-width="2"/>
  <rect x="456" y="270" width="220" height="32" rx="8" fill="#475569"/>
  <rect x="456" y="286" width="220" height="16" fill="#475569"/>
  <text x="566" y="292" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">⑤ 회피 ⚠️최후수단</text>
  <text x="566" y="307" font-family="Arial" font-size="9" fill="#cbd5e1" text-anchor="middle">Withdraw / Avoid</text>
  <text x="566" y="328" font-family="Arial" font-size="11" fill="#94a3b8" text-anchor="middle">결과 없음(No result)</text>
  <text x="566" y="346" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">문제 외면, 미루기</text>
  <text x="566" y="362" font-family="Arial" font-size="11" fill="#e2e8f0" text-anchor="middle">사소한 문제일 때만</text>
  <text x="566" y="382" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">관계: 현상유지</text>
  <text x="566" y="396" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">해결: 없음</text>
  <text x="566" y="412" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">이슈 악화 위험 있음</text>

  <!-- Bottom note -->
  <text x="360" y="448" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">💡 PMBOK 권장 순서: ① 협력 → ② 타협 → ③ 완화 → ④ 강요 → ⑤ 회피(최후 수단)</text>
</svg>
