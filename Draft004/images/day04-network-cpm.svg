<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6c63ff"/>
    </marker>
  </defs>
  <rect width="720" height="420" fill="url(#bg)" rx="12"/>
  <text x="360" y="30" text-anchor="middle" fill="#f39c12" font-size="17" font-family="Arial,sans-serif" font-weight="bold">Day 04 — CPM 네트워크 다이어그램 &amp; 주공정</text>

  <!-- Nodes -->
  <!-- Start -->
  <circle cx="60" cy="200" r="30" fill="#6c63ff"/>
  <text x="60" y="197" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">START</text>
  <text x="60" y="210" text-anchor="middle" fill="#ddd" font-size="8">Day 0</text>

  <!-- A (3d) -->
  <rect x="120" y="106" width="80" height="56" rx="7" fill="#00d4aa"/>
  <text x="160" y="126" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">A</text>
  <text x="160" y="141" text-anchor="middle" fill="white" font-size="9">요구사항 분석</text>
  <text x="160" y="155" text-anchor="middle" fill="#222" font-size="9" font-weight="bold">3일</text>

  <!-- B (5d) -->
  <rect x="120" y="234" width="80" height="56" rx="7" fill="rgba(0,212,170,0.4)" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="160" y="254" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">B</text>
  <text x="160" y="269" text-anchor="middle" fill="white" font-size="9">환경 세팅</text>
  <text x="160" y="283" text-anchor="middle" fill="#ddd" font-size="9">5일</text>

  <!-- C (4d) - critical -->
  <rect x="260" y="106" width="80" height="56" rx="7" fill="#e74c3c" stroke="#ff6b6b" stroke-width="2"/>
  <text x="300" y="126" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">C</text>
  <text x="300" y="141" text-anchor="middle" fill="white" font-size="9">UI 설계</text>
  <text x="300" y="155" text-anchor="middle" fill="#ffdddd" font-size="9" font-weight="bold">4일 ★</text>

  <!-- D (6d) - critical -->
  <rect x="260" y="234" width="80" height="56" rx="7" fill="#e74c3c" stroke="#ff6b6b" stroke-width="2"/>
  <text x="300" y="254" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">D</text>
  <text x="300" y="269" text-anchor="middle" fill="white" font-size="9">백엔드 개발</text>
  <text x="300" y="283" text-anchor="middle" fill="#ffdddd" font-size="9" font-weight="bold">6일 ★</text>

  <!-- E (5d) - critical -->
  <rect x="400" y="170" width="80" height="56" rx="7" fill="#e74c3c" stroke="#ff6b6b" stroke-width="2"/>
  <text x="440" y="190" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">E</text>
  <text x="440" y="205" text-anchor="middle" fill="white" font-size="9">통합 테스트</text>
  <text x="440" y="219" text-anchor="middle" fill="#ffdddd" font-size="9" font-weight="bold">5일 ★</text>

  <!-- F (2d) -->
  <rect x="540" y="170" width="80" height="56" rx="7" fill="#00d4aa"/>
  <text x="580" y="190" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">F</text>
  <text x="580" y="205" text-anchor="middle" fill="white" font-size="9">배포</text>
  <text x="580" y="219" text-anchor="middle" fill="#222" font-size="9" font-weight="bold">2일</text>

  <!-- End -->
  <circle cx="680" cy="198" r="30" fill="#9b59b6"/>
  <text x="680" y="195" text-anchor="middle" fill="white" font-size="11" font-family="Arial,sans-serif" font-weight="bold">END</text>
  <text x="680" y="208" text-anchor="middle" fill="#ddd" font-size="8">Day 20</text>

  <!-- Arrows: critical path (red dashed thick) -->
  <line x1="90" y1="185" x2="120" y2="147" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="200" y1="134" x2="260" y2="134" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="340" y1="134" x2="400" y2="183" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="340" y1="267" x2="400" y2="218" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="480" y1="198" x2="540" y2="198" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="620" y1="198" x2="650" y2="198" stroke="#6c63ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Non-critical -->
  <line x1="90" y1="213" x2="120" y2="255" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="200" y1="262" x2="260" y2="262" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="90" y1="185" x2="120" y2="147" stroke="#e74c3c" stroke-width="0"/>

  <!-- Critical path label -->
  <rect x="20" y="345" width="460" height="30" rx="6" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="30" y="357" fill="#e74c3c" font-size="11" font-family="Arial,sans-serif" font-weight="bold">Critical Path:</text>
  <text x="135" y="357" fill="#e0e0e0" font-size="11" font-family="Arial,sans-serif">START → A(3) → C(4) → E(5) → F(2) → END = 14일</text>
  <text x="30" y="370" fill="#f39c12" font-size="9" font-family="Arial,sans-serif">★ Free Float 0 — 하루라도 지연되면 전체 프로젝트가 지연됨!</text>

  <!-- Float info -->
  <rect x="500" y="345" width="200" height="50" rx="6" fill="rgba(255,255,255,0.05)" stroke="#444" stroke-width="1"/>
  <text x="600" y="360" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Arial,sans-serif" font-weight="bold">B경로 여유(Float)</text>
  <text x="600" y="375" text-anchor="middle" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">B(5) + D(6) = 11일</text>
  <text x="600" y="390" text-anchor="middle" fill="#00d4aa" font-size="9" font-family="Arial,sans-serif">Float = 14 - 11 = 3일</text>

  <text x="360" y="410" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">주공정(Critical Path)은 프로젝트 최단 완료 기간을 결정하는 경로</text>
</svg>
