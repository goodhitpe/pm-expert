<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>

  <text x="360" y="26" text-anchor="middle" fill="#e0e0ff" font-size="14" font-weight="bold">PMBOK 범위 관리 6대 프로세스 흐름</text>
  <text x="360" y="43" text-anchor="middle" fill="#9090c0" font-size="9.5">계획 → 요구사항 → 정의 → WBS → 확인 → 통제</text>

  <!-- Process flow (hexagonal-ish chain) -->
  <!-- P1: Plan Scope Management -->
  <rect x="12" y="58" width="102" height="72" rx="8" fill="#1a2a5c" stroke="#4a6adc" stroke-width="1.5"/>
  <text x="63" y="76" text-anchor="middle" fill="#7ab8ff" font-size="9" font-weight="bold">① 범위 관리</text>
  <text x="63" y="88" text-anchor="middle" fill="#7ab8ff" font-size="9" font-weight="bold">계획 수립</text>
  <text x="63" y="100" text-anchor="middle" fill="#5070a0" font-size="7.5">Plan Scope</text>
  <text x="63" y="112" text-anchor="middle" fill="#5070a0" font-size="7.5">Mgmt</text>
  <text x="63" y="122" text-anchor="middle" fill="#3050a0" font-size="7">PG: Planning</text>

  <polygon points="114,94 122,88 130,94 122,100" fill="#4a6adc"/>

  <!-- P2: Collect Requirements -->
  <rect x="130" y="58" width="102" height="72" rx="8" fill="#1a2a5c" stroke="#4a6adc" stroke-width="1.5"/>
  <text x="181" y="76" text-anchor="middle" fill="#7ab8ff" font-size="9" font-weight="bold">② 요구사항</text>
  <text x="181" y="88" text-anchor="middle" fill="#7ab8ff" font-size="9" font-weight="bold">수집</text>
  <text x="181" y="100" text-anchor="middle" fill="#5070a0" font-size="7.5">Collect</text>
  <text x="181" y="112" text-anchor="middle" fill="#5070a0" font-size="7.5">Requirements</text>
  <text x="181" y="122" text-anchor="middle" fill="#3050a0" font-size="7">→ 요구사항 문서</text>

  <polygon points="232,94 240,88 248,94 240,100" fill="#4a6adc"/>

  <!-- P3: Define Scope -->
  <rect x="248" y="58" width="102" height="72" rx="8" fill="#1a2a5c" stroke="#4a6adc" stroke-width="1.5"/>
  <text x="299" y="76" text-anchor="middle" fill="#7ab8ff" font-size="9" font-weight="bold">③ 범위 정의</text>
  <text x="299" y="88" text-anchor="middle" fill="#5070a0" font-size="7.5">Define Scope</text>
  <text x="299" y="102" text-anchor="middle" fill="#80a8e0" font-size="7.5">• 범위 기술서</text>
  <text x="299" y="113" text-anchor="middle" fill="#80a8e0" font-size="7.5">• 포함/제외 항목</text>
  <text x="299" y="122" text-anchor="middle" fill="#3050a0" font-size="7">→ 프로젝트 범위</text>

  <polygon points="350,94 358,88 366,94 358,100" fill="#4a6adc"/>

  <!-- P4: Create WBS -->
  <rect x="366" y="58" width="102" height="72" rx="8" fill="#1a3a2a" stroke="#2a9a5a" stroke-width="1.5"/>
  <text x="417" y="76" text-anchor="middle" fill="#7dff9a" font-size="9" font-weight="bold">④ WBS 작성</text>
  <text x="417" y="88" text-anchor="middle" fill="#5aa070" font-size="7.5">Create WBS</text>
  <text x="417" y="102" text-anchor="middle" fill="#60c080" font-size="7.5">• 인도물 분해</text>
  <text x="417" y="113" text-anchor="middle" fill="#60c080" font-size="7.5">• 작업 패키지</text>
  <text x="417" y="122" text-anchor="middle" fill="#308050" font-size="7">→ WBS + 사전</text>

  <polygon points="468,94 476,88 484,94 476,100" fill="#2a9a5a"/>

  <!-- P5: Validate Scope -->
  <rect x="484" y="58" width="102" height="72" rx="8" fill="#3a2a1a" stroke="#ca8a2a" stroke-width="1.5"/>
  <text x="535" y="76" text-anchor="middle" fill="#ffc070" font-size="9" font-weight="bold">⑤ 범위 확인</text>
  <text x="535" y="88" text-anchor="middle" fill="#a06020" font-size="7.5">Validate Scope</text>
  <text x="535" y="100" text-anchor="middle" fill="#d09050" font-size="7.5">검사(Inspection)</text>
  <text x="535" y="112" text-anchor="middle" fill="#d09050" font-size="7.5">고객 인수 수락</text>
  <text x="535" y="124" text-anchor="middle" fill="#a06020" font-size="7">PG: M&amp;C</text>

  <polygon points="586,94 594,88 602,94 594,100" fill="#ca8a2a"/>

  <!-- P6: Control Scope -->
  <rect x="602" y="58" width="106" height="72" rx="8" fill="#3a1a1a" stroke="#9a2a2a" stroke-width="1.5"/>
  <text x="655" y="76" text-anchor="middle" fill="#ffb0b0" font-size="9" font-weight="bold">⑥ 범위 통제</text>
  <text x="655" y="88" text-anchor="middle" fill="#a04040" font-size="7.5">Control Scope</text>
  <text x="655" y="100" text-anchor="middle" fill="#e08080" font-size="7.5">• 범위 크리프 방지</text>
  <text x="655" y="112" text-anchor="middle" fill="#e08080" font-size="7.5">• 변경 요청 처리</text>
  <text x="655" y="124" text-anchor="middle" fill="#a03030" font-size="7">PG: M&amp;C</text>

  <!-- Key outputs bar below -->
  <rect x="12" y="145" width="102" height="36" rx="5" fill="#0e1430" opacity="0.7"/>
  <text x="63" y="159" text-anchor="middle" fill="#5070a0" font-size="7.5">범위 관리</text>
  <text x="63" y="170" text-anchor="middle" fill="#5070a0" font-size="7.5">계획서</text>
  <text x="63" y="179" text-anchor="middle" fill="#3050a0" font-size="7">요구사항 관리계획</text>

  <rect x="130" y="145" width="102" height="36" rx="5" fill="#0e1430" opacity="0.7"/>
  <text x="181" y="159" text-anchor="middle" fill="#5070a0" font-size="7.5">요구사항 문서</text>
  <text x="181" y="170" text-anchor="middle" fill="#5070a0" font-size="7.5">추적 매트릭스</text>
  <text x="181" y="179" text-anchor="middle" fill="#3050a0" font-size="7">RTM</text>

  <rect x="248" y="145" width="102" height="36" rx="5" fill="#0e1430" opacity="0.7"/>
  <text x="299" y="159" text-anchor="middle" fill="#5070a0" font-size="7.5">프로젝트 범위</text>
  <text x="299" y="170" text-anchor="middle" fill="#5070a0" font-size="7.5">기술서(SOW)</text>

  <rect x="366" y="145" width="102" height="36" rx="5" fill="#0e2010" opacity="0.7"/>
  <text x="417" y="159" text-anchor="middle" fill="#40a060" font-size="7.5">WBS</text>
  <text x="417" y="170" text-anchor="middle" fill="#40a060" font-size="7.5">WBS 사전</text>
  <text x="417" y="179" text-anchor="middle" fill="#205030" font-size="7">범위 기준선</text>

  <rect x="484" y="145" width="102" height="36" rx="5" fill="#240e00" opacity="0.7"/>
  <text x="535" y="159" text-anchor="middle" fill="#c08030" font-size="7.5">인수된 인도물</text>
  <text x="535" y="170" text-anchor="middle" fill="#c08030" font-size="7.5">변경 요청</text>

  <rect x="602" y="145" width="106" height="36" rx="5" fill="#200e0e" opacity="0.7"/>
  <text x="655" y="159" text-anchor="middle" fill="#c04040" font-size="7.5">작업성과 정보</text>
  <text x="655" y="170" text-anchor="middle" fill="#c04040" font-size="7.5">변경 요청</text>
  <text x="655" y="179" text-anchor="middle" fill="#a03030" font-size="7">범위 기준선 업데이트</text>

  <!-- Product vs Project Scope panel -->
  <rect x="12" y="196" width="340" height="195" rx="10" fill="#12122a" opacity="0.85" stroke="#2a2a6a" stroke-width="1"/>
  <text x="182" y="214" text-anchor="middle" fill="#d0d0ff" font-size="11" font-weight="bold">제품 범위 vs 프로젝트 범위</text>
  <rect x="22"  y="221" width="152" height="160" rx="7" fill="#1a2060" opacity="0.8"/>
  <rect x="182" y="221" width="162" height="160" rx="7" fill="#1a3a20" opacity="0.8"/>
  <text x="98"  y="239" text-anchor="middle" fill="#7ab8ff" font-size="10" font-weight="bold">제품 범위</text>
  <text x="263" y="239" text-anchor="middle" fill="#7dff9a" font-size="10" font-weight="bold">프로젝트 범위</text>
  <text x="98"  y="253" text-anchor="middle" fill="#5080c0" font-size="8">Product Scope</text>
  <text x="263" y="253" text-anchor="middle" fill="#40a060" font-size="8">Project Scope</text>
  <text x="98"  y="272" text-anchor="middle" fill="#80a0e0" font-size="8">"무엇을 만드는가"</text>
  <text x="263" y="272" text-anchor="middle" fill="#60b080" font-size="8">"어떻게 만드는가"</text>
  <text x="98"  y="286" text-anchor="middle" fill="#6080c0" font-size="7.5">• 기능/기술 요구사항</text>
  <text x="263" y="286" text-anchor="middle" fill="#408060" font-size="7.5">• 관리 프로세스</text>
  <text x="98"  y="298" text-anchor="middle" fill="#6080c0" font-size="7.5">• 성능 특성</text>
  <text x="263" y="298" text-anchor="middle" fill="#408060" font-size="7.5">• 활동/작업</text>
  <text x="98"  y="310" text-anchor="middle" fill="#6080c0" font-size="7.5">• 인도물 명세</text>
  <text x="263" y="310" text-anchor="middle" fill="#408060" font-size="7.5">• 일정·자원·비용</text>
  <text x="98"  y="325" text-anchor="middle" fill="#4060a0" font-size="7.5">측정: 제품 요구사항</text>
  <text x="263" y="325" text-anchor="middle" fill="#306050" font-size="7.5">측정: 계획 대비 실적</text>
  <text x="98"  y="337" text-anchor="middle" fill="#4060a0" font-size="7.5">충족 여부로 완료 확인</text>
  <text x="263" y="337" text-anchor="middle" fill="#306050" font-size="7.5">(WBS 전 작업 완료=종료)</text>
  <rect x="22" y="349" width="322" height="24" rx="4" fill="#0a102a"/>
  <text x="182" y="365" text-anchor="middle" fill="#a0a0d0" font-size="8">⭐ 두 범위 모두 범위 기준선(Scope Baseline)에 반영 — WBS + SOW + 요구사항 문서</text>

  <!-- Scope Baseline diagram -->
  <rect x="370" y="196" width="338" height="195" rx="10" fill="#12122a" opacity="0.85" stroke="#2a2a6a" stroke-width="1"/>
  <text x="539" y="214" text-anchor="middle" fill="#d0d0ff" font-size="11" font-weight="bold">범위 기준선 (Scope Baseline)</text>
  <!-- 3 components -->
  <rect x="380" y="222" width="318" height="50" rx="7" fill="#1a2060" opacity="0.8"/>
  <text x="539" y="238" text-anchor="middle" fill="#7ab8ff" font-size="10" font-weight="bold">① 프로젝트 범위 기술서 (SOW)</text>
  <text x="539" y="252" text-anchor="middle" fill="#6080c0" font-size="8">주요 인도물, 가정사항, 제약사항, 포함/제외 범위 명시</text>
  <text x="539" y="264" text-anchor="middle" fill="#4060a0" font-size="7.5">Gold Plating 방지 기준선 역할</text>

  <rect x="380" y="278" width="318" height="50" rx="7" fill="#1a3a20" opacity="0.8"/>
  <text x="539" y="294" text-anchor="middle" fill="#7dff9a" font-size="10" font-weight="bold">② WBS (Work Breakdown Structure)</text>
  <text x="539" y="308" text-anchor="middle" fill="#40a060" font-size="8">인도물 중심의 계층적 분해 / 100% 법칙 적용</text>
  <text x="539" y="320" text-anchor="middle" fill="#208040" font-size="7.5">최하위 = 작업 패키지 → 활동 목록의 기반</text>

  <rect x="380" y="334" width="318" height="50" rx="7" fill="#3a2a10" opacity="0.8"/>
  <text x="539" y="350" text-anchor="middle" fill="#ffc070" font-size="10" font-weight="bold">③ WBS 사전 (WBS Dictionary)</text>
  <text x="539" y="364" text-anchor="middle" fill="#a08030" font-size="8">각 WBS 구성요소의 상세 설명: 담당자, 기간, 비용, 기준</text>
  <text x="539" y="378" text-anchor="middle" fill="#806020" font-size="7.5">작업 패키지 수준까지 정의 → 80시간 법칙</text>
</svg>
