<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#888"/>
    </marker>
    <marker id="arrB" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#f39c12" font-size="16" font-family="Arial,sans-serif" font-weight="bold">Day 13 — VPC 아키텍처 &amp; 네트워크 보안</text>
  <text x="360" y="46" text-anchor="middle" fill="#888" font-size="11" font-family="Arial,sans-serif">IP/CIDR · NAT · IGW · Security Group (Stateful) · NACL (Stateless) · VPN · Direct Connect</text>

  <!-- ── INTERNET ── -->
  <rect x="280" y="56" width="160" height="30" rx="7" fill="rgba(255,100,100,0.2)" stroke="#ff6464" stroke-width="1.5"/>
  <text x="360" y="75" text-anchor="middle" fill="#ff8080" font-size="12" font-family="Arial,sans-serif" font-weight="bold">🌐  인터넷</text>

  <!-- Arrow Down: Internet → IGW -->
  <line x1="360" y1="86" x2="360" y2="102" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── IGW ── -->
  <rect x="285" y="102" width="150" height="26" rx="5" fill="rgba(255,215,0,0.22)" stroke="#ffd700" stroke-width="1.5"/>
  <text x="360" y="119" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial,sans-serif" font-weight="bold">Internet Gateway (IGW)</text>

  <!-- Arrow Down: IGW → Public -->
  <line x1="360" y1="128" x2="360" y2="143" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- ── VPC outer boundary ── -->
  <rect x="28" y="140" width="664" height="340" rx="10" fill="none" stroke="rgba(108,99,255,0.35)" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="42" y="157" fill="rgba(108,99,255,0.7)" font-size="10" font-family="Arial,sans-serif" font-weight="bold">VPC — 10.0.0.0/16</text>

  <!-- NACL label (Public) -->
  <text x="600" y="157" text-anchor="end" fill="rgba(255,215,0,0.55)" font-size="9" font-family="Arial,sans-serif">NACL (Stateless · 서브넷 레벨)</text>

  <!-- ── PUBLIC SUBNET ── -->
  <rect x="40" y="162" width="640" height="78" rx="7" fill="rgba(255,215,0,0.06)" stroke="rgba(255,215,0,0.55)" stroke-width="1.5"/>
  <text x="52" y="177" fill="#ffd700" font-size="10" font-family="Arial,sans-serif" font-weight="bold">Public Subnet — 10.0.1.0/24  (라우팅: 0.0.0.0/0 → IGW)</text>

  <!-- ALB -->
  <rect x="55" y="183" width="130" height="48" rx="5" fill="rgba(255,215,0,0.16)" stroke="#ffd700" stroke-width="1"/>
  <text x="120" y="201" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial,sans-serif" font-weight="bold">ALB</text>
  <text x="120" y="215" text-anchor="middle" fill="#ccc" font-size="9" font-family="Arial,sans-serif">Application Load</text>
  <text x="120" y="226" text-anchor="middle" fill="#ccc" font-size="9" font-family="Arial,sans-serif">Balancer</text>

  <!-- Bastion -->
  <rect x="205" y="183" width="130" height="48" rx="5" fill="rgba(255,215,0,0.10)" stroke="rgba(255,215,0,0.6)" stroke-width="1"/>
  <text x="270" y="201" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial,sans-serif" font-weight="bold">Bastion Host</text>
  <text x="270" y="215" text-anchor="middle" fill="#ccc" font-size="9" font-family="Arial,sans-serif">SSH 단일 진입점</text>
  <text x="270" y="226" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">포트 22 허용</text>

  <!-- NAT GW -->
  <rect x="355" y="183" width="140" height="48" rx="5" fill="rgba(255,165,0,0.14)" stroke="rgba(255,165,0,0.7)" stroke-width="1"/>
  <text x="425" y="201" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial,sans-serif" font-weight="bold">NAT Gateway</text>
  <text x="425" y="215" text-anchor="middle" fill="#ccc" font-size="9" font-family="Arial,sans-serif">아웃바운드 단방향</text>
  <text x="425" y="226" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">(외부→내부 차단)</text>

  <!-- SG badge on public -->
  <rect x="512" y="183" width="155" height="48" rx="5" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.45)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="590" y="200" text-anchor="middle" fill="#00d4aa" font-size="10" font-family="Arial,sans-serif" font-weight="bold">Security Group</text>
  <text x="590" y="214" text-anchor="middle" fill="#00d4aa" font-size="9" font-family="Arial,sans-serif">Stateful (인스턴스 레벨)</text>
  <text x="590" y="226" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">Allow only · 응답 자동 허용</text>

  <!-- Arrows: IGW → ALB / NAT GW -->
  <line x1="340" y1="128" x2="155" y2="183" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="380" y1="128" x2="405" y2="183" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Arrow: ALB → Private -->
  <line x1="120" y1="231" x2="120" y2="262" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>
  <!-- Arrow: NAT GW → Private (outbound) -->
  <line x1="425" y1="231" x2="425" y2="262" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── PRIVATE SUBNET ── -->
  <rect x="40" y="260" width="640" height="78" rx="7" fill="rgba(108,99,255,0.07)" stroke="rgba(108,99,255,0.55)" stroke-width="1.5"/>
  <text x="52" y="276" fill="rgba(140,130,255,0.9)" font-size="10" font-family="Arial,sans-serif" font-weight="bold">Private Subnet — 10.0.2.0/24  (라우팅: 0.0.0.0/0 → NAT GW)</text>

  <!-- App Server 1 -->
  <rect x="55" y="282" width="148" height="48" rx="5" fill="rgba(108,99,255,0.22)" stroke="#6c63ff" stroke-width="1"/>
  <text x="129" y="302" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial,sans-serif" font-weight="bold">🖥  App Server #1</text>
  <text x="129" y="316" text-anchor="middle" fill="#ccc" font-size="9" font-family="Arial,sans-serif">AZ-a (ap-northeast-2a)</text>
  <text x="129" y="326" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">포트 8080 허용 (SG)</text>

  <!-- App Server 2 -->
  <rect x="218" y="282" width="148" height="48" rx="5" fill="rgba(108,99,255,0.18)" stroke="#6c63ff" stroke-width="1"/>
  <text x="292" y="302" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial,sans-serif" font-weight="bold">🖥  App Server #2</text>
  <text x="292" y="316" text-anchor="middle" fill="#ccc" font-size="9" font-family="Arial,sans-serif">AZ-b (ap-northeast-2b)</text>
  <text x="292" y="326" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">Multi-AZ HA 구성</text>

  <!-- Outbound note -->
  <rect x="382" y="282" width="180" height="48" rx="5" fill="rgba(255,165,0,0.07)" stroke="rgba(255,165,0,0.4)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="472" y="298" text-anchor="middle" fill="#ffaa44" font-size="9" font-family="Arial,sans-serif" font-weight="bold">아웃바운드 흐름</text>
  <text x="472" y="311" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial,sans-serif">패키지 업데이트 · API 호출</text>
  <text x="472" y="323" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial,sans-serif">Private → NAT GW → 인터넷</text>

  <!-- SG note for private -->
  <rect x="575" y="282" width="92" height="48" rx="5" fill="rgba(0,212,170,0.07)" stroke="rgba(0,212,170,0.35)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="621" y="298" text-anchor="middle" fill="#00d4aa" font-size="9" font-family="Arial,sans-serif">NACL + SG</text>
  <text x="621" y="311" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">심층 방어</text>
  <text x="621" y="323" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">Defense in Depth</text>

  <!-- Arrow: App → Data -->
  <line x1="129" y1="330" x2="129" y2="362" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="292" y1="330" x2="292" y2="362" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── DATA SUBNET ── -->
  <rect x="40" y="360" width="480" height="78" rx="7" fill="rgba(0,200,150,0.05)" stroke="rgba(0,200,150,0.45)" stroke-width="1.5"/>
  <text x="52" y="376" fill="#00d4aa" font-size="10" font-family="Arial,sans-serif" font-weight="bold">Data (Isolated) Subnet — 10.0.3.0/28  (인터넷 완전 격리)</text>

  <!-- RDS Primary -->
  <rect x="55" y="382" width="140" height="48" rx="5" fill="rgba(0,200,150,0.18)" stroke="#00d4aa" stroke-width="1"/>
  <text x="125" y="402" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial,sans-serif" font-weight="bold">🗄  RDS Primary</text>
  <text x="125" y="416" text-anchor="middle" fill="#ccc" font-size="9" font-family="Arial,sans-serif">MySQL / PostgreSQL</text>
  <text x="125" y="426" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">포트 3306 / 5432 (SG)</text>

  <!-- RDS Standby -->
  <rect x="210" y="382" width="140" height="48" rx="5" fill="rgba(0,200,150,0.10)" stroke="rgba(0,200,150,0.55)" stroke-width="1"/>
  <text x="280" y="402" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial,sans-serif" font-weight="bold">🗄  RDS Standby</text>
  <text x="280" y="416" text-anchor="middle" fill="#ccc" font-size="9" font-family="Arial,sans-serif">자동 Failover</text>
  <text x="280" y="426" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">Multi-AZ</text>

  <!-- ElastiCache -->
  <rect x="365" y="382" width="140" height="48" rx="5" fill="rgba(0,200,150,0.10)" stroke="rgba(0,200,150,0.45)" stroke-width="1"/>
  <text x="435" y="402" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial,sans-serif" font-weight="bold">⚡  ElastiCache</text>
  <text x="435" y="416" text-anchor="middle" fill="#ccc" font-size="9" font-family="Arial,sans-serif">Redis 캐시</text>
  <text x="435" y="426" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">포트 6379 (SG)</text>

  <!-- ── ONPREM CONNECTION ── -->
  <rect x="536" y="360" width="148" height="78" rx="7" fill="rgba(255,100,100,0.05)" stroke="rgba(255,100,100,0.4)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="610" y="378" text-anchor="middle" fill="rgba(255,130,130,0.9)" font-size="10" font-family="Arial,sans-serif" font-weight="bold">온프레미스 연결</text>
  <text x="610" y="392" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial,sans-serif">🔒 VPN</text>
  <text x="610" y="403" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">인터넷 암호화 터널</text>
  <text x="610" y="416" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial,sans-serif">⚡ Direct Connect</text>
  <text x="610" y="427" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">전용 물리 회선</text>
  <text x="610" y="436" text-anchor="middle" fill="#888" font-size="8" font-family="Arial,sans-serif">(SLA 99.9%+ 요건)</text>

  <!-- ── LEGEND / SUMMARY ── -->
  <rect x="28" y="448" width="664" height="60" rx="6" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <rect x="40" y="458" width="10" height="10" rx="2" fill="rgba(255,215,0,0.6)"/>
  <text x="54" y="467" fill="#ffd700" font-size="9" font-family="Arial,sans-serif" font-weight="bold">Public Subnet</text>
  <text x="54" y="478" fill="#888" font-size="8" font-family="Arial,sans-serif">IGW 통해 인터넷 공개</text>

  <rect x="175" y="458" width="10" height="10" rx="2" fill="rgba(108,99,255,0.6)"/>
  <text x="189" y="467" fill="#8b82ff" font-size="9" font-family="Arial,sans-serif" font-weight="bold">Private Subnet</text>
  <text x="189" y="478" fill="#888" font-size="8" font-family="Arial,sans-serif">NAT GW 아웃바운드만</text>

  <rect x="320" y="458" width="10" height="10" rx="2" fill="rgba(0,200,150,0.6)"/>
  <text x="334" y="467" fill="#00d4aa" font-size="9" font-family="Arial,sans-serif" font-weight="bold">Data Subnet</text>
  <text x="334" y="478" fill="#888" font-size="8" font-family="Arial,sans-serif">인터넷 완전 격리</text>

  <text x="450" y="463" fill="#00d4aa" font-size="9" font-family="Arial,sans-serif" font-weight="bold">Security Group</text>
  <text x="450" y="475" fill="#888" font-size="8" font-family="Arial,sans-serif">Stateful · Allow only · 인스턴스</text>

  <text x="578" y="463" fill="rgba(255,215,0,0.7)" font-size="9" font-family="Arial,sans-serif" font-weight="bold">NACL</text>
  <text x="578" y="475" fill="#888" font-size="8" font-family="Arial,sans-serif">Stateless · Allow+Deny · 서브넷</text>

  <!-- CIDR reference row -->
  <text x="40" y="497" fill="#666" font-size="8" font-family="Arial,sans-serif">/16=65,534 hosts  |  /24=254  |  /28=14  |  /32=단일 IP  |  10.x/172.16.x/192.168.x = 사설 IP (인터넷 직접 접근 불가)</text>
</svg>
