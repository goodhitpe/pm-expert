<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 520" width="580" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="580" height="520" fill="url(#bg)" rx="12"/>
  <text x="290" y="28" text-anchor="middle" fill="#f39c12" font-size="16" font-family="Arial,sans-serif" font-weight="bold">Day 11 — 이해관계자 Power-Interest Grid</text>

  <!-- Axes -->
  <line x1="70" y1="60" x2="70" y2="420" stroke="#666" stroke-width="2"/>
  <line x1="70" y1="420" x2="540" y2="420" stroke="#666" stroke-width="2"/>

  <!-- Arrow tips -->
  <polygon points="70,56 63,72 77,72" fill="#666"/>
  <polygon points="544,420 528,413 528,427" fill="#666"/>

  <!-- Axis labels -->
  <text x="40" y="245" text-anchor="middle" fill="#aaa" font-size="12" font-family="Arial,sans-serif" transform="rotate(-90 40 245)">권력 (Power) ↑</text>
  <text x="305" y="448" text-anchor="middle" fill="#aaa" font-size="12" font-family="Arial,sans-serif">관심도 (Interest) →</text>

  <!-- Low/High labels -->
  <text x="63" y="420" text-anchor="end" fill="#888" font-size="10">낮음</text>
  <text x="63" y="66" text-anchor="end" fill="#888" font-size="10">높음</text>
  <text x="75" y="435" text-anchor="start" fill="#888" font-size="10">낮음</text>
  <text x="530" y="435" text-anchor="end" fill="#888" font-size="10">높음</text>

  <!-- Center line -->
  <line x1="305" y1="60" x2="305" y2="420" stroke="#444" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="70" y1="240" x2="540" y2="240" stroke="#444" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Quadrant backgrounds -->
  <rect x="70" y="240" width="235" height="180" fill="rgba(0,212,170,0.06)"/>
  <rect x="305" y="240" width="235" height="180" fill="rgba(243,156,18,0.06)"/>
  <rect x="70" y="60" width="235" height="180" fill="rgba(231,76,60,0.06)"/>
  <rect x="305" y="60" width="235" height="180" fill="rgba(108,99,255,0.15)"/>

  <!-- Quadrant labels -->
  <text x="187" y="315" text-anchor="middle" fill="#00d4aa" font-size="13" font-family="Arial,sans-serif" font-weight="bold">모니터링</text>
  <text x="187" y="332" text-anchor="middle" fill="#888" font-size="9">Keep Informed</text>
  <text x="187" y="348" text-anchor="middle" fill="#888" font-size="8">(정기 보고)</text>

  <text x="422" y="315" text-anchor="middle" fill="#f39c12" font-size="13" font-family="Arial,sans-serif" font-weight="bold">만족 유지</text>
  <text x="422" y="332" text-anchor="middle" fill="#888" font-size="9">Keep Satisfied</text>
  <text x="422" y="348" text-anchor="middle" fill="#888" font-size="8">(주요 보고)</text>

  <text x="187" y="140" text-anchor="middle" fill="#e74c3c" font-size="13" font-family="Arial,sans-serif" font-weight="bold">최소 관리</text>
  <text x="187" y="157" text-anchor="middle" fill="#888" font-size="9">Monitor (Minimum)</text>
  <text x="187" y="173" text-anchor="middle" fill="#888" font-size="8">(필요 시만)</text>

  <text x="422" y="130" text-anchor="middle" fill="#9b59b6" font-size="13" font-family="Arial,sans-serif" font-weight="bold">긴밀 관리</text>
  <text x="422" y="147" text-anchor="middle" fill="#888" font-size="9">Manage Closely</text>
  <text x="422" y="163" text-anchor="middle" fill="#888" font-size="8">(최우선)</text>

  <!-- Stakeholder nodes -->
  <!-- CEO: High Power, High Interest -->
  <circle cx="460" cy="90" r="22" fill="#9b59b6" stroke="white" stroke-width="1.5"/>
  <text x="460" y="87" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif" font-weight="bold">CEO</text>
  <text x="460" y="99" text-anchor="middle" fill="white" font-size="7">후원자</text>

  <!-- Project Sponsor: High Power, High Interest -->
  <circle cx="390" cy="110" r="22" fill="#6c63ff" stroke="white" stroke-width="1.5"/>
  <text x="390" y="107" text-anchor="middle" fill="white" font-size="8" font-family="Arial,sans-serif" font-weight="bold">스폰서</text>
  <text x="390" y="119" text-anchor="middle" fill="white" font-size="7">Sponsor</text>

  <!-- End User: Low Power, High Interest -->
  <circle cx="440" cy="290" r="22" fill="#f39c12" stroke="white" stroke-width="1.5"/>
  <text x="440" y="287" text-anchor="middle" fill="white" font-size="8" font-family="Arial,sans-serif" font-weight="bold">사용자</text>
  <text x="440" y="299" text-anchor="middle" fill="white" font-size="7">End User</text>

  <!-- IT Dept: Low Power, High Interest -->
  <circle cx="360" cy="310" r="22" fill="#e67e22" stroke="white" stroke-width="1.5"/>
  <text x="360" y="307" text-anchor="middle" fill="white" font-size="8" font-family="Arial,sans-serif" font-weight="bold">IT팀</text>
  <text x="360" y="319" text-anchor="middle" fill="white" font-size="7">Team</text>

  <!-- Regulator: High Power, Low Interest -->
  <circle cx="180" cy="100" r="22" fill="#e74c3c" stroke="white" stroke-width="1.5"/>
  <text x="180" y="97" text-anchor="middle" fill="white" font-size="8" font-family="Arial,sans-serif" font-weight="bold">규제기관</text>
  <text x="180" y="109" text-anchor="middle" fill="white" font-size="7">Regulator</text>

  <!-- Media: Low Power, Low Interest -->
  <circle cx="140" cy="340" r="18" fill="rgba(255,255,255,0.3)" stroke="#888" stroke-width="1.5"/>
  <text x="140" y="337" text-anchor="middle" fill="#e0e0e0" font-size="8" font-family="Arial,sans-serif" font-weight="bold">언론</text>
  <text x="140" y="349" text-anchor="middle" fill="#888" font-size="7">Media</text>

  <!-- Strategy note -->
  <rect x="70" y="462" width="440" height="46" rx="6" fill="rgba(108,99,255,0.1)" stroke="#6c63ff" stroke-width="1"/>
  <text x="290" y="476" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial,sans-serif" font-weight="bold">Salience Model 확장: 권력(Power) + 긴급성(Urgency) + 정당성(Legitimacy)</text>
  <text x="290" y="492" text-anchor="middle" fill="#aaa" font-size="9" font-family="Arial,sans-serif">3가지 모두 가진 이해관계자 = Definitive Stakeholder (반드시 최우선 관리)</text>
</svg>
