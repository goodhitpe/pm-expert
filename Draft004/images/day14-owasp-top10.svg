<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="460" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="33" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">Day 14 — OWASP Top 10 (2021)</text>
  <text x="360" y="52" text-anchor="middle" fill="#9090c0" font-size="11">PM이 알아야 할 웹 애플리케이션 상위 10대 보안 취약점</text>

  <!-- 10 items in 2 columns -->
  <!-- Left column (1-5) -->
  <rect x="25" y="65" width="335" height="52" rx="8" fill="#3a1a1a" opacity="0.85" stroke="#cc4040" stroke-width="1.5"/>
  <text x="45" y="84"  fill="#ff6060" font-size="12" font-weight="bold">A01 — 접근 제어 취약점</text>
  <text x="45" y="100" fill="#e0a0a0" font-size="10">권한 없는 사용자가 인증된 척 기능 접근</text>
  <text x="45" y="113" fill="#ff9898" font-size="9">예) URL 조작으로 타인 계정 열람</text>

  <rect x="25" y="124" width="335" height="52" rx="8" fill="#3a2a1a" opacity="0.85" stroke="#cc7a2a" stroke-width="1.5"/>
  <text x="45" y="143" fill="#ff9840" font-size="12" font-weight="bold">A02 — 암호화 실패</text>
  <text x="45" y="159" fill="#e0c0a0" font-size="10">중요 데이터 평문 전송 또는 취약 알고리즘 사용</text>
  <text x="45" y="172" fill="#ffa060" font-size="9">예) HTTP로 비밀번호 전송, MD5 해시 사용</text>

  <rect x="25" y="183" width="335" height="52" rx="8" fill="#2a2a1a" opacity="0.85" stroke="#cccc2a" stroke-width="1.5"/>
  <text x="45" y="202" fill="#ffff60" font-size="12" font-weight="bold">A03 — 인젝션 (Injection)</text>
  <text x="45" y="218" fill="#e0e0a0" font-size="10">신뢰할 수 없는 데이터를 명령어에 삽입</text>
  <text x="45" y="231" fill="#ffff80" font-size="9">예) SQL Injection, XSS, Command Injection</text>

  <rect x="25" y="242" width="335" height="52" rx="8" fill="#1a2a3a" opacity="0.85" stroke="#2a7acc" stroke-width="1.5"/>
  <text x="45" y="261" fill="#60b0ff" font-size="12" font-weight="bold">A04 — 안전하지 않은 설계</text>
  <text x="45" y="277" fill="#a0c8e8" font-size="10">보안을 고려하지 않은 아키텍처 / 비즈니스 로직 결함</text>
  <text x="45" y="290" fill="#80b8ff" font-size="9">예) 인증 없는 API, 재사용 가능한 비번 초기화 링크</text>

  <rect x="25" y="301" width="335" height="52" rx="8" fill="#1a3a2a" opacity="0.85" stroke="#2acc7a" stroke-width="1.5"/>
  <text x="45" y="320" fill="#60ff90" font-size="12" font-weight="bold">A05 — 보안 설정 오류</text>
  <text x="45" y="336" fill="#a0e8c0" font-size="10">기본값 유지, 불필요 기능 활성화, 에러 메시지 노출</text>
  <text x="45" y="349" fill="#80f0a0" font-size="9">예) admin/admin 기본 계정, 상세 스택 오류 노출</text>

  <!-- Right column (6-10) -->
  <rect x="375" y="65" width="320" height="52" rx="8" fill="#2a1a3a" opacity="0.85" stroke="#8a2acc" stroke-width="1.5"/>
  <text x="395" y="84"  fill="#c070f0" font-size="12" font-weight="bold">A06 — 취약한 컴포넌트</text>
  <text x="395" y="100" fill="#d0a0e8" font-size="10">패치되지 않은 라이브러리·프레임워크 사용</text>
  <text x="395" y="113" fill="#b080d0" font-size="9">예) Log4Shell, 오래된 Spring Boot 버전</text>

  <rect x="375" y="124" width="320" height="52" rx="8" fill="#3a1a2a" opacity="0.85" stroke="#cc2a6a" stroke-width="1.5"/>
  <text x="395" y="143" fill="#ff60a0" font-size="12" font-weight="bold">A07 — 인증·세션 관리 실패</text>
  <text x="395" y="159" fill="#e0a0c0" font-size="10">취약한 비밀번호, 세션 탈취, 무제한 로그인 시도</text>
  <text x="395" y="172" fill="#ff90b8" font-size="9">예) 브루트포스 허용, 세션 만료 없음</text>

  <rect x="375" y="183" width="320" height="52" rx="8" fill="#1a3a3a" opacity="0.85" stroke="#2acccc" stroke-width="1.5"/>
  <text x="395" y="202" fill="#60f0f0" font-size="12" font-weight="bold">A08 — 소프트웨어·데이터 무결성 실패</text>
  <text x="395" y="218" fill="#a0e8e8" font-size="10">업데이트·CI/CD 파이프라인 무결성 검증 없음</text>
  <text x="395" y="231" fill="#80e8e8" font-size="9">예) 서명 없는 npm 패키지, 악성 의존성 주입</text>

  <rect x="375" y="242" width="320" height="52" rx="8" fill="#3a3a1a" opacity="0.85" stroke="#cccc2a" stroke-width="1.5"/>
  <text x="395" y="261" fill="#f0f060" font-size="12" font-weight="bold">A09 — 보안 로깅·모니터링 실패</text>
  <text x="395" y="277" fill="#e0e0a0" font-size="10">침해 사고를 탐지·대응할 로깅 체계 부재</text>
  <text x="395" y="290" fill="#f0f080" font-size="9">예) 로그인 실패 무기록, 경보 알림 없음</text>

  <rect x="375" y="301" width="320" height="52" rx="8" fill="#1a2a4a" opacity="0.85" stroke="#2a5acc" stroke-width="1.5"/>
  <text x="395" y="320" fill="#6090ff" font-size="12" font-weight="bold">A10 — SSRF (서버측 요청 위조)</text>
  <text x="395" y="336" fill="#a0c0f0" font-size="10">서버가 공격자가 지정한 URL로 요청 전송</text>
  <text x="395" y="349" fill="#80a8ff" font-size="9">예) 내부망 메타데이터 서버 접근, AWS EC2 IMDS</text>

  <!-- Bottom: PM action guide -->
  <rect x="25" y="365" width="670" height="75" rx="10" fill="#0f1a3a" opacity="0.9" stroke="#2a3a6a" stroke-width="1"/>
  <text x="360" y="385" text-anchor="middle" fill="#a0b8e0" font-size="12" font-weight="bold">PM 보안 관리 체크리스트</text>
  <text x="45"  y="405" fill="#ff9898" font-size="10.5">✅ 취약점 스캔 계획을 WBS에 포함 (보안 스프린트)</text>
  <text x="45"  y="422" fill="#7dff9a" font-size="10.5">✅ 의존성 패키지 버전 관리 프로세스 수립 (SCA 도구)</text>
  <text x="380" y="405" fill="#80b8ff" font-size="10.5">✅ OWASP ASVS 요구사항 기반 보안 수용 기준 정의</text>
  <text x="380" y="422" fill="#ffcc80" font-size="10.5">✅ 침해 사고 대응 계획(IRP) 및 에스컬레이션 경로 준비</text>
  <text x="360" y="435" text-anchor="middle" fill="#6a6a9a" font-size="9">OWASP = Open Web Application Security Project | 2021년 최신 기준</text>
</svg>
