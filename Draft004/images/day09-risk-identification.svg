<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="460" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">리스크 식별 기법 비교</text>
  <text x="360" y="50" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">프로젝트 리스크를 체계적으로 식별하는 3가지 핵심 기법</text>

  <!-- Card 1: Brainstorming -->
  <rect x="28" y="66" width="208" height="300" rx="8" fill="#1a3a1a" stroke="#22c55e" stroke-width="2"/>
  <rect x="28" y="66" width="208" height="40" rx="8" fill="#14532d"/>
  <text x="132" y="82" font-family="Arial" font-size="24" text-anchor="middle">🧠</text>
  <text x="132" y="100" font-family="Arial" font-size="13" font-weight="bold" fill="#4ade80" text-anchor="middle">브레인스토밍</text>
  <text x="132" y="114" font-family="Arial" font-size="9" fill="#86efac" text-anchor="middle">Brainstorming</text>

  <text x="44" y="136" font-family="Arial" font-size="11" font-weight="bold" fill="#e2e8f0">방법</text>
  <text x="44" y="152" font-family="Arial" font-size="10" fill="#cbd5e1">다양한 이해관계자 참여</text>
  <text x="44" y="166" font-family="Arial" font-size="10" fill="#cbd5e1">자유로운 아이디어 발산</text>
  <text x="44" y="180" font-family="Arial" font-size="10" fill="#cbd5e1">비판 없이 최대한 열거</text>

  <line x1="40" y1="188" x2="228" y2="188" stroke="#334155" stroke-width="0.5"/>
  <text x="44" y="204" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80">✓ 장점</text>
  <text x="44" y="220" font-family="Arial" font-size="10" fill="#cbd5e1">• 다양한 관점 수집 가능</text>
  <text x="44" y="234" font-family="Arial" font-size="10" fill="#cbd5e1">• 빠른 진행 (수 시간)</text>
  <text x="44" y="248" font-family="Arial" font-size="10" fill="#cbd5e1">• 팀 참여 의식 향상</text>

  <line x1="40" y1="256" x2="228" y2="256" stroke="#334155" stroke-width="0.5"/>
  <text x="44" y="272" font-family="Arial" font-size="11" font-weight="bold" fill="#f87171">✗ 단점</text>
  <text x="44" y="288" font-family="Arial" font-size="10" fill="#cbd5e1">• 지배적 의견에 동조</text>
  <text x="44" y="302" font-family="Arial" font-size="10" fill="#cbd5e1">• 전문성 낮은 참여자</text>
  <text x="44" y="316" font-family="Arial" font-size="10" fill="#cbd5e1">• 후속 분석 별도 필요</text>

  <rect x="40" y="328" width="188" height="28" rx="4" fill="#1e2a1e" stroke="#22c55e" stroke-width="0.5"/>
  <text x="134" y="347" font-family="Arial" font-size="10" fill="#86efac" text-anchor="middle">적합: 초기 단계 / 창의적 팀</text>

  <!-- Card 2: Delphi -->
  <rect x="256" y="66" width="208" height="300" rx="8" fill="#1e1a3a" stroke="#a855f7" stroke-width="2"/>
  <rect x="256" y="66" width="208" height="40" rx="8" fill="#2e1065"/>
  <text x="360" y="82" font-family="Arial" font-size="24" text-anchor="middle">🎯</text>
  <text x="360" y="100" font-family="Arial" font-size="13" font-weight="bold" fill="#c4b5fd" text-anchor="middle">델파이 기법</text>
  <text x="360" y="114" font-family="Arial" font-size="9" fill="#a78bfa" text-anchor="middle">Delphi Technique</text>

  <text x="272" y="136" font-family="Arial" font-size="11" font-weight="bold" fill="#e2e8f0">방법</text>
  <text x="272" y="152" font-family="Arial" font-size="10" fill="#cbd5e1">전문가 익명 설문 반복</text>
  <text x="272" y="166" font-family="Arial" font-size="10" fill="#cbd5e1">결과 공유 후 재설문</text>
  <text x="272" y="180" font-family="Arial" font-size="10" fill="#cbd5e1">합의점 도달까지 반복</text>

  <line x1="268" y1="188" x2="456" y2="188" stroke="#334155" stroke-width="0.5"/>
  <text x="272" y="204" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd">✓ 장점</text>
  <text x="272" y="220" font-family="Arial" font-size="10" fill="#cbd5e1">• 전문가 합의 도출</text>
  <text x="272" y="234" font-family="Arial" font-size="10" fill="#cbd5e1">• 익명성으로 편견 최소화</text>
  <text x="272" y="248" font-family="Arial" font-size="10" fill="#cbd5e1">• 높은 신뢰도</text>

  <line x1="268" y1="256" x2="456" y2="256" stroke="#334155" stroke-width="0.5"/>
  <text x="272" y="272" font-family="Arial" font-size="11" font-weight="bold" fill="#f87171">✗ 단점</text>
  <text x="272" y="288" font-family="Arial" font-size="10" fill="#cbd5e1">• 시간 소요 많음</text>
  <text x="272" y="302" font-family="Arial" font-size="10" fill="#cbd5e1">• 전문가 섭외 어려움</text>
  <text x="272" y="316" font-family="Arial" font-size="10" fill="#cbd5e1">• 비용 증가 가능</text>

  <rect x="268" y="328" width="188" height="28" rx="4" fill="#1e1a2e" stroke="#a855f7" stroke-width="0.5"/>
  <text x="362" y="347" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">적합: 복잡한 R&amp;D / 전략 과제</text>

  <!-- Card 3: Checklist -->
  <rect x="484" y="66" width="208" height="300" rx="8" fill="#1a2a3a" stroke="#3b82f6" stroke-width="2"/>
  <rect x="484" y="66" width="208" height="40" rx="8" fill="#1e3a5f"/>
  <text x="588" y="82" font-family="Arial" font-size="24" text-anchor="middle">📋</text>
  <text x="588" y="100" font-family="Arial" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">체크리스트 분석</text>
  <text x="588" y="114" font-family="Arial" font-size="9" fill="#60a5fa" text-anchor="middle">Checklist Analysis</text>

  <text x="500" y="136" font-family="Arial" font-size="11" font-weight="bold" fill="#e2e8f0">방법</text>
  <text x="500" y="152" font-family="Arial" font-size="10" fill="#cbd5e1">과거 유사 프로젝트 기반</text>
  <text x="500" y="166" font-family="Arial" font-size="10" fill="#cbd5e1">조직 리스크 DB 활용</text>
  <text x="500" y="180" font-family="Arial" font-size="10" fill="#cbd5e1">표준 리스크 목록 검토</text>

  <line x1="496" y1="188" x2="684" y2="188" stroke="#334155" stroke-width="0.5"/>
  <text x="500" y="204" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd">✓ 장점</text>
  <text x="500" y="220" font-family="Arial" font-size="10" fill="#cbd5e1">• 빠르고 체계적</text>
  <text x="500" y="234" font-family="Arial" font-size="10" fill="#cbd5e1">• 누락 리스크 방지</text>
  <text x="500" y="248" font-family="Arial" font-size="10" fill="#cbd5e1">• 경험 지식 재활용</text>

  <line x1="496" y1="256" x2="684" y2="256" stroke="#334155" stroke-width="0.5"/>
  <text x="500" y="272" font-family="Arial" font-size="11" font-weight="bold" fill="#f87171">✗ 단점</text>
  <text x="500" y="288" font-family="Arial" font-size="10" fill="#cbd5e1">• 신규 리스크 발견 한계</text>
  <text x="500" y="302" font-family="Arial" font-size="10" fill="#cbd5e1">• 과거 편향 가능성</text>
  <text x="500" y="316" font-family="Arial" font-size="10" fill="#cbd5e1">• 정기적 업데이트 필요</text>

  <rect x="496" y="328" width="188" height="28" rx="4" fill="#1a2030" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="590" y="347" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">적합: 반복 프로젝트 / 학습 조직</text>

  <!-- Bottom: Risk Register -->
  <rect x="28" y="382" width="664" height="72" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="360" y="400" font-family="Arial" font-size="12" font-weight="bold" fill="#e2e8f0" text-anchor="middle">■ 리스크 식별 산출물 — 리스크 등록부 (Risk Register)</text>

  <rect x="40" y="408" width="100" height="36" rx="4" fill="#1a3a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="90" y="424" font-family="Arial" font-size="10" fill="#4ade80" text-anchor="middle">리스크 ID</text>
  <text x="90" y="438" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">R-001, R-002...</text>

  <rect x="152" y="408" width="100" height="36" rx="4" fill="#1e2a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="202" y="424" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">리스크 설명</text>
  <text x="202" y="438" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">원인, 이벤트, 영향</text>

  <rect x="264" y="408" width="100" height="36" rx="4" fill="#3a1a1a" stroke="#ef4444" stroke-width="1"/>
  <text x="314" y="424" font-family="Arial" font-size="10" fill="#f87171" text-anchor="middle">P × I 점수</text>
  <text x="314" y="438" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">발생 가능성 × 영향</text>

  <rect x="376" y="408" width="100" height="36" rx="4" fill="#2e1065" stroke="#a855f7" stroke-width="1"/>
  <text x="426" y="424" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">대응 전략</text>
  <text x="426" y="438" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">회피/전가/감소/수용</text>

  <rect x="488" y="408" width="100" height="36" rx="4" fill="#2a1a06" stroke="#f97316" stroke-width="1"/>
  <text x="538" y="424" font-family="Arial" font-size="10" fill="#fb923c" text-anchor="middle">리스크 오너</text>
  <text x="538" y="438" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">담당자 지정</text>

  <rect x="600" y="408" width="80" height="36" rx="4" fill="#0f2a2a" stroke="#14b8a6" stroke-width="1"/>
  <text x="640" y="424" font-family="Arial" font-size="10" fill="#2dd4bf" text-anchor="middle">상태</text>
  <text x="640" y="438" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Open/Closed</text>
</svg>
