<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="380" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="33" text-anchor="middle" fill="#e0e0ff" font-size="17" font-weight="bold">Day 14 — 암호화 유형 비교</text>
  <text x="360" y="52" text-anchor="middle" fill="#9090c0" font-size="11">대칭키 · 비대칭키 · 해시 — 작동 방식과 PM 관점 적용</text>

  <!-- 3 column headers -->
  <rect x="30"  y="65" width="205" height="38" rx="8" fill="#1a4a2a" opacity="0.9"/>
  <text x="132" y="84"  text-anchor="middle" fill="#7dff9a" font-size="13" font-weight="bold">대칭키 암호화</text>
  <text x="132" y="98"  text-anchor="middle" fill="#90d090" font-size="10">Symmetric Key</text>

  <rect x="257" y="65" width="205" height="38" rx="8" fill="#1a2a6a" opacity="0.9"/>
  <text x="359" y="84"  text-anchor="middle" fill="#80b8ff" font-size="13" font-weight="bold">비대칭키 암호화</text>
  <text x="359" y="98"  text-anchor="middle" fill="#8090d0" font-size="10">Asymmetric / Public Key</text>

  <rect x="484" y="65" width="205" height="38" rx="8" fill="#4a1a1a" opacity="0.9"/>
  <text x="586" y="84"  text-anchor="middle" fill="#ff9898" font-size="13" font-weight="bold">해시 함수</text>
  <text x="586" y="98"  text-anchor="middle" fill="#d09090" font-size="10">Hash / One-way</text>

  <!-- Dividers -->
  <line x1="20"  y1="108" x2="700" y2="108" stroke="#4a4a7a" stroke-width="1"/>
  <line x1="237" y1="108" x2="237" y2="358" stroke="#4a4a7a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="464" y1="108" x2="464" y2="358" stroke="#4a4a7a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Row labels (left) -->
  <text x="22" y="132" fill="#9090b8" font-size="10">키 개수</text>
  <text x="22" y="163" fill="#9090b8" font-size="10">특징</text>
  <text x="22" y="210" fill="#9090b8" font-size="10">속도</text>
  <text x="22" y="242" fill="#9090b8" font-size="10">알고리즘</text>
  <text x="22" y="274" fill="#9090b8" font-size="10">주요 용도</text>
  <text x="22" y="316" fill="#9090b8" font-size="10">단점</text>

  <!-- Symmetric -->
  <text x="132" y="132" text-anchor="middle" fill="#7dff9a" font-size="11" font-weight="bold">1개 (공유 키)</text>
  <rect x="37"  y="140" width="188" height="38" rx="5" fill="#1a3a2a" opacity="0.7"/>
  <text x="131" y="155" text-anchor="middle" fill="#c0f0d0" font-size="10">암호화·복호화 동일 키</text>
  <text x="131" y="172" text-anchor="middle" fill="#c0f0d0" font-size="10">키 공유가 핵심 문제</text>
  <text x="132" y="210" text-anchor="middle" fill="#7dff9a" font-size="11">빠름 ✅</text>
  <text x="132" y="242" text-anchor="middle" fill="#a0e8b0" font-size="10">AES-256, DES, 3DES</text>
  <rect x="37"  y="255" width="188" height="35" rx="5" fill="#1a3a2a" opacity="0.7"/>
  <text x="131" y="268" text-anchor="middle" fill="#c0f0d0" font-size="10">데이터 저장/전송 암호화</text>
  <text x="131" y="282" text-anchor="middle" fill="#c0f0d0" font-size="10">디스크 암호화, AWS KMS</text>
  <text x="132" y="316" text-anchor="middle" fill="#ffcc80" font-size="10">키 배포 문제 (Key Exchange)</text>

  <!-- Asymmetric -->
  <text x="359" y="132" text-anchor="middle" fill="#80b8ff" font-size="11" font-weight="bold">2개 (공개/개인키)</text>
  <rect x="263" y="140" width="196" height="38" rx="5" fill="#1a2a4a" opacity="0.7"/>
  <text x="361" y="155" text-anchor="middle" fill="#c0d8f0" font-size="10">공개키로 암호화 →</text>
  <text x="361" y="172" text-anchor="middle" fill="#c0d8f0" font-size="10">개인키로만 복호화</text>
  <text x="359" y="210" text-anchor="middle" fill="#ff8888" font-size="11">느림 ⚠️</text>
  <text x="359" y="242" text-anchor="middle" fill="#a0c0e8" font-size="10">RSA, ECC, DSA</text>
  <rect x="263" y="255" width="196" height="35" rx="5" fill="#1a2a4a" opacity="0.7"/>
  <text x="361" y="268" text-anchor="middle" fill="#c0d8f0" font-size="10">키 교환, 디지털 서명</text>
  <text x="361" y="282" text-anchor="middle" fill="#c0d8f0" font-size="10">TLS 핸드셰이크, HTTPS</text>
  <text x="359" y="316" text-anchor="middle" fill="#ffcc80" font-size="10">대용량 데이터 암호화 부적합</text>

  <!-- Hash -->
  <text x="586" y="132" text-anchor="middle" fill="#ff9898" font-size="11" font-weight="bold">키 없음 (단방향)</text>
  <rect x="490" y="140" width="188" height="38" rx="5" fill="#3a1a1a" opacity="0.7"/>
  <text x="584" y="155" text-anchor="middle" fill="#f0c0c0" font-size="10">입력 → 고정길이 출력</text>
  <text x="584" y="172" text-anchor="middle" fill="#f0c0c0" font-size="10">복호화 불가 (단방향)</text>
  <text x="586" y="210" text-anchor="middle" fill="#7dff9a" font-size="11">매우 빠름 ✅</text>
  <text x="586" y="242" text-anchor="middle" fill="#e8b0b0" font-size="10">SHA-256, SHA-3, bcrypt</text>
  <rect x="490" y="255" width="188" height="35" rx="5" fill="#3a1a1a" opacity="0.7"/>
  <text x="584" y="268" text-anchor="middle" fill="#f0c0c0" font-size="10">패스워드 저장, 무결성 검증</text>
  <text x="584" y="282" text-anchor="middle" fill="#f0c0c0" font-size="10">전자서명, 블록체인</text>
  <text x="586" y="316" text-anchor="middle" fill="#ffcc80" font-size="10">충돌(Collision) 가능성 주의</text>

  <!-- Footer note -->
  <rect x="30" y="330" width="660" height="34" rx="8" fill="#0f1a3a" opacity="0.9" stroke="#2a3a6a" stroke-width="1"/>
  <text x="360" y="346" text-anchor="middle" fill="#a0b8e0" font-size="11" font-weight="bold">실무 조합: TLS = 비대칭키(키 교환) + 대칭키(데이터 암호화) + 해시(무결성)</text>
  <text x="360" y="361" text-anchor="middle" fill="#6a6a9a" font-size="10">PM 관점: "어떤 데이터를, 누구와 공유하는가"에 따라 암호화 전략이 달라집니다</text>
</svg>
