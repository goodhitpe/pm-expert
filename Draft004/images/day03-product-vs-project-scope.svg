<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="12"/>

  <text x="360" y="26" text-anchor="middle" fill="#e0e0ff" font-size="14" font-weight="bold">요구사항 수집 기법 + 추적 매트릭스(RTM)</text>
  <text x="360" y="43" text-anchor="middle" fill="#9090c0" font-size="9.5">Collect Requirements — 도구 5가지 + 비즈니스 니즈 → 기술 요구사항 흐름</text>

  <!-- 5 techniques -->
  <text x="184" y="63" text-anchor="middle" fill="#a0a0e0" font-size="10" font-weight="bold">요구사항 수집 5대 기법</text>

  <!-- T1: Interview -->
  <rect x="12"  y="72" width="126" height="82" rx="8" fill="#1a2a5c" opacity="0.85" stroke="#4a6adc" stroke-width="1.2"/>
  <text x="75" y="90"  text-anchor="middle" fill="#7ab8ff" font-size="9.5" font-weight="bold">① 인터뷰</text>
  <text x="75" y="104" text-anchor="middle" fill="#5070a0" font-size="7.5">Interview</text>
  <text x="75" y="118" text-anchor="middle" fill="#80a0e0" font-size="7.5">• 1:1 ∙ 그룹</text>
  <text x="75" y="130" text-anchor="middle" fill="#80a0e0" font-size="7.5">• 개방형/폐쇄형 질문</text>
  <text x="75" y="142" text-anchor="middle" fill="#80a0e0" font-size="7.5">• 고위 이해관계자</text>
  <text x="75" y="150" text-anchor="middle" fill="#3050a0" font-size="7">우선 → 심층 파악</text>

  <!-- T2: Focus Group -->
  <rect x="148" y="72" width="126" height="82" rx="8" fill="#1a3a2a" opacity="0.85" stroke="#2a9a5a" stroke-width="1.2"/>
  <text x="211" y="90"  text-anchor="middle" fill="#7dff9a" font-size="9.5" font-weight="bold">② 포커스 그룹</text>
  <text x="211" y="104" text-anchor="middle" fill="#40a060" font-size="7.5">Focus Group</text>
  <text x="211" y="118" text-anchor="middle" fill="#60c080" font-size="7.5">• 동질 그룹 토론</text>
  <text x="211" y="130" text-anchor="middle" fill="#60c080" font-size="7.5">• 훈련된 진행자</text>
  <text x="211" y="142" text-anchor="middle" fill="#60c080" font-size="7.5">• 잠재 요구사항</text>
  <text x="211" y="150" text-anchor="middle" fill="#205030" font-size="7">발굴에 효과적</text>

  <!-- T3: Workshops -->
  <rect x="284" y="72" width="126" height="82" rx="8" fill="#3a2a10" opacity="0.85" stroke="#ca8a2a" stroke-width="1.2"/>
  <text x="347" y="90"  text-anchor="middle" fill="#ffc070" font-size="9.5" font-weight="bold">③ 촉진 워크숍</text>
  <text x="347" y="104" text-anchor="middle" fill="#a06020" font-size="7.5">Facilitated Workshop</text>
  <text x="347" y="118" text-anchor="middle" fill="#d09050" font-size="7.5">• JAD / QFD</text>
  <text x="347" y="130" text-anchor="middle" fill="#d09050" font-size="7.5">• 이해관계자 협업</text>
  <text x="347" y="142" text-anchor="middle" fill="#d09050" font-size="7.5">• 신속 결정</text>
  <text x="347" y="150" text-anchor="middle" fill="#804010" font-size="7">상충 조기 해소</text>

  <!-- T4: Surveys -->
  <rect x="420" y="72" width="126" height="82" rx="8" fill="#3a1a1a" opacity="0.85" stroke="#9a2a2a" stroke-width="1.2"/>
  <text x="483" y="90"  text-anchor="middle" fill="#ffb0b0" font-size="9.5" font-weight="bold">④ 설문/관찰</text>
  <text x="483" y="104" text-anchor="middle" fill="#c04040" font-size="7.5">Surveys / Observation</text>
  <text x="483" y="118" text-anchor="middle" fill="#e08080" font-size="7.5">• 대규모 응답자</text>
  <text x="483" y="130" text-anchor="middle" fill="#e08080" font-size="7.5">• Job Shadowing</text>
  <text x="483" y="142" text-anchor="middle" fill="#e08080" font-size="7.5">• Questionnaire</text>
  <text x="483" y="150" text-anchor="middle" fill="#a03030" font-size="7">암묵 요구사항 발굴</text>

  <!-- T5: Prototyping -->
  <rect x="556" y="72" width="152" height="82" rx="8" fill="#2a1a5c" opacity="0.85" stroke="#6a3acc" stroke-width="1.2"/>
  <text x="632" y="90"  text-anchor="middle" fill="#c084f5" font-size="9.5" font-weight="bold">⑤ 프로토타이핑</text>
  <text x="632" y="104" text-anchor="middle" fill="#8060c0" font-size="7.5">Prototyping</text>
  <text x="632" y="118" text-anchor="middle" fill="#a080d0" font-size="7.5">• 와이어프레임</text>
  <text x="632" y="130" text-anchor="middle" fill="#a080d0" font-size="7.5">• 목업(Mockup)</text>
  <text x="632" y="142" text-anchor="middle" fill="#a080d0" font-size="7.5">• 빠른 피드백</text>
  <text x="632" y="150" text-anchor="middle" fill="#604090" font-size="7">요구사항 명확화</text>

  <!-- RTM section -->
  <rect x="12" y="168" width="696" height="118" rx="10" fill="#12122a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
  <text x="360" y="186" text-anchor="middle" fill="#d0d0ff" font-size="11" font-weight="bold">요구사항 추적 매트릭스 (RTM — Requirements Traceability Matrix)</text>

  <!-- RTM table header -->
  <rect x="22"  y="194" width="80" height="22" rx="3" fill="#1a2060"/>
  <rect x="106" y="194" width="96" height="22" rx="3" fill="#1a2060"/>
  <rect x="206" y="194" width="100" height="22" rx="3" fill="#1a2060"/>
  <rect x="310" y="194" width="80" height="22" rx="3" fill="#1a2060"/>
  <rect x="394" y="194" width="80" height="22" rx="3" fill="#1a2060"/>
  <rect x="478" y="194" width="80" height="22" rx="3" fill="#1a2060"/>
  <rect x="562" y="194" width="138" height="22" rx="3" fill="#1a2060"/>
  <text x="62"  y="209" text-anchor="middle" fill="#7090c0" font-size="8" font-weight="bold">요구ID</text>
  <text x="154" y="209" text-anchor="middle" fill="#7090c0" font-size="8" font-weight="bold">비즈니스 니즈</text>
  <text x="256" y="209" text-anchor="middle" fill="#7090c0" font-size="8" font-weight="bold">기술 요구사항</text>
  <text x="350" y="209" text-anchor="middle" fill="#7090c0" font-size="8" font-weight="bold">설계 요소</text>
  <text x="434" y="209" text-anchor="middle" fill="#7090c0" font-size="8" font-weight="bold">개발 코드</text>
  <text x="518" y="209" text-anchor="middle" fill="#7090c0" font-size="8" font-weight="bold">테스트 케이스</text>
  <text x="631" y="209" text-anchor="middle" fill="#7090c0" font-size="8" font-weight="bold">우선순위/상태</text>

  <!-- RTM row 1 -->
  <rect x="22"  y="218" width="678" height="17" rx="2" fill="#0e1430" opacity="0.6"/>
  <text x="62"  y="230" text-anchor="middle" fill="#80a0d0" font-size="8">REQ-001</text>
  <text x="154" y="230" text-anchor="middle" fill="#80a0d0" font-size="7.5">빠른 로그인(3초↓)</text>
  <text x="256" y="230" text-anchor="middle" fill="#80a0d0" font-size="7.5">응답 시간 &lt;3s</text>
  <text x="350" y="230" text-anchor="middle" fill="#80a0d0" font-size="7.5">인증 모듈</text>
  <text x="434" y="230" text-anchor="middle" fill="#80a0d0" font-size="7.5">auth.py</text>
  <text x="518" y="230" text-anchor="middle" fill="#80a0d0" font-size="7.5">TC-Login-01</text>
  <text x="631" y="230" text-anchor="middle" fill="#7dff9a" font-size="7.5">High / 완료 ✓</text>

  <!-- RTM row 2 -->
  <text x="62"  y="247" text-anchor="middle" fill="#80a0d0" font-size="8">REQ-002</text>
  <text x="154" y="247" text-anchor="middle" fill="#80a0d0" font-size="7.5">결제 보안</text>
  <text x="256" y="247" text-anchor="middle" fill="#80a0d0" font-size="7.5">PCI-DSS 준수</text>
  <text x="350" y="247" text-anchor="middle" fill="#80a0d0" font-size="7.5">결제 게이트웨이</text>
  <text x="434" y="247" text-anchor="middle" fill="#80a0d0" font-size="7.5">payment.py</text>
  <text x="518" y="247" text-anchor="middle" fill="#80a0d0" font-size="7.5">TC-Pay-03</text>
  <text x="631" y="247" text-anchor="middle" fill="#ffa040" font-size="7.5">High / 진행 중 ⏳</text>

  <!-- RTM row 3 -->
  <rect x="22"  y="252" width="678" height="17" rx="2" fill="#0e1430" opacity="0.6"/>
  <text x="62"  y="264" text-anchor="middle" fill="#80a0d0" font-size="8">REQ-003</text>
  <text x="154" y="264" text-anchor="middle" fill="#80a0d0" font-size="7.5">다국어 지원</text>
  <text x="256" y="264" text-anchor="middle" fill="#80a0d0" font-size="7.5">3개 언어 이상</text>
  <text x="350" y="264" text-anchor="middle" fill="#80a0d0" font-size="7.5">i18n 모듈</text>
  <text x="434" y="264" text-anchor="middle" fill="#80a0d0" font-size="7.5">i18n.js</text>
  <text x="518" y="264" text-anchor="middle" fill="#80a0d0" font-size="7.5">TC-Lang-01</text>
  <text x="631" y="264" text-anchor="middle" fill="#c084f5" font-size="7.5">Med / 계획 🔲</text>

  <text x="360" y="279" text-anchor="middle" fill="#5060a0" font-size="7.5">※ RTM = 요구사항이 설계 → 개발 → 테스트까지 빠짐없이 구현되었는지 추적  |  범위 크리프 방지의 핵심 도구</text>

  <!-- Bottom: MoSCoW & Requirements types -->
  <rect x="12" y="296" width="345" height="96" rx="9" fill="#0e0e2a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
  <text x="184" y="313" text-anchor="middle" fill="#d0d0ff" font-size="10" font-weight="bold">비즈니스 요구사항 유형 분류</text>
  <rect x="22"  y="320" width="76" height="64" rx="5" fill="#1a2060" opacity="0.8"/>
  <rect x="106" y="320" width="76" height="64" rx="5" fill="#1a3a20" opacity="0.8"/>
  <rect x="190" y="320" width="76" height="64" rx="5" fill="#3a2a10" opacity="0.8"/>
  <rect x="272" y="320" width="76" height="64" rx="5" fill="#2a1a5c" opacity="0.8"/>
  <text x="60"  y="336" text-anchor="middle" fill="#7ab8ff" font-size="8.5" font-weight="bold">비즈니스</text>
  <text x="60"  y="348" text-anchor="middle" fill="#5070c0" font-size="7.5">조직 목표·</text>
  <text x="60"  y="358" text-anchor="middle" fill="#5070c0" font-size="7.5">이윤/기회</text>
  <text x="60"  y="370" text-anchor="middle" fill="#3050a0" font-size="7">WHY</text>
  <text x="60"  y="379" text-anchor="middle" fill="#3050a0" font-size="7">프로젝트 목적</text>
  <text x="144" y="336" text-anchor="middle" fill="#7dff9a" font-size="8.5" font-weight="bold">이해관계자</text>
  <text x="144" y="348" text-anchor="middle" fill="#40a060" font-size="7.5">개인 필요·</text>
  <text x="144" y="358" text-anchor="middle" fill="#40a060" font-size="7.5">원하는 것</text>
  <text x="144" y="370" text-anchor="middle" fill="#205030" font-size="7">WHO</text>
  <text x="144" y="379" text-anchor="middle" fill="#205030" font-size="7">관점별 요구</text>
  <text x="228" y="336" text-anchor="middle" fill="#ffc070" font-size="8.5" font-weight="bold">솔루션</text>
  <text x="228" y="348" text-anchor="middle" fill="#c08030" font-size="7.5">기능/비기능</text>
  <text x="228" y="358" text-anchor="middle" fill="#c08030" font-size="7.5">요구사항</text>
  <text x="228" y="370" text-anchor="middle" fill="#804010" font-size="7">WHAT</text>
  <text x="228" y="379" text-anchor="middle" fill="#804010" font-size="7">시스템 기능</text>
  <text x="310" y="336" text-anchor="middle" fill="#c084f5" font-size="8.5" font-weight="bold">전환</text>
  <text x="310" y="348" text-anchor="middle" fill="#8060c0" font-size="7.5">마이그레이션</text>
  <text x="310" y="358" text-anchor="middle" fill="#8060c0" font-size="7.5">교육 요구</text>
  <text x="310" y="370" text-anchor="middle" fill="#604090" font-size="7">HOW</text>
  <text x="310" y="379" text-anchor="middle" fill="#604090" font-size="7">전환 계획</text>

  <!-- MoSCoW -->
  <rect x="372" y="296" width="336" height="96" rx="9" fill="#0e0e2a" opacity="0.85" stroke="#2a2a5a" stroke-width="1"/>
  <text x="540" y="313" text-anchor="middle" fill="#d0d0ff" font-size="10" font-weight="bold">MoSCoW 우선순위 기법</text>
  <rect x="382" y="320" width="72" height="64" rx="5" fill="#3a1a1a" opacity="0.8"/>
  <rect x="462" y="320" width="72" height="64" rx="5" fill="#1a3a20" opacity="0.8"/>
  <rect x="542" y="320" width="72" height="64" rx="5" fill="#1a2a5c" opacity="0.8"/>
  <rect x="622" y="320" width="78" height="64" rx="5" fill="#1a1a2a" opacity="0.8"/>
  <text x="418"  y="336" text-anchor="middle" fill="#ff7070" font-size="10" font-weight="bold">Must</text>
  <text x="418"  y="348" text-anchor="middle" fill="#c05050" font-size="8">필수</text>
  <text x="418"  y="360" text-anchor="middle" fill="#c05050" font-size="7">없으면 실패</text>
  <text x="418"  y="372" text-anchor="middle" fill="#a03030" font-size="7">~40%</text>
  <text x="498"  y="336" text-anchor="middle" fill="#7dff9a" font-size="10" font-weight="bold">Should</text>
  <text x="498"  y="348" text-anchor="middle" fill="#40a060" font-size="8">중요</text>
  <text x="498"  y="360" text-anchor="middle" fill="#40a060" font-size="7">가능하면 포함</text>
  <text x="498"  y="372" text-anchor="middle" fill="#206030" font-size="7">~30%</text>
  <text x="578"  y="336" text-anchor="middle" fill="#7ab8ff" font-size="10" font-weight="bold">Could</text>
  <text x="578"  y="348" text-anchor="middle" fill="#5080c0" font-size="8">희망사항</text>
  <text x="578"  y="360" text-anchor="middle" fill="#5080c0" font-size="7">여유 시 구현</text>
  <text x="578"  y="372" text-anchor="middle" fill="#3050a0" font-size="7">~20%</text>
  <text x="661"  y="336" text-anchor="middle" fill="#9090c0" font-size="10" font-weight="bold">Won't</text>
  <text x="661"  y="348" text-anchor="middle" fill="#6060a0" font-size="8">이번엔 제외</text>
  <text x="661"  y="360" text-anchor="middle" fill="#6060a0" font-size="7">다음 버전</text>
  <text x="661"  y="372" text-anchor="middle" fill="#4040a0" font-size="7">~10%</text>
</svg>
