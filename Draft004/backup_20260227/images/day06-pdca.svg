<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" width="560" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="560" height="560" fill="url(#bg)" rx="12"/>
  <text x="280" y="30" text-anchor="middle" fill="#f39c12" font-size="17" font-family="Arial,sans-serif" font-weight="bold">Day 06 — PDCA 품질 사이클</text>

  <!-- Background circle -->
  <circle cx="280" cy="295" r="200" fill="none" stroke="#333" stroke-width="1"/>

  <!-- P — Plan (top-left) -->
  <path d="M 280 295 L 280 95 A 200 200 0 0 0 80 295 Z" fill="rgba(108,99,255,0.7)"/>
  <text x="175" y="195" text-anchor="middle" fill="white" font-size="26" font-family="Arial,sans-serif" font-weight="bold">P</text>
  <text x="175" y="218" text-anchor="middle" fill="white" font-size="14" font-family="Arial,sans-serif" font-weight="bold">PLAN</text>
  <text x="160" y="240" text-anchor="middle" fill="#ddd" font-size="10" font-family="Arial,sans-serif">품질 목표 설정</text>
  <text x="160" y="254" text-anchor="middle" fill="#ddd" font-size="10" font-family="Arial,sans-serif">프로세스 계획</text>

  <!-- D — Do (top-right) -->
  <path d="M 280 295 L 480 295 A 200 200 0 0 0 280 95 Z" fill="rgba(0,212,170,0.7)"/>
  <text x="385" y="195" text-anchor="middle" fill="white" font-size="26" font-family="Arial,sans-serif" font-weight="bold">D</text>
  <text x="385" y="218" text-anchor="middle" fill="white" font-size="14" font-family="Arial,sans-serif" font-weight="bold">DO</text>
  <text x="390" y="240" text-anchor="middle" fill="#ddd" font-size="10" font-family="Arial,sans-serif">계획 실행</text>
  <text x="390" y="254" text-anchor="middle" fill="#ddd" font-size="10" font-family="Arial,sans-serif">프로세스 수행</text>

  <!-- C — Check (bottom-right) -->
  <path d="M 280 295 L 280 495 A 200 200 0 0 0 480 295 Z" fill="rgba(243,156,18,0.7)"/>
  <text x="385" y="380" text-anchor="middle" fill="white" font-size="26" font-family="Arial,sans-serif" font-weight="bold">C</text>
  <text x="385" y="403" text-anchor="middle" fill="white" font-size="14" font-family="Arial,sans-serif" font-weight="bold">CHECK</text>
  <text x="390" y="425" text-anchor="middle" fill="#ddd" font-size="10" font-family="Arial,sans-serif">측정·분석</text>
  <text x="390" y="439" text-anchor="middle" fill="#ddd" font-size="10" font-family="Arial,sans-serif">편차 확인</text>

  <!-- A — Act (bottom-left) -->
  <path d="M 280 295 L 80 295 A 200 200 0 0 0 280 495 Z" fill="rgba(231,76,60,0.7)"/>
  <text x="175" y="380" text-anchor="middle" fill="white" font-size="26" font-family="Arial,sans-serif" font-weight="bold">A</text>
  <text x="175" y="403" text-anchor="middle" fill="white" font-size="14" font-family="Arial,sans-serif" font-weight="bold">ACT</text>
  <text x="160" y="425" text-anchor="middle" fill="#ddd" font-size="10" font-family="Arial,sans-serif">개선 조치</text>
  <text x="160" y="439" text-anchor="middle" fill="#ddd" font-size="10" font-family="Arial,sans-serif">표준화</text>

  <!-- Center -->
  <circle cx="280" cy="295" r="48" fill="#1e1e3f" stroke="#f39c12" stroke-width="2"/>
  <text x="280" y="289" text-anchor="middle" fill="#f39c12" font-size="12" font-family="Arial,sans-serif" font-weight="bold">지속적</text>
  <text x="280" y="305" text-anchor="middle" fill="#f39c12" font-size="12" font-family="Arial,sans-serif" font-weight="bold">개선</text>
  <text x="280" y="319" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">Deming Cycle</text>

  <!-- Rotation arrow -->
  <path d="M 280 91 A 204 204 0 0 1 487 299" stroke="#f39c12" stroke-width="2.5" fill="none" stroke-dasharray="10,5"/>
  <polygon points="487,299 494,285 479,286" fill="#f39c12"/>

  <!-- Bottom info -->
  <rect x="50" y="516" width="460" height="34" rx="6" fill="rgba(255,255,255,0.05)" stroke="#444" stroke-width="1"/>
  <text x="280" y="530" text-anchor="middle" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">QA (Quality Assurance) = P+D 단계 예방 활동 &nbsp;|&nbsp; QC (Quality Control) = C 단계 결함 발견 활동</text>
  <text x="280" y="545" text-anchor="middle" fill="#888" font-size="9" font-family="Arial,sans-serif">6시그마: DMAIC(Define-Measure-Analyze-Improve-Control) | 정품률 99.99966%</text>
</svg>
