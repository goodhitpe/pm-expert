<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 500" width="640" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="640" height="500" fill="url(#bg)" rx="12"/>
  <text x="320" y="30" text-anchor="middle" fill="#f39c12" font-size="16" font-family="Arial,sans-serif" font-weight="bold">Day 09 — 리스크 확률×영향도 매트릭스 (P-I Matrix)</text>

  <!-- Y-axis: Probability -->
  <text x="30" y="258" text-anchor="middle" fill="#888" font-size="12" font-family="Arial,sans-serif" transform="rotate(-90 30 258)">확률 (Probability) →</text>
  <text x="68" y="430" text-anchor="middle" fill="#888" font-size="9">매우낮음</text>
  <text x="68" y="354" text-anchor="middle" fill="#888" font-size="9">낮음</text>
  <text x="68" y="278" text-anchor="middle" fill="#888" font-size="9">중간</text>
  <text x="68" y="202" text-anchor="middle" fill="#888" font-size="9">높음</text>
  <text x="68" y="126" text-anchor="middle" fill="#888" font-size="9">매우높음</text>

  <!-- X-axis: Impact -->
  <text x="320" y="488" text-anchor="middle" fill="#888" font-size="12" font-family="Arial,sans-serif">영향도 (Impact) →</text>
  <text x="126" y="472" text-anchor="middle" fill="#888" font-size="9">매우낮음</text>
  <text x="202" y="472" text-anchor="middle" fill="#888" font-size="9">낮음</text>
  <text x="278" y="472" text-anchor="middle" fill="#888" font-size="9">중간</text>
  <text x="354" y="472" text-anchor="middle" fill="#888" font-size="9">높음</text>
  <text x="430" y="472" text-anchor="middle" fill="#888" font-size="9">매우높음</text>

  <!-- Matrix cells (5x5) -->
  <!-- Colors: low=green, medium=yellow, high=red -->
  <!-- Row 5 (Very High P) - col 1-5 -->
  <rect x="90" y="90" width="76" height="76" fill="rgba(0,212,170,0.3)" stroke="#333" stroke-width="1"/>
  <rect x="166" y="90" width="76" height="76" fill="rgba(243,156,18,0.4)" stroke="#333" stroke-width="1"/>
  <rect x="242" y="90" width="76" height="76" fill="rgba(231,76,60,0.5)" stroke="#333" stroke-width="1"/>
  <rect x="318" y="90" width="76" height="76" fill="rgba(231,76,60,0.7)" stroke="#333" stroke-width="1"/>
  <rect x="394" y="90" width="76" height="76" fill="rgba(180,30,30,0.8)" stroke="#333" stroke-width="1"/>

  <!-- Row 4 (High P) -->
  <rect x="90" y="166" width="76" height="76" fill="rgba(0,212,170,0.3)" stroke="#333" stroke-width="1"/>
  <rect x="166" y="166" width="76" height="76" fill="rgba(0,212,170,0.3)" stroke="#333" stroke-width="1"/>
  <rect x="242" y="166" width="76" height="76" fill="rgba(243,156,18,0.4)" stroke="#333" stroke-width="1"/>
  <rect x="318" y="166" width="76" height="76" fill="rgba(231,76,60,0.7)" stroke="#333" stroke-width="1"/>
  <rect x="394" y="166" width="76" height="76" fill="rgba(231,76,60,0.7)" stroke="#333" stroke-width="1"/>

  <!-- Row 3 (Medium P) -->
  <rect x="90" y="242" width="76" height="76" fill="rgba(0,212,170,0.2)" stroke="#333" stroke-width="1"/>
  <rect x="166" y="242" width="76" height="76" fill="rgba(0,212,170,0.3)" stroke="#333" stroke-width="1"/>
  <rect x="242" y="242" width="76" height="76" fill="rgba(243,156,18,0.4)" stroke="#333" stroke-width="1"/>
  <rect x="318" y="242" width="76" height="76" fill="rgba(243,156,18,0.4)" stroke="#333" stroke-width="1"/>
  <rect x="394" y="242" width="76" height="76" fill="rgba(231,76,60,0.5)" stroke="#333" stroke-width="1"/>

  <!-- Row 2 (Low P) -->
  <rect x="90" y="318" width="76" height="76" fill="rgba(0,212,170,0.15)" stroke="#333" stroke-width="1"/>
  <rect x="166" y="318" width="76" height="76" fill="rgba(0,212,170,0.2)" stroke="#333" stroke-width="1"/>
  <rect x="242" y="318" width="76" height="76" fill="rgba(0,212,170,0.3)" stroke="#333" stroke-width="1"/>
  <rect x="318" y="318" width="76" height="76" fill="rgba(243,156,18,0.4)" stroke="#333" stroke-width="1"/>
  <rect x="394" y="318" width="76" height="76" fill="rgba(243,156,18,0.4)" stroke="#333" stroke-width="1"/>

  <!-- Row 1 (Very Low P) -->
  <rect x="90" y="394" width="76" height="60" fill="rgba(0,212,170,0.1)" stroke="#333" stroke-width="1"/>
  <rect x="166" y="394" width="76" height="60" fill="rgba(0,212,170,0.15)" stroke="#333" stroke-width="1"/>
  <rect x="242" y="394" width="76" height="60" fill="rgba(0,212,170,0.2)" stroke="#333" stroke-width="1"/>
  <rect x="318" y="394" width="76" height="60" fill="rgba(0,212,170,0.3)" stroke="#333" stroke-width="1"/>
  <rect x="394" y="394" width="76" height="60" fill="rgba(243,156,18,0.3)" stroke="#333" stroke-width="1"/>

  <!-- Risk items plotted -->
  <!-- R1: 서버 다운 - High P, Very High I = 빨강 -->
  <circle cx="432" cy="204" r="16" fill="rgba(231,76,60,0.9)" stroke="white" stroke-width="1.5"/>
  <text x="432" y="201" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif" font-weight="bold">R1</text>
  <text x="432" y="213" text-anchor="middle" fill="white" font-size="7">서버다운</text>

  <!-- R2: 인력 이탈 - Medium P, High I = 노랑 -->
  <circle cx="356" cy="280" r="16" fill="rgba(243,156,18,0.9)" stroke="white" stroke-width="1.5"/>
  <text x="356" y="277" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif" font-weight="bold">R2</text>
  <text x="356" y="289" text-anchor="middle" fill="white" font-size="7">인력이탈</text>

  <!-- R3: 요구 변경 - Very High P, Medium I = 빨강 -->
  <circle cx="280" cy="128" r="16" fill="rgba(231,76,60,0.9)" stroke="white" stroke-width="1.5"/>
  <text x="280" y="125" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif" font-weight="bold">R3</text>
  <text x="280" y="137" text-anchor="middle" fill="white" font-size="7">요구변경</text>

  <!-- R4: 외부업체 지연 - Low P, Low I = 초록 -->
  <circle cx="204" cy="356" r="16" fill="rgba(0,212,170,0.9)" stroke="white" stroke-width="1.5"/>
  <text x="204" y="353" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif" font-weight="bold">R4</text>
  <text x="204" y="365" text-anchor="middle" fill="white" font-size="7">업체지연</text>

  <!-- Legend -->
  <rect x="490" y="100" width="135" height="120" rx="6" fill="rgba(0,0,0,0.4)" stroke="#444" stroke-width="1"/>
  <text x="557" y="118" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Arial,sans-serif" font-weight="bold">대응 전략</text>
  <rect x="500" y="126" width="14" height="14" rx="2" fill="rgba(180,30,30,0.8)"/>
  <text x="520" y="138" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">Avoid (회피)</text>
  <rect x="500" y="148" width="14" height="14" rx="2" fill="rgba(231,76,60,0.6)"/>
  <text x="520" y="160" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">Transfer (전가)</text>
  <rect x="500" y="170" width="14" height="14" rx="2" fill="rgba(243,156,18,0.6)"/>
  <text x="520" y="182" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">Mitigate (완화)</text>
  <rect x="500" y="192" width="14" height="14" rx="2" fill="rgba(0,212,170,0.5)"/>
  <text x="520" y="204" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">Accept (수용)</text>

  <!-- EMV formula -->
  <rect x="490" y="232" width="135" height="54" rx="6" fill="rgba(255,255,255,0.05)" stroke="#444" stroke-width="1"/>
  <text x="557" y="248" text-anchor="middle" fill="#f39c12" font-size="9" font-family="Arial,sans-serif" font-weight="bold">EMV = P × I</text>
  <text x="557" y="263" text-anchor="middle" fill="#e0e0e0" font-size="8" font-family="Arial,sans-serif">R1: 0.7 × 5억 = 3.5억</text>
  <text x="557" y="276" text-anchor="middle" fill="#e0e0e0" font-size="8" font-family="Arial,sans-serif">예비비 산정 기준</text>
</svg>
