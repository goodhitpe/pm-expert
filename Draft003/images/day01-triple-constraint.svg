<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="500" fill="url(#bg)" rx="12"/>
  <text x="300" y="36" text-anchor="middle" fill="#f39c12" font-size="18" font-family="Arial,sans-serif" font-weight="bold">Day 01 — Triple Constraint Triangle</text>

  <!-- Triangle -->
  <polygon points="300,80 80,400 520,400" fill="none" stroke="#6c63ff" stroke-width="3" filter="url(#glow)"/>
  <!-- Inner triangle (Quality) -->
  <polygon points="300,185 185,370 415,370" fill="rgba(108,99,255,0.15)" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Scope (top) -->
  <circle cx="300" cy="80" r="34" fill="#6c63ff"/>
  <text x="300" y="75" text-anchor="middle" fill="white" font-size="13" font-family="Arial,sans-serif" font-weight="bold">SCOPE</text>
  <text x="300" y="92" text-anchor="middle" fill="#c9b8ff" font-size="10" font-family="Arial,sans-serif">What &amp; How much</text>

  <!-- Time (bottom-left) -->
  <circle cx="80" cy="400" r="34" fill="#00d4aa"/>
  <text x="80" y="395" text-anchor="middle" fill="white" font-size="13" font-family="Arial,sans-serif" font-weight="bold">TIME</text>
  <text x="80" y="412" text-anchor="middle" fill="#b2f0e8" font-size="10" font-family="Arial,sans-serif">Schedule</text>

  <!-- Cost (bottom-right) -->
  <circle cx="520" cy="400" r="34" fill="#e74c3c"/>
  <text x="520" y="395" text-anchor="middle" fill="white" font-size="13" font-family="Arial,sans-serif" font-weight="bold">COST</text>
  <text x="520" y="412" text-anchor="middle" fill="#f4b2ae" font-size="10" font-family="Arial,sans-serif">Budget</text>

  <!-- Quality center -->
  <circle cx="300" cy="285" r="42" fill="#f39c12"/>
  <text x="300" y="281" text-anchor="middle" fill="white" font-size="13" font-family="Arial,sans-serif" font-weight="bold">QUALITY</text>
  <text x="300" y="298" text-anchor="middle" fill="#fff3cd" font-size="10" font-family="Arial,sans-serif">Satisfaction</text>

  <!-- Side labels -->
  <text x="163" y="228" text-anchor="middle" fill="#e0e0e0" font-size="12" font-family="Arial,sans-serif" transform="rotate(-60 163 228)">Change Scope →</text>
  <text x="437" y="228" text-anchor="middle" fill="#e0e0e0" font-size="12" font-family="Arial,sans-serif" transform="rotate(60 437 228)">← Adjust Cost</text>
  <text x="300" y="426" text-anchor="middle" fill="#e0e0e0" font-size="12" font-family="Arial,sans-serif">— Shift Schedule —</text>

  <!-- Iron Triangle note -->
  <rect x="170" y="448" width="260" height="36" rx="8" fill="rgba(243,156,18,0.15)" stroke="#f39c12" stroke-width="1"/>
  <text x="300" y="462" text-anchor="middle" fill="#f39c12" font-size="11" font-family="Arial,sans-serif" font-weight="bold">Iron Triangle</text>
  <text x="300" y="476" text-anchor="middle" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">하나를 바꾸면 나머지 둘에 영향이 옵니다</text>
</svg>
