<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" width="700" height="440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="700" height="440" fill="url(#bg)" rx="12"/>
  <text x="350" y="30" text-anchor="middle" fill="#f39c12" font-size="17" font-family="Arial,sans-serif" font-weight="bold">Day 05 — EVM (Earned Value Management) S-Curve</text>

  <!-- Axes -->
  <line x1="70" y1="60" x2="70" y2="350" stroke="#666" stroke-width="2"/>
  <line x1="70" y1="350" x2="660" y2="350" stroke="#666" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="60" y="354" text-anchor="end" fill="#888" font-size="10" font-family="Arial,sans-serif">0</text>
  <text x="60" y="290" text-anchor="end" fill="#888" font-size="10" font-family="Arial,sans-serif">2억</text>
  <text x="60" y="230" text-anchor="end" fill="#888" font-size="10" font-family="Arial,sans-serif">4억</text>
  <text x="60" y="170" text-anchor="end" fill="#888" font-size="10" font-family="Arial,sans-serif">6억</text>
  <text x="60" y="110" text-anchor="end" fill="#888" font-size="10" font-family="Arial,sans-serif">8억</text>
  <text x="45" y="200" text-anchor="middle" fill="#888" font-size="11" font-family="Arial,sans-serif" transform="rotate(-90 45 200)">누적비용</text>

  <!-- X-axis labels -->
  <text x="70" y="368" text-anchor="middle" fill="#888" font-size="10" font-family="Arial,sans-serif">0</text>
  <text x="175" y="368" text-anchor="middle" fill="#888" font-size="10" font-family="Arial,sans-serif">2M</text>
  <text x="280" y="368" text-anchor="middle" fill="#888" font-size="10" font-family="Arial,sans-serif">4M</text>
  <text x="385" y="368" text-anchor="middle" fill="#888" font-size="10" font-family="Arial,sans-serif">6M</text>
  <text x="490" y="368" text-anchor="middle" fill="#888" font-size="10" font-family="Arial,sans-serif">8M (NOW)</text>
  <text x="600" y="368" text-anchor="middle" fill="#888" font-size="10" font-family="Arial,sans-serif">10M</text>
  <text x="365" y="385" text-anchor="middle" fill="#888" font-size="11" font-family="Arial,sans-serif">프로젝트 기간 (개월)</text>

  <!-- Grid lines -->
  <line x1="70" y1="290" x2="660" y2="290" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="230" x2="660" y2="230" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="170" x2="660" y2="170" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="110" x2="660" y2="110" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="175" y1="60" x2="175" y2="350" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="280" y1="60" x2="280" y2="350" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="385" y1="60" x2="385" y2="350" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="490" y1="60" x2="490" y2="350" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="600" y1="60" x2="600" y2="350" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- BAC line -->
  <line x1="70" y1="80" x2="660" y2="80" stroke="#888" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="665" y="84" fill="#888" font-size="10" font-family="Arial,sans-serif">BAC=10억</text>

  <!-- PV line (planned) - blue -->
  <polyline points="70,350 175,310 280,255 385,200 490,155 600,80" fill="none" stroke="#6c63ff" stroke-width="2.5"/>
  <!-- PV endpoint -->
  <circle cx="490" cy="155" r="5" fill="#6c63ff"/>

  <!-- EV line (earned) - green - behind schedule -->
  <polyline points="70,350 175,320 280,278 385,240 490,210" fill="none" stroke="#00d4aa" stroke-width="2.5"/>
  <circle cx="490" cy="210" r="5" fill="#00d4aa"/>

  <!-- AC line (actual cost) - red - over budget -->
  <polyline points="70,350 175,305 280,258 385,218 490,188" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
  <circle cx="490" cy="188" r="5" fill="#e74c3c"/>

  <!-- Now vertical line -->
  <line x1="490" y1="60" x2="490" y2="350" stroke="#f39c12" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="494" y="76" fill="#f39c12" font-size="10" font-family="Arial,sans-serif" font-weight="bold">NOW</text>

  <!-- SV and CV arrows -->
  <!-- SV: EV - PV (schedule variance) = 210 - 155 = negative -->
  <line x1="510" y1="155" x2="510" y2="210" stroke="#6c63ff" stroke-width="2" marker-end="url(#svArr)"/>
  <text x="525" y="186" fill="#6c63ff" font-size="10" font-family="Arial,sans-serif">SV = EV-PV</text>
  <text x="525" y="199" fill="#e74c3c" font-size="9" font-family="Arial,sans-serif">= -1억 (지연)</text>

  <!-- CV: EV - AC -->
  <line x1="545" y1="188" x2="545" y2="210" stroke="#e74c3c" stroke-width="2"/>
  <text x="555" y="203" fill="#e74c3c" font-size="10" font-family="Arial,sans-serif">CV = EV-AC</text>
  <text x="555" y="216" fill="#e74c3c" font-size="9" font-family="Arial,sans-serif">= -0.5억 (초과)</text>

  <!-- Legend -->
  <rect x="80" y="60" width="280" height="90" rx="6" fill="rgba(0,0,0,0.3)"/>
  <line x1="90" y1="80" x2="115" y2="80" stroke="#6c63ff" stroke-width="2.5"/>
  <text x="120" y="84" fill="#e0e0e0" font-size="11" font-family="Arial,sans-serif">PV — Planned Value (계획 원가)</text>
  <line x1="90" y1="100" x2="115" y2="100" stroke="#00d4aa" stroke-width="2.5"/>
  <text x="120" y="104" fill="#e0e0e0" font-size="11" font-family="Arial,sans-serif">EV — Earned Value (벌어들인 가치)</text>
  <line x1="90" y1="120" x2="115" y2="120" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="120" y="124" fill="#e0e0e0" font-size="11" font-family="Arial,sans-serif">AC — Actual Cost (실제 원가)</text>
  <text x="90" y="142" fill="#888" font-size="9" font-family="Arial,sans-serif">CPI = EV/AC   SPI = EV/PV   (1.0 이상: 양호)</text>

  <!-- Formula box -->
  <rect x="80" y="395" width="560" height="36" rx="6" fill="rgba(243,156,18,0.1)" stroke="#f39c12" stroke-width="1"/>
  <text x="360" y="409" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Arial,sans-serif" font-weight="bold">EAC = BAC/CPI (예상 최종 원가)  |  VAC = BAC - EAC (원가 편차)  |  ETC = EAC - AC (잔여 원가 예측)</text>
  <text x="360" y="425" text-anchor="middle" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">이 예시: CPI = EV/AC = 5억/5.5억 = 0.91 (예산 초과) | SPI = EV/PV = 5억/6억 = 0.83 (일정 지연)</text>
</svg>
