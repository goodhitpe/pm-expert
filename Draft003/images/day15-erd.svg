<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" width="700" height="440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="url(#bg)" rx="12"/>
  <text x="350" y="28" text-anchor="middle" fill="#f39c12" font-size="17" font-family="Arial,sans-serif" font-weight="bold">Day 15 — ERD (Entity Relationship Diagram)</text>

  <!-- Entity: 고객 -->
  <rect x="40" y="80" width="150" height="200" rx="6" fill="rgba(108,99,255,0.15)" stroke="#6c63ff" stroke-width="2"/>
  <rect x="40" y="80" width="150" height="30" rx="6" fill="#6c63ff"/>
  <text x="115" y="100" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">👤 고객 (Customer)</text>
  <line x1="40" y1="126" x2="190" y2="126" stroke="#6c63ff" stroke-width="1"/>
  <text x="58" y="144" fill="#f39c12" font-size="10" font-family="Arial,sans-serif">🔑 고객ID (PK)</text>
  <line x1="50" y1="150" x2="180" y2="150" stroke="#333" stroke-width="1"/>
  <text x="58" y="165" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">이름</text>
  <text x="58" y="181" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">이메일 (UNIQUE)</text>
  <text x="58" y="197" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">전화번호</text>
  <text x="58" y="213" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">가입일시</text>
  <text x="58" y="229" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">등급 (일반/VIP)</text>
  <text x="58" y="245" fill="#888" font-size="9" font-family="Arial,sans-serif">CHECK(등급 IN ...)</text>
  <text x="58" y="261" fill="#888" font-size="9" font-family="Arial,sans-serif">NOT NULL: 이름, 이메일</text>

  <!-- Relationship 1: 고객 1--N 주문 -->
  <line x1="190" y1="175" x2="250" y2="175" stroke="#888" stroke-width="2"/>
  <!-- 1 symbol -->
  <line x1="193" y1="168" x2="193" y2="182" stroke="#888" stroke-width="2"/>
  <!-- N symbol -->
  <line x1="248" y1="163" x2="258" y2="175" stroke="#888" stroke-width="2"/>
  <line x1="248" y1="187" x2="258" y2="175" stroke="#888" stroke-width="2"/>
  <line x1="243" y1="163" x2="253" y2="175" stroke="#888" stroke-width="2"/>
  <line x1="243" y1="187" x2="253" y2="175" stroke="#888" stroke-width="2"/>
  <text x="218" y="168" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Arial,sans-serif" font-weight="bold">1:N</text>

  <!-- Entity: 주문 -->
  <rect x="250" y="80" width="170" height="220" rx="6" fill="rgba(0,212,170,0.15)" stroke="#00d4aa" stroke-width="2"/>
  <rect x="250" y="80" width="170" height="30" rx="6" fill="#00d4aa"/>
  <text x="335" y="100" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">📋 주문 (Order)</text>
  <line x1="250" y1="126" x2="420" y2="126" stroke="#00d4aa" stroke-width="1"/>
  <text x="265" y="144" fill="#f39c12" font-size="10" font-family="Arial,sans-serif">🔑 주문번호 (PK)</text>
  <line x1="260" y1="150" x2="410" y2="150" stroke="#333" stroke-width="1"/>
  <text x="265" y="165" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">🔗 고객ID (FK)</text>
  <text x="265" y="181" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">주문일시</text>
  <text x="265" y="197" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">총금액</text>
  <text x="265" y="213" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">배송주소</text>
  <text x="265" y="229" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">상태 (접수/배송중/...)</text>
  <text x="265" y="245" fill="#888" font-size="9" font-family="Arial,sans-serif">CHECK(총금액 &gt;= 0)</text>
  <text x="265" y="261" fill="#888" font-size="9" font-family="Arial,sans-serif">ON DELETE RESTRICT</text>
  <text x="265" y="277" fill="#888" font-size="9" font-family="Arial,sans-serif">INDEX(고객ID, 주문일시)</text>

  <!-- Relationship 2: 주문 N--M 상품 -->
  <line x1="420" y1="175" x2="480" y2="175" stroke="#888" stroke-width="2"/>
  <!-- N symbol left -->
  <line x1="422" y1="163" x2="432" y2="175" stroke="#888" stroke-width="2"/>
  <line x1="422" y1="187" x2="432" y2="175" stroke="#888" stroke-width="2"/>
  <!-- M symbol right -->
  <line x1="468" y1="163" x2="478" y2="175" stroke="#888" stroke-width="2"/>
  <line x1="468" y1="187" x2="478" y2="175" stroke="#888" stroke-width="2"/>
  <text x="450" y="165" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Arial,sans-serif" font-weight="bold">N:M</text>

  <!-- Bridge Table: 주문상품 -->
  <rect x="342" y="330" width="160" height="80" rx="6" fill="rgba(243,156,18,0.15)" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="342" y="330" width="160" height="26" rx="6" fill="rgba(243,156,18,0.5)"/>
  <text x="422" y="348" text-anchor="middle" fill="white" font-size="10" font-family="Arial,sans-serif" font-weight="bold">주문상품 (Bridge)</text>
  <text x="355" y="368" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">🔗 주문번호 (FK)</text>
  <text x="355" y="383" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">🔗 상품ID (FK)</text>
  <text x="355" y="398" fill="#888" font-size="8" font-family="Arial,sans-serif">수량, 단가 (복합PK)</text>
  <line x1="422" y1="300" x2="422" y2="330" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="388" y="320" fill="#f39c12" font-size="8" font-family="Arial,sans-serif">N:M → 분해</text>

  <!-- Entity: 상품 -->
  <rect x="480" y="80" width="160" height="210" rx="6" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="2"/>
  <rect x="480" y="80" width="160" height="30" rx="6" fill="#e74c3c"/>
  <text x="560" y="100" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">🛒 상품 (Product)</text>
  <line x1="480" y1="126" x2="640" y2="126" stroke="#e74c3c" stroke-width="1"/>
  <text x="495" y="144" fill="#f39c12" font-size="10" font-family="Arial,sans-serif">🔑 상품ID (PK)</text>
  <line x1="490" y1="150" x2="630" y2="150" stroke="#333" stroke-width="1"/>
  <text x="495" y="165" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">상품명</text>
  <text x="495" y="181" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">가격</text>
  <text x="495" y="197" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">재고수량</text>
  <text x="495" y="213" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">카테고리</text>
  <text x="495" y="229" fill="#e0e0e0" font-size="10" font-family="Arial,sans-serif">🔗 카테고리ID (FK)</text>
  <text x="495" y="245" fill="#888" font-size="9" font-family="Arial,sans-serif">CHECK(가격 &gt; 0)</text>
  <text x="495" y="261" fill="#888" font-size="9" font-family="Arial,sans-serif">INDEX(카테고리ID)</text>

  <!-- Legend -->
  <rect x="40" y="350" width="285" height="74" rx="6" fill="rgba(255,255,255,0.04)" stroke="#444" stroke-width="1"/>
  <text x="182" y="368" text-anchor="middle" fill="#f39c12" font-size="10" font-family="Arial,sans-serif" font-weight="bold">ERD 기호 / SQL 정규화</text>
  <text x="50" y="384" fill="#f39c12" font-size="9" font-family="Arial,sans-serif">🔑 PK</text>
  <text x="85" y="384" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">기본키 (UNIQUE+NOT NULL)</text>
  <text x="50" y="399" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">🔗 FK</text>
  <text x="85" y="399" fill="#e0e0e0" font-size="9" font-family="Arial,sans-serif">외래키 (참조 무결성)</text>
  <text x="50" y="414" fill="#00d4aa" font-size="9" font-family="Arial,sans-serif">1NF→2NF→3NF:</text>
  <text x="160" y="414" fill="#888" font-size="9" font-family="Arial,sans-serif">원자값 → 부분종속 제거 → 이행종속 제거</text>
</svg>
