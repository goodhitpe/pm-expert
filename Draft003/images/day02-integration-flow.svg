<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
  </defs>
  <rect width="700" height="380" fill="url(#bg)" rx="12"/>
  <text x="350" y="34" text-anchor="middle" fill="#f39c12" font-size="17" font-family="Arial,sans-serif" font-weight="bold">Day 02 — 프로젝트 통합 관리 프로세스</text>

  <!-- Phase boxes -->
  <!-- Initiating -->
  <rect x="20" y="80" width="100" height="200" rx="8" fill="rgba(108,99,255,0.2)" stroke="#6c63ff" stroke-width="2"/>
  <text x="70" y="168" text-anchor="middle" fill="#6c63ff" font-size="13" font-family="Arial,sans-serif" font-weight="bold" transform="rotate(-90 70 168)">Initiating</text>
  <rect x="30" y="110" width="80" height="36" rx="5" fill="#6c63ff"/>
  <text x="70" y="123" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif" font-weight="bold">프로젝트 헌장</text>
  <text x="70" y="136" text-anchor="middle" fill="#ddd" font-size="8" font-family="Arial,sans-serif">Project Charter</text>

  <!-- Arrow -->
  <line x1="122" y1="180" x2="148" y2="180" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Planning -->
  <rect x="150" y="62" width="110" height="240" rx="8" fill="rgba(0,212,170,0.15)" stroke="#00d4aa" stroke-width="2"/>
  <text x="205" y="190" text-anchor="middle" fill="#00d4aa" font-size="13" font-family="Arial,sans-serif" font-weight="bold" transform="rotate(-90 205 190)">Planning</text>
  <rect x="160" y="82" width="90" height="30" rx="5" fill="#00d4aa"/>
  <text x="205" y="101" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif" font-weight="bold">통합 관리 계획</text>
  <rect x="160" y="122" width="90" height="30" rx="5" fill="rgba(0,212,170,0.4)"/>
  <text x="205" y="141" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">WBS / 일정</text>
  <rect x="160" y="162" width="90" height="30" rx="5" fill="rgba(0,212,170,0.4)"/>
  <text x="205" y="181" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">리스크 계획</text>
  <rect x="160" y="202" width="90" height="30" rx="5" fill="rgba(0,212,170,0.4)"/>
  <text x="205" y="221" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">의사소통 계획</text>
  <rect x="160" y="242" width="90" height="30" rx="5" fill="rgba(0,212,170,0.4)"/>
  <text x="205" y="261" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">조달 계획</text>

  <!-- Arrow -->
  <line x1="262" y1="180" x2="288" y2="180" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Executing -->
  <rect x="290" y="80" width="110" height="200" rx="8" fill="rgba(243,156,18,0.15)" stroke="#f39c12" stroke-width="2"/>
  <text x="345" y="180" text-anchor="middle" fill="#f39c12" font-size="13" font-family="Arial,sans-serif" font-weight="bold" transform="rotate(-90 345 180)">Executing</text>
  <rect x="300" y="100" width="90" height="30" rx="5" fill="#f39c12"/>
  <text x="345" y="119" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif" font-weight="bold">작업 지시 관리</text>
  <rect x="300" y="140" width="90" height="30" rx="5" fill="rgba(243,156,18,0.4)"/>
  <text x="345" y="159" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">품질 보증</text>
  <rect x="300" y="180" width="90" height="30" rx="5" fill="rgba(243,156,18,0.4)"/>
  <text x="345" y="199" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">팀 구성·개발</text>
  <rect x="300" y="220" width="90" height="30" rx="5" fill="rgba(243,156,18,0.4)"/>
  <text x="345" y="239" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">이해관계자 소통</text>

  <!-- Arrow -->
  <line x1="402" y1="180" x2="428" y2="180" stroke="#f39c12" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Monitoring -->
  <rect x="430" y="80" width="110" height="200" rx="8" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="2"/>
  <text x="485" y="180" text-anchor="middle" fill="#e74c3c" font-size="11" font-family="Arial,sans-serif" font-weight="bold" transform="rotate(-90 485 180)">Monitoring &amp; Controlling</text>
  <rect x="440" y="100" width="90" height="30" rx="5" fill="#e74c3c"/>
  <text x="485" y="119" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif" font-weight="bold">통합 변경 통제</text>
  <rect x="440" y="140" width="90" height="30" rx="5" fill="rgba(231,76,60,0.4)"/>
  <text x="485" y="159" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">일정/원가 통제</text>
  <rect x="440" y="180" width="90" height="30" rx="5" fill="rgba(231,76,60,0.4)"/>
  <text x="485" y="199" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">리스크 감시</text>
  <rect x="440" y="220" width="90" height="30" rx="5" fill="rgba(231,76,60,0.4)"/>
  <text x="485" y="239" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif">이슈 해결</text>

  <!-- Arrow -->
  <line x1="542" y1="180" x2="568" y2="180" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Closing -->
  <rect x="570" y="80" width="110" height="200" rx="8" fill="rgba(155,89,182,0.2)" stroke="#9b59b6" stroke-width="2"/>
  <text x="625" y="180" text-anchor="middle" fill="#9b59b6" font-size="13" font-family="Arial,sans-serif" font-weight="bold" transform="rotate(-90 625 180)">Closing</text>
  <rect x="580" y="110" width="90" height="36" rx="5" fill="#9b59b6"/>
  <text x="625" y="123" text-anchor="middle" fill="white" font-size="9" font-family="Arial,sans-serif" font-weight="bold">프로젝트 종료</text>
  <text x="625" y="136" text-anchor="middle" fill="#ddd" font-size="8" font-family="Arial,sans-serif">Lessons Learned</text>

  <!-- Bottom feedback arrow (M&amp;C to Planning) -->
  <path d="M 485 282 Q 340 340 205 305" stroke="#e74c3c" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="340" y="340" text-anchor="middle" fill="#e74c3c" font-size="10" font-family="Arial,sans-serif">변경 요청 시 Planning 재수행</text>

  <text x="350" y="368" text-anchor="middle" fill="#888" font-size="10" font-family="Arial,sans-serif">PMBOK 6판 기준 5개 프로세스 그룹 × 10개 지식 영역</text>
</svg>
